<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>동물의 왕국 : 학점 사냥</title>
  <style>
    @font-face {
      font-family: "neodgm";
      src: url("../assets/fonts/neodgm.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "neodgm", "맑은 고딕", sans-serif;
      /* ★ 전체 배경 이미지 */
      background: url('../assets/images/Home.jpg') center center / cover no-repeat fixed;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #3d413d;
      overflow-x: hidden;
      padding: 12px calc(12px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
    }

    .wrap {
      width: 960px;
      max-width: 100%;
      padding: 22px;
    }

    button, .lobby-link, .start-btn, .kakao-share-result-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      font-family: "neodgm", "맑은 고딕", sans-serif;
    }

    .shell {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.97);
      border: 3px solid #eef8e7;
      box-shadow: 0 18px 40px rgba(92, 132, 97, 0.18);
    }

    .cloud, .leaf, .flower {
      position: absolute;
      pointer-events: none;
      opacity: 0.65;
      z-index: 0;
    }

    .cloud { font-size: 42px; opacity: 0.45; }
    .leaf  { font-size: 24px; opacity: 0.28; }
    .flower{ font-size: 22px; opacity: 0.35; }

    .cloud1  { top: 12px;   left: 24px;  }
    .cloud2  { top: 30px;   right: 90px; }
    .leaf1   { top: 92px;   left: 14px;  transform: rotate(-12deg); }
    .leaf2   { top: 80px;   right: 24px; transform: rotate(16deg);  }
    .leaf3   { bottom: 32px; left: 120px; transform: rotate(-8deg); }
    .leaf4   { bottom: 22px; right: 145px; transform: rotate(10deg); }
    .flower1 { bottom: 24px; left: 42px; }
    .flower2 { bottom: 18px; right: 44px; }

    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 10px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(18px, 3.8vw, 28px);
      color: #4f7b55;
      letter-spacing: -1px;
    }

    .title p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #738476;
    }

    .controls {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    #result {
      flex: 1;
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #f7fff3);
      border: 2px solid #e4f1df;
      color: #5a6f5f;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.5;
      margin: 0;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    #result.fever {
      background: linear-gradient(135deg, #fff3a0, #ffe066);
      border-color: #f5c800;
      color: #7a5a00;
    }

    .status {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .status-box {
      flex: 1 1 0;
      min-width: 0;
      background: linear-gradient(180deg, #ffffff, #f7fff3);
      border: 2px solid #e6f4df;
      border-radius: 12px;
      padding: 6px 8px;
      text-align: center;
      transition: background 0.3s, border-color 0.3s;
    }

    .status-box.fever-box {
      background: linear-gradient(180deg, #fff8cc, #fff0a0);
      border-color: #f5c800;
    }

    .status-label {
      font-size: 10px;
      color: #8aa18d;
      margin-bottom: 2px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .status-value {
      font-size: 18px;
      font-weight: 900;
      color: #43664a;
      line-height: 1.1;
    }

    #gameArea {
      position: relative;
      z-index: 1;
      width: 100%;
      height: min(600px, calc(100vh - 220px));
      height: min(600px, calc(100dvh - 220px));
      min-height: 440px;
      overflow: hidden;
      border-radius: 30px;
      border: 4px solid #8ec18f;
      /* ★ 게임 박스 배경 — hunt 폴더 없이 images 바로 아래 */
      background-image: url('../assets/images/hunt/hunt_home.png');
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      transition: border-color 0.3s;
    }

    #gameArea.fever-area {
      border-color: #f5c800;
      box-shadow: 0 0 0 3px rgba(245,200,0,0.3), inset 0 0 40px rgba(255,230,0,0.08);
      animation: feverBorder 0.8s ease-in-out infinite alternate;
    }

    @keyframes feverBorder {
      from { border-color: #f5c800; box-shadow: 0 0 0 3px rgba(245,200,0,0.25); }
      to   { border-color: #ffaa00; box-shadow: 0 0 0 5px rgba(255,170,0,0.4); }
    }

    #gameArea::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 26px;
      z-index: 0;
      pointer-events: none;
    }

    #feverOverlay {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      background: radial-gradient(ellipse at center, rgba(255,230,50,0.18) 0%, transparent 70%);
      transition: opacity 0.4s;
    }

    #feverOverlay.show { opacity: 1; animation: feverGlow 1s ease-in-out infinite alternate; }

    @keyframes feverGlow {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    #feverBanner {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: linear-gradient(135deg, #ffe640, #ffb300);
      color: #5a3c00;
      font-size: 14px;
      font-weight: 900;
      padding: 7px 18px;
      border-radius: 999px;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 6px 20px rgba(255,180,0,0.4);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "neodgm", "맑은 고딕", sans-serif;
    }

    #feverBanner.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      animation: feverBannerPulse 0.6s ease-in-out infinite alternate;
    }

    #feverBanner img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }

    @keyframes feverBannerPulse {
      from { transform: translateX(-50%) scale(1);    box-shadow: 0 6px 20px rgba(255,180,0,0.4); }
      to   { transform: translateX(-50%) scale(1.05); box-shadow: 0 8px 28px rgba(255,180,0,0.6); }
    }

    .grade {
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
      cursor: pointer;
      z-index: 2;
      border: 3px solid rgba(255,255,255,0.95);
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      animation: popIn 0.24s ease, floaty 1.6s ease-in-out infinite alternate;
      transition: transform 0.12s ease;
      backdrop-filter: blur(3px);
      font-family: "neodgm", "맑은 고딕", sans-serif;
    }
    .grade:hover  { transform: scale(1.08); }
    .grade:active { transform: scale(0.95); }

    .grade.popping {
      animation: bubblePop 0.32s ease forwards !important;
      pointer-events: none;
    }

    @keyframes bubblePop {
      0%   { transform: scale(1);    opacity: 1; filter: blur(0px); }
      35%  { transform: scale(1.4);  opacity: 0.7; filter: blur(2px); }
      100% { transform: scale(0.05); opacity: 0; filter: blur(8px); }
    }

    .grade.golden {
      background: linear-gradient(135deg, rgba(255,230,80,0.95), rgba(255,200,30,0.95)) !important;
      color: #5a3c00 !important;
      border: 3px solid rgba(255,255,180,0.95) !important;
      animation: popIn 0.24s ease, goldenPulse 0.9s ease-in-out infinite alternate !important;
    }

    @keyframes goldenPulse {
      from { box-shadow: 0 0 0 3px rgba(255,210,0,0.4), 0 10px 22px rgba(0,0,0,0.18); }
      to   { box-shadow: 0 0 0 7px rgba(255,210,0,0.15), 0 12px 28px rgba(0,0,0,0.2); }
    }

    .grade.bomb {
      background: linear-gradient(135deg, rgba(60,60,60,0.93), rgba(30,30,30,0.93)) !important;
      color: #fff !important;
      border: 3px solid rgba(180,180,180,0.8) !important;
      box-shadow: 0 0 0 3px rgba(200,50,50,0.4), 0 10px 22px rgba(0,0,0,0.25) !important;
      animation: popIn 0.24s ease, bombWobble 0.5s ease-in-out infinite alternate !important;
    }

    @keyframes bombWobble {
      from { transform: rotate(-4deg) scale(1); }
      to   { transform: rotate(4deg)  scale(1.04); }
    }

    .bomb-blast {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 8;
      background: radial-gradient(circle, rgba(255,100,30,0.7) 0%, rgba(255,50,0,0.3) 50%, transparent 70%);
      animation: blastExpand 0.45s ease-out forwards;
    }

    @keyframes blastExpand {
      0%   { transform: scale(0);   opacity: 1; }
      60%  { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .droplet {
      position: absolute;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes dropletFly {
      0%   { opacity: 1;   transform: translate(0, 0) scale(1); }
      70%  { opacity: 0.9; }
      100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) scale(0.2); }
    }

    .animal-img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      margin-bottom: 3px;
      pointer-events: none;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    .special-img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .grade-text    { font-size: 14px; font-weight: 900; line-height: 1; }
    .grade-subtext { font-size: 11px; font-weight: 800; line-height: 1; margin-top: 2px; }

    .grade.good  { background: linear-gradient(135deg, rgba(223,248,204,0.92), rgba(245,255,233,0.92)); color: #3e7d43; }
    .grade.mid   { background: linear-gradient(135deg, rgba(232,242,255,0.92), rgba(247,251,255,0.92)); color: #446a95; }
    .grade.low   { background: linear-gradient(135deg, rgba(255,242,203,0.92), rgba(255,249,233,0.92)); color: #8c6f28; }
    .grade.bad   { background: linear-gradient(135deg, rgba(255,231,209,0.92), rgba(255,244,234,0.92)); color: #956334; }
    .grade.worst { background: linear-gradient(135deg, rgba(245,231,201,0.92), rgba(255,247,231,0.92)); color: #8b6c35; box-shadow: 0 10px 18px rgba(120,96,50,0.15); }

    .hit-effect {
      position: absolute;
      z-index: 15;
      pointer-events: none;
      font-size: 16px;
      font-weight: 900;
      font-family: "neodgm", "맑은 고딕", sans-serif;
      animation: riseFade 0.7s ease forwards;
      text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    .hit-effect.big { font-size: 20px; }

    .guide {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      text-align: center;
      color: #7b9180;
      font-size: 12px;
      line-height: 1.8;
    }

    @keyframes popIn {
      from { transform: scale(0.45); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes floaty {
      from { translate: 0 0; }
      to   { translate: 0 -6px; }
    }
    @keyframes riseFade {
      0%   { opacity: 1; transform: translateY(0);    }
      100% { opacity: 0; transform: translateY(-32px); }
    }

    .lobby-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      color: #4f7b55;
      background: #e8f5e9;
      border: 2px solid #c8e6c9;
      text-decoration: none;
      margin-bottom: 14px;
      font-family: "neodgm", "맑은 고딕", sans-serif;
    }
    .lobby-link:hover { background: #dcf2de; }

    .kakao-share-result-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 800;
      color: #191919;
      background: #fee500;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .kakao-share-result-btn:hover { transform: translateY(-2px); }
    .kakao-share-result-btn.hidden { display: none !important; }

    @media (max-width: 700px) {
      .wrap { padding: 14px 10px; }
      #result { font-size: 11px; min-height: auto; padding: 10px 12px; }
      #gameArea { height: min(70vh, 600px); min-height: 360px; }
      .grade { width: 72px; height: 72px; }
      .animal-img { width: 38px; height: 38px; }
      .special-img { width: 42px; height: 42px; }
      .grade-text { font-size: 12px; }
      .kakao-share-result-btn { width: 100%; min-height: 48px; font-size: 14px; }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 40, 15, 0.52);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .overlay.show { display: flex; }

    .overlay-card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      border: 3px solid #e4f1df;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #4f7b55;
      font-family: "neodgm", "맑은 고딕", sans-serif;
    }

    .overlay-card p {
      margin: 0 0 20px;
      color: #5a6f5f;
      font-size: 14px;
      line-height: 1.75;
      font-family: "neodgm", "맑은 고딕", sans-serif;
    }

    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #overlayActionBtn {
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #71c3ff, #4a9fe3);
      box-shadow: 0 10px 22px rgba(60, 148, 225, 0.24);
      font-family: "neodgm", "맑은 고딕", sans-serif;
      transition: transform 0.15s ease;
    }
    #overlayActionBtn:hover { transform: translateY(-1px); }

    #overlayLobbyBtn {
      border: 2px solid #c8e6c9;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: #4f7b55;
      background: #e8f5e9;
      font-family: "neodgm", "맑은 고딕", sans-serif;
      transition: transform 0.15s ease, background 0.15s;
    }
    #overlayLobbyBtn:hover { background: #dcf2de; transform: translateY(-1px); }
    #overlayLobbyBtn.hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="lobby-link" id="lobbyBackLink" href="../index.html?lobby=1">← 로비로 돌아가기</a>
    <div class="shell">
      <div class="cloud cloud1">☁️</div>
      <div class="cloud cloud2">☁️</div>
      <div class="leaf leaf1">🍃</div>
      <div class="leaf leaf2">🌿</div>
      <div class="leaf leaf3">🍃</div>
      <div class="leaf leaf4">🌿</div>
      <div class="flower flower1">🌼</div>
      <div class="flower flower2">🌼</div>

      <div class="topbar">
        <div class="title">
          <h1>🐾 동물의 왕국 : 학점 사냥</h1>
          <p>짧은 시간 안에 높은 학점을 많이 잡고, 함정 학점은 피하세요!</p>
        </div>
        <div class="status">
          <div class="status-box" id="scoreBox">
            <div class="status-label">점수</div>
            <div class="status-value" id="score">0</div>
          </div>
          <div class="status-box">
            <div class="status-label">콤보</div>
            <div class="status-value" id="combo">0</div>
          </div>
          <div class="status-box">
            <div class="status-label">남은 시간</div>
            <div class="status-value" id="time">15</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <div id="result">시작 버튼을 누르면 귀여운 동물 학점들이 숲속에 나타나요!</div>
      </div>

      <div id="gameArea">
        <div id="feverOverlay"></div>
        <div id="feverBanner">
          <img src="../assets/images/hunt/fever.png" alt="피버" />
          🔥 FEVER TIME! 점수 2배!
        </div>
      </div>

      <div class="guide">
        A+ / A는 고득점 · B 계열은 무난 · D·F는 감점 · 황금버블 = 시간+3초 · 폭탄 = 주의!
      </div>
    </div>
  </div>

  <div class="overlay show" id="overlay">
    <div class="overlay-card">
      <h2 id="overlayTitle">🐾 동물의 왕국 : 학점 사냥</h2>
      <p id="overlayDesc">짧은 시간 안에 높은 학점을 많이 잡고, 함정 학점은 피하세요!</p>
      <div class="overlay-actions">
        <button type="button" id="overlayActionBtn">게임 시작</button>
        <button type="button" id="overlayLobbyBtn" class="hidden" onclick="goToLobby()">🏠 로비로</button>
        <button type="button" id="kakaoShareResultBtn" class="kakao-share-result-btn hidden" onclick="shareToKakao()">결과 공유하기</button>
      </div>
    </div>
  </div>
  <div id="countdownOverlay"><img id="countdownImg" src="" alt="" /></div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
    integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
    crossorigin="anonymous"></script>
  <script>
    const STORAGE_SCHOOL = "animalLeagueSchool";
    const API_BASE =
      window.ANIMAL_LEAGUE_API ||
      (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:3000"
        : "https://backend-m5wz.onrender.com");

    function getLeagueSchool() {
      try {
        const q = (new URLSearchParams(window.location.search).get("school") || "").trim();
        if (q) { try { localStorage.setItem(STORAGE_SCHOOL, q); } catch {} return q; }
      } catch {}
      return (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
    }

    function setLobbyBackLink() {
      const a = document.getElementById("lobbyBackLink");
      if (!a) return;
      const school = getLeagueSchool();
      a.setAttribute("href", school ? `../index.html?lobby=1&school=${encodeURIComponent(school)}` : "../index.html?lobby=1");
    }

    function getLobbyUrl() {
      const school = getLeagueSchool();
      return school ? `../index.html?lobby=1&school=${encodeURIComponent(school)}` : "../index.html?lobby=1";
    }

    function goToLobby() { window.location.href = getLobbyUrl(); }

    function submitScoreToLeague(game, value) {
      const school = getLeagueSchool();
      if (!school) {
        if (!window.__leagueSchoolMissingWarned) {
          window.__leagueSchoolMissingWarned = true;
          alert("학교 정보가 없어 점수를 저장할 수 없습니다. 로비에서 학교를 먼저 입력해 주세요.");
        }
        return;
      }
      const s = Math.round(Number(value));
      if (!Number.isFinite(s)) return;
      fetch(`${API_BASE}/api/scores`, {
        method: "POST", keepalive: true,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ school, game, score: s })
      }).catch(() => {});
    }

    setLobbyBackLink();

    const KAKAO_JS_APP_KEY  = "fa75c82718597e9124f913d174cd92a2";
    const SHARE_SITE_ORIGIN = "https://campus-animal-battle.vercel.app";
    const SHARE_FEED_IMAGE_URL = `${SHARE_SITE_ORIGIN}/assets/game-preview.png`;

    function buildShareLobbyUrl() {
      const school = getLeagueSchool();
      const base = `${SHARE_SITE_ORIGIN}/?lobby=true`;
      return school ? `${base}&school=${encodeURIComponent(school)}` : base;
    }

    (function initKakaoSdk() {
      if (!window.Kakao || !KAKAO_JS_APP_KEY) return;
      if (!Kakao.isInitialized()) Kakao.init(KAKAO_JS_APP_KEY);
    })();

    function hideKakaoShareButton() { document.getElementById("kakaoShareResultBtn")?.classList.add("hidden"); }
    function showKakaoShareButton() { document.getElementById("kakaoShareResultBtn")?.classList.remove("hidden"); }

    function shareToKakao() {
      if (!window.Kakao || !Kakao.isInitialized()) { alert("카카오 SDK를 불러오지 못했습니다."); return; }
      const u = buildShareLobbyUrl();
      Kakao.Share.sendDefault({
        objectType: "feed",
        content: {
          title: "캠퍼스 애니멀 배틀 🐾",
          description: "우리 학교를 대표해 호랑이로 진화해보자!",
          imageUrl: SHARE_FEED_IMAGE_URL,
          link: { mobileWebUrl: u, webUrl: u }
        },
        buttons: [{ title: "게임 참여하기", link: { mobileWebUrl: u, webUrl: u } }]
      });
    }

    const sounds = {
      good:   new Audio("../assets/sounds/powerUp2.mp3"),
      bad:    new Audio("../assets/sounds/lowRandom.mp3"),
      golden: new Audio("../assets/sounds/impactMetal_medium_000.mp3"),
      bomb:   new Audio("../assets/sounds/impactPunch_heavy_000.mp3"),
      fever:  new Audio("../assets/sounds/jingles_NES03.mp3"),
    };
    Object.values(sounds).forEach(s => s.volume = 0.6);

    function playSound(key) {
      const snd = sounds[key];
      if (!snd) return;
      snd.currentTime = 0;
      snd.play().catch(() => {});
    }

    const IMG = {
      golden: "../assets/images/hunt/golden.png",
      bomb:   "../assets/images/hunt/bomb.png",
      fever:  "../assets/images/hunt/fever.png",
    };

    const grades = [
      { g: "A+", score: 10, type: "good",  img: "../assets/images/a_1.png" },
      { g: "A",  score: 8,  type: "good",  img: "../assets/images/a_1.png" },
      { g: "B+", score: 6,  type: "mid",   img: "../assets/images/a_2.png" },
      { g: "B",  score: 5,  type: "mid",   img: "../assets/images/a_2.png" },
      { g: "C+", score: 3,  type: "low",   img: "../assets/images/a_3.png" },
      { g: "C",  score: 2,  type: "low",   img: "../assets/images/a_3.png" },
      { g: "D",  score: -2, type: "bad",   img: "../assets/images/a_4.png" },
      { g: "F",  score: -10,type: "worst", img: "../assets/images/a_5.png" }
    ];

    const dropletColors = {
      good:   ["#6ee87a", "#a8f5b0", "#ffffff"],
      mid:    ["#7ab8f5", "#aad4ff", "#ffffff"],
      low:    ["#f5d87a", "#ffe4a0", "#ffffff"],
      bad:    ["#f5a87a", "#ffcaaa", "#ffffff"],
      worst:  ["#e8c87a", "#f5daa0", "#ffffff"],
      golden: ["#ffe640", "#ffd000", "#fff8c0"],
      bomb:   ["#ff6030", "#ff3300", "#ffcc00"]
    };

    let score = 0, combo = 0, time = 15;
    let gameInterval = null, spawnInterval = null, hardModeInterval = null;
    let isPlaying = false;
    let isFever = false, feverTimeout = null;

    const scoreEl          = document.getElementById("score");
    const comboEl          = document.getElementById("combo");
    const timeEl           = document.getElementById("time");
    const resultEl         = document.getElementById("result");
    const scoreBox         = document.getElementById("scoreBox");
    const gameArea         = document.getElementById("gameArea");
    const feverOverlay     = document.getElementById("feverOverlay");
    const feverBanner      = document.getElementById("feverBanner");
    const overlay          = document.getElementById("overlay");
    const overlayTitle     = document.getElementById("overlayTitle");
    const overlayDesc      = document.getElementById("overlayDesc");
    const overlayActionBtn = document.getElementById("overlayActionBtn");
    const overlayLobbyBtn  = document.getElementById("overlayLobbyBtn");
    overlayActionBtn.addEventListener("click", () => startCountdown(startGame));

    function startFever() {
      if (isFever) return;
      isFever = true;
      playSound("fever");
      gameArea.classList.add("fever-area");
      feverOverlay.classList.add("show");
      feverBanner.classList.add("show");
      resultEl.classList.add("fever");
      scoreBox.classList.add("fever-box");
      resultEl.textContent = "🔥 FEVER TIME! 10초간 점수 2배!";
      clearTimeout(feverTimeout);
      feverTimeout = setTimeout(endFever, 10000);
    }

    function endFever() {
      isFever = false;
      gameArea.classList.remove("fever-area");
      feverOverlay.classList.remove("show");
      feverBanner.classList.remove("show");
      resultEl.classList.remove("fever");
      scoreBox.classList.remove("fever-box");
      if (isPlaying) resultEl.textContent = "피버 종료! 계속 콤보를 이어가세요!";
    }

    function resetUI() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      timeEl.textContent  = time;
    }

    function startGame() {
      overlay.classList.remove("show");
      overlayLobbyBtn.classList.add("hidden");
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      clearTimeout(hardModeInterval);
      clearTimeout(feverTimeout);
      endFever();

      score = 0; combo = 0; time = 15;
      isPlaying = true;

      Array.from(gameArea.children).forEach(el => { if (!el.id) el.remove(); });
      resetUI();
      resultEl.textContent = "게임 시작! 좋은 학점을 빠르게 잡아보세요!";
      hideKakaoShareButton();

      spawnInterval = setInterval(spawnBubble, 700);
      hardModeInterval = setTimeout(() => {
        clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnBubble, 500);
      }, 7000);

      gameInterval = setInterval(() => {
        time--;
        timeEl.textContent = time;
        if (time <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      clearTimeout(hardModeInterval);
      clearTimeout(feverTimeout);
      isPlaying = false;
      endFever();
      Array.from(gameArea.children).forEach(el => { if (!el.id) el.remove(); });

      let message = "";
      if      (score >= 90) message = "완벽한 학점 사냥! 엄청난 실력이에요.";
      else if (score >= 70) message = "훌륭한 성과예요! 상위권 점수입니다.";
      else if (score >= 50) message = "좋은 기록이에요! 조금만 더 빨라지면 돼요.";
      else if (score >= 30) message = "나쁘지 않아요. 다음 판엔 더 집중해봐요.";
      else                  message = "이번에는 아쉬웠어요. 다시 도전해보세요!";

      overlayTitle.textContent = "🎯 게임 종료!";
      overlayDesc.innerHTML = `최종 점수 <strong style="color:#4f7b55;font-size:22px">${score}</strong>점<br />${message}`;
      overlayActionBtn.textContent = "다시 하기";
      overlayLobbyBtn.classList.remove("hidden");
      showKakaoShareButton();
      overlay.classList.add("show");

      resultEl.textContent = `최종 점수 ${score}점 · ${message}`;
      submitScoreToLeague("grade-hunt", score);
    }

    function getNonOverlappingPosition(size) {
      const existing = Array.from(gameArea.querySelectorAll(".grade"));
      const w = gameArea.clientWidth, h = gameArea.clientHeight;
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * (w - size);
        const y = Math.random() * (h - size - 70);
        let ok = true;
        for (const g of existing) {
          const dx = x - parseFloat(g.style.left);
          const dy = y - parseFloat(g.style.top);
          if (Math.sqrt(dx*dx + dy*dy) < 90) { ok = false; break; }
        }
        if (ok) return { x, y };
      }
      return null;
    }

    function spawnDroplets(cx, cy, colorKey) {
      const colors = dropletColors[colorKey] || dropletColors.good;
      const count  = colorKey === "bomb" ? 16 : 12;
      for (let i = 0; i < count; i++) {
        const drop  = document.createElement("div");
        drop.className = "droplet";
        const angle = (360 / count) * i + (Math.random() * 18 - 9);
        const dist  = (colorKey === "bomb" ? 55 : 38) + Math.random() * 50;
        const rad   = angle * Math.PI / 180;
        const dx    = Math.cos(rad) * dist;
        const dy    = Math.sin(rad) * dist;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const w     = 7 + Math.random() * 7;
        const h     = w * 1.3;
        const dur   = 0.35 + Math.random() * 0.2;
        drop.style.cssText = `
          left:${cx - w/2}px; top:${cy - h/2}px;
          width:${w}px; height:${h}px;
          background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.8), ${color});
          --dx:${dx}px; --dy:${dy}px;
          animation:dropletFly ${dur}s ease-out forwards;
          box-shadow:0 1px 4px rgba(0,0,0,0.10);
        `;
        gameArea.appendChild(drop);
        setTimeout(() => drop.remove(), dur * 1000 + 50);
      }
    }

    function spawnBubble() {
      if (!isPlaying) return;
      const rnd = Math.random();
      if      (rnd < 0.10) spawnGolden();
      else if (rnd < 0.18) spawnBomb();
      else                 spawnGrade();
    }

    function spawnGrade() {
      const item   = grades[Math.floor(Math.random() * grades.length)];
      const bubble = document.createElement("div");
      bubble.className = `grade ${item.type}`;
      bubble.innerHTML = `<img class="animal-img" src="${item.img}" alt="${item.g}" /><div class="grade-text">${item.g}</div>`;

      const size = 88;
      const pos  = getNonOverlappingPosition(size);
      if (!pos) return;
      bubble.style.left = `${pos.x}px`;
      bubble.style.top  = `${pos.y}px`;

      bubble.onclick = () => {
        if (!isPlaying) return;
        bubble.classList.add("popping");
        spawnDroplets(pos.x + size/2, pos.y + size/2, item.type);
        playSound(item.score > 0 ? "good" : "bad");

        let gained = item.score;
        if (isFever && gained > 0) gained *= 2;
        score += gained;

        if (gained > 0) {
          combo++;
          const label = isFever ? `+${gained} 🔥` : `+${gained}`;
          if (combo === 5 && !isFever) {
            startFever();
            showEffect(pos.x, pos.y - 20, "🔥 FEVER!", "#c87f00", true);
          } else if (combo >= 3) {
            showEffect(pos.x + 15, pos.y, `콤보 ${combo}! ${label}`, "#418554");
          } else {
            showEffect(pos.x + 24, pos.y, label, "#418554");
          }
        } else {
          combo = 0;
          if (isFever) endFever();
          showEffect(pos.x + 24, pos.y, `${gained}`, "#b35a60");
        }

        scoreEl.textContent = score;
        comboEl.textContent = combo;
        setTimeout(() => bubble.remove(), 350);
      };

      gameArea.appendChild(bubble);
      setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 2200);
    }

    function spawnGolden() {
      const bubble = document.createElement("div");
      bubble.className = "grade golden";
      bubble.innerHTML = `<img class="special-img" src="${IMG.golden}" alt="황금버블" /><div class="grade-subtext" style="color:#5a3c00">+3초</div>`;

      const size = 88;
      const pos  = getNonOverlappingPosition(size);
      if (!pos) return;
      bubble.style.left = `${pos.x}px`;
      bubble.style.top  = `${pos.y}px`;

      bubble.onclick = () => {
        if (!isPlaying) return;
        bubble.classList.add("popping");
        spawnDroplets(pos.x + size/2, pos.y + size/2, "golden");
        playSound("golden");
        time += 3;
        timeEl.textContent = time;
        showEffect(pos.x + 10, pos.y, "+3초!", "#b08000", true);
        setTimeout(() => bubble.remove(), 350);
      };

      gameArea.appendChild(bubble);
      setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 2500);
    }

    function spawnBomb() {
      const bubble = document.createElement("div");
      bubble.className = "grade bomb";
      bubble.innerHTML = `<img class="special-img" src="${IMG.bomb}" alt="폭탄" /><div class="grade-subtext" style="color:#ff9999">위험!</div>`;

      const size = 88;
      const pos  = getNonOverlappingPosition(size);
      if (!pos) return;
      bubble.style.left = `${pos.x}px`;
      bubble.style.top  = `${pos.y}px`;

      bubble.onclick = () => {
        if (!isPlaying) return;
        bubble.classList.add("popping");
        playSound("bomb");

        const blast = document.createElement("div");
        blast.className = "bomb-blast";
        blast.style.cssText = `left:${pos.x - 44}px; top:${pos.y - 44}px; width:176px; height:176px;`;
        gameArea.appendChild(blast);
        setTimeout(() => blast.remove(), 500);

        spawnDroplets(pos.x + size/2, pos.y + size/2, "bomb");
        Array.from(gameArea.querySelectorAll(".grade:not(.popping)")).forEach(b => b.remove());

        score = Math.max(0, score - 15);
        combo = 0;
        if (isFever) endFever();

        scoreEl.textContent = score;
        comboEl.textContent = combo;
        showEffect(pos.x, pos.y, "💣 -15점!", "#cc2200", true);
        setTimeout(() => bubble.remove(), 350);
      };

      gameArea.appendChild(bubble);
      setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 2000);
    }

    function showEffect(x, y, text, color, big = false) {
      const fx = document.createElement("div");
      fx.className   = big ? "hit-effect big" : "hit-effect";
      fx.textContent = text;
      fx.style.left  = `${Math.max(0, x)}px`;
      fx.style.top   = `${Math.max(0, y)}px`;
      fx.style.color = color;
      gameArea.appendChild(fx);
      setTimeout(() => fx.remove(), 750);
    }
    function startCountdown(callback) {
      overlay.classList.remove('show');
      const cdOverlay = document.getElementById('countdownOverlay');
      const cdImg = document.getElementById('countdownImg');
      cdOverlay.classList.add('active');
      const nums = [3, 2, 1];
      let idx = 0;
      function showNext() {
        if (idx >= nums.length) {
          cdOverlay.classList.remove('active');
          callback();
          return;
        }
        cdImg.src = '../assets/images/countdown_' + nums[idx] + '.png';
        cdImg.style.animation = 'none';
        cdImg.offsetHeight;
        cdImg.style.animation = 'countPop 0.9s ease forwards';
        idx++;
        setTimeout(showNext, 1000);
      }
      showNext();
    }
  </script>

  <style>
    @keyframes countPop {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      30%  { transform: translate(-50%, -50%) scale(1.0);  opacity: 1; }
      80%  { transform: translate(-50%, -50%) scale(1.0);  opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8);  opacity: 0; }
    }
    #countdownOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 9999;
      background: rgba(0,0,0,0.55);
    }
    #countdownOverlay.active { display: block; }
    #countdownImg {
      position: absolute;
      top: 50%; left: 50%;
      height: 380px; width: auto;
      animation: countPop 0.9s ease forwards;
    }
  </style>
</body>
</html>
