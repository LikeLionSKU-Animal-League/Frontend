<!DOCTYPE html>
<!-- 학점 사냥: 제한 시간 안에 학점 버블을 탭해 점수를 모으는 미니게임 (단일 HTML) -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>동물의 왕국 : 학점 사냥</title>
  <style>
    * {
      box-sizing: border-box;
    }

    /* 전체 페이지: 그라데이션 배경·중앙 정렬·가로 스크롤 숨김 */
    body {
      margin: 0;
      font-family: "Trebuchet MS", "맑은 고딕", sans-serif;
      background:
        linear-gradient(180deg, #bfe9ff 0%, #dff7d8 45%, #fdf4d8 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #3d413d;
      overflow-x: hidden;
      padding: 12px calc(12px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom))
        calc(12px + env(safe-area-inset-left));
    }

    /* 최대 너비 컨테이너 */
    .wrap {
      width: 960px;
      max-width: 100%;
      padding: 22px;
    }

    button,
    .lobby-link,
    .start-btn,
    .kakao-share-result-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* 메인 흰 카드 + 숲 느낌 테두리 */
    .shell {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.97);
      border: 3px solid #eef8e7;
      box-shadow: 0 18px 40px rgba(92, 132, 97, 0.18);
    }

    .cloud, .leaf, .flower {
      position: absolute;
      pointer-events: none;
      opacity: 0.65;
      z-index: 0;
    }

    /* 배경 장식(구름·잎·꽃) — 클릭 불가 */
    .cloud {
      font-size: 42px;
      opacity: 0.45;
    }

    .leaf {
      font-size: 24px;
      opacity: 0.28;
    }

    .flower {
      font-size: 22px;
      opacity: 0.35;
    }

    .cloud1 { top: 12px; left: 24px; }
    .cloud2 { top: 30px; right: 90px; }
    .leaf1 { top: 92px; left: 14px; transform: rotate(-12deg); }
    .leaf2 { top: 80px; right: 24px; transform: rotate(16deg); }
    .leaf3 { bottom: 32px; left: 120px; transform: rotate(-8deg); }
    .leaf4 { bottom: 22px; right: 145px; transform: rotate(10deg); }
    .flower1 { bottom: 24px; left: 42px; }
    .flower2 { bottom: 18px; right: 44px; }

    /* 상단: 제목·정보 */
    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* 제목 블록 */
    .title h1 {
      margin: 0;
      font-size: clamp(20px, 4.2vw, 30px);
      color: #4f7b55;
      letter-spacing: -1px;
    }

    .title p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #738476;
    }

    /* 게임 시작 (전역 startGame 호출) */
    .start-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: #4f4a2b;
      background: linear-gradient(135deg, #ffe18a, #ffcd67);
      box-shadow: 0 10px 22px rgba(216, 170, 58, 0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .start-btn:hover {
      transform: translateY(-1px);
    }

    .start-btn:active {
      transform: scale(0.97);
    }

    /* 시작 버튼 + 안내 메시지 줄 */
    .controls {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    /* 안내·결과 메시지 */
    #result {
      flex: 1;
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #f7fff3);
      border: 2px solid #e4f1df;
      color: #5a6f5f;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.4;
      margin: 0;
    }

    /* 점수·콤보·남은 시간 한 줄 */
    .status {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 6px;
    }

    /* 정보 칸 하나 */
    .status-box {
      flex: 1 1 0;
      min-width: 0;
      background: linear-gradient(180deg, #ffffff, #f7fff3);
      border: 2px solid #e6f4df;
      border-radius: 12px;
      padding: 6px 8px;
      text-align: center;
    }

    .status-label {
      font-size: 10px;
      color: #8aa18d;
      margin-bottom: 2px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .status-value {
      font-size: 18px;
      font-weight: 900;
      color: #43664a;
      line-height: 1.1;
    }

    /* 학점 버블이 뜨는 플레이 영역 */
    #gameArea {
      position: relative;
      z-index: 1;
      width: 100%;
      height: min(600px, calc(100vh - 220px));
      height: min(600px, calc(100dvh - 220px));
      min-height: 440px;
      overflow: hidden;
      border-radius: 30px;
      border: 4px solid #8ec18f;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.55), transparent 20%),
        radial-gradient(circle at 80% 20%, rgba(255,250,220,0.45), transparent 18%),
        linear-gradient(180deg, #ccf0ff 0%, #dff8d6 48%, #9dd48f 100%);
    }

    /* 배경 태양 장식 */
    .sun {
      position: absolute;
      top: 28px;
      right: 40px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff7bb 20%, #ffe27d 70%);
      box-shadow: 0 0 24px rgba(255, 224, 111, 0.4);
      z-index: 0;
    }

    /* 언덕(둥근 타원) 레이어 */
    .hill {
      position: absolute;
      border-radius: 50%;
      z-index: 0;
    }

    .hill1 {
      width: 320px;
      height: 140px;
      left: -30px;
      bottom: 36px;
      background: #9ed48d;
    }

    .hill2 {
      width: 360px;
      height: 155px;
      left: 220px;
      bottom: 24px;
      background: #8fca7d;
    }

    .hill3 {
      width: 310px;
      height: 135px;
      right: -20px;
      bottom: 42px;
      background: #a5da92;
    }

    /* 맨 아래 잔디 바닥 띠 */
    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 82px;
      background: linear-gradient(180deg, #7dc36f 0%, #5b9d56 100%);
      z-index: 0;
      border-top: 4px solid rgba(75, 128, 69, 0.35);
    }

    /* 나무(줄기+수관) */
    .tree {
      position: absolute;
      z-index: 0;
    }

    .tree .trunk {
      width: 20px;
      height: 68px;
      background: #9b6c43;
      border-radius: 10px;
      margin: 0 auto;
    }

    .tree .top {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #67b66d;
      margin: 0 auto -10px;
      box-shadow:
        -24px 8px 0 0 #7ec97d,
        24px 8px 0 0 #7bc37a;
    }

    .tree1 { left: 48px; bottom: 68px; }
    .tree2 { right: 72px; bottom: 72px; transform: scale(0.95); }

    /* 탭하는 학점 버블 */
    .grade {
      position: absolute;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
      cursor: pointer;
      z-index: 2;
      border: 3px solid rgba(255,255,255,0.95);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
      animation: popIn 0.24s ease, floaty 1.6s ease-in-out infinite alternate;
      transition: transform 0.12s ease;
      backdrop-filter: blur(2px);
    }

    .grade:hover {
      transform: scale(1.08);
    }

    .grade:active {
      transform: scale(0.95);
    }

    .animal {
      font-size: 26px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .grade-text {
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    /* 학점 등급별 색 (CSS 클래스 = grades[].type) */
    .grade.good {
      background: linear-gradient(135deg, #dff8cc, #f5ffe9);
      color: #3e7d43;
    }

    .grade.mid {
      background: linear-gradient(135deg, #e8f2ff, #f7fbff);
      color: #446a95;
    }

    .grade.low {
      background: linear-gradient(135deg, #fff2cb, #fff9e9);
      color: #8c6f28;
    }

    .grade.bad {
      background: linear-gradient(135deg, #ffe7d1, #fff4ea);
      color: #956334;
    }

    .grade.worst {
      background: linear-gradient(135deg, #f5e7c9, #fff7e7);
      color: #8b6c35;
      box-shadow: 0 10px 18px rgba(120, 96, 50, 0.12);
    }

    /* +점수 / 감점 텍스트가 떠오르는 효과 */
    .hit-effect {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      font-size: 19px;
      font-weight: 900;
      animation: riseFade 0.7s ease forwards;
    }

    /* 카카오 공유 버튼 행 */
    .result-card {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    /* 하단 규칙 안내 */
    .guide {
      position: relative;
      z-index: 1;
      margin-top: 12px;
      text-align: center;
      color: #7b9180;
      font-size: 14px;
      line-height: 1.6;
    }

    /* 버블 등장 */
    @keyframes popIn {
      from {
        transform: scale(0.45);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* 버블이 위아래로 살짝 떠 있음 */
    @keyframes floaty {
      from {
        translate: 0 0;
      }
      to {
        translate: 0 -6px;
      }
    }

    /* 히트 이펙트 상승 페이드 */
    @keyframes riseFade {
      0% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-26px);
      }
    }

    /* 로비 복귀 링크 */
    .lobby-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      color: #4f7b55;
      background: #e8f5e9;
      border: 2px solid #c8e6c9;
      text-decoration: none;
      margin-bottom: 14px;
    }

    .lobby-link:hover {
      background: #dcf2de;
    }

    /* 태블릿·폰 */
    @media (max-width: 700px) {
      .wrap {
        padding: 14px 10px;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .start-btn {
        width: 100%;
        min-height: 48px;
        font-size: 16px;
      }

      #result {
        font-size: 12px;
        min-height: auto;
        padding: 10px 12px;
      }

      #gameArea {
        height: min(70vh, 600px);
        min-height: 360px;
      }

      .grade {
        width: 72px;
        height: 72px;
      }

      .animal {
        font-size: 23px;
      }

      .grade-text {
        font-size: 16px;
      }

      .kakao-share-result-btn {
        width: 100%;
        min-height: 48px;
        font-size: 16px;
      }
    }

    /* 종료 후 카카오 공유 */
    .kakao-share-result-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 800;
      color: #191919;
      background: #fee500;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .kakao-share-result-btn:hover {
      transform: translateY(-2px);
    }

    .kakao-share-result-btn.hidden {
      display: none !important;
    }

    /* ===== 시작·종료 오버레이 ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 40, 15, 0.52);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .overlay.show { display: flex; }

    .overlay-card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      border: 3px solid #e4f1df;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #4f7b55;
    }

    .overlay-card p {
      margin: 0 0 20px;
      color: #5a6f5f;
      font-size: 15px;
      line-height: 1.65;
    }

    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #overlayActionBtn {
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #71c3ff, #4a9fe3);
      box-shadow: 0 10px 22px rgba(60, 148, 225, 0.24);
      font-family: inherit;
      transition: transform 0.15s ease;
    }

    #overlayActionBtn:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="lobby-link" id="lobbyBackLink" href="../index.html?lobby=1">← 로비로 돌아가기</a>
    <div class="shell">
      <!-- 배경 장식 (이모지) -->
      <div class="cloud cloud1">☁️</div>
      <div class="cloud cloud2">☁️</div>
      <div class="leaf leaf1">🍃</div>
      <div class="leaf leaf2">🌿</div>
      <div class="leaf leaf3">🍃</div>
      <div class="leaf leaf4">🌿</div>
      <div class="flower flower1">🌼</div>
      <div class="flower flower2">🌼</div>

      <!-- 제목 + 점수 -->
      <div class="topbar">
        <div class="title">
          <h1>🐾 동물의 왕국 : 학점 사냥</h1>
          <p>짧은 시간 안에 높은 학점을 많이 잡고, 함정 학점은 피하세요!</p>
        </div>
        <div class="status">
          <div class="status-box">
            <div class="status-label">점수</div>
            <div class="status-value" id="score">0</div>
          </div>
          <div class="status-box">
            <div class="status-label">콤보</div>
            <div class="status-value" id="combo">0</div>
          </div>
          <div class="status-box">
            <div class="status-label">남은 시간</div>
            <div class="status-value" id="time">15</div>
          </div>
        </div>
      </div>

      <!-- 시작 버튼 + 안내 메시지 -->
      <div class="controls">
        <button class="start-btn" onclick="startGame()">게임 시작</button>
        <div id="result">시작 버튼을 누르면 귀여운 동물 학점들이 숲속에 나타나요!</div>
      </div>

      <!-- 플레이 영역: 배경 + 스크립트가 .grade 버블 추가 -->
      <div id="gameArea">
        <div class="sun"></div>
        <div class="tree tree1">
          <div class="top"></div>
          <div class="trunk"></div>
        </div>
        <div class="tree tree2">
          <div class="top"></div>
          <div class="trunk"></div>
        </div>
        <div class="hill hill1"></div>
        <div class="hill hill2"></div>
        <div class="hill hill3"></div>
        <div class="ground"></div>
      </div>

      <!-- 규칙 요약 -->
      <div class="guide">
        A+ / A는 고득점 · B 계열은 무난 · D와 F는 감점이에요!
      </div>
    </div>
  </div>

  <!-- 시작·종료 오버레이 -->
  <div class="overlay show" id="overlay">
    <div class="overlay-card">
      <h2 id="overlayTitle">🐾 동물의 왕국 : 학점 사냥</h2>
      <p id="overlayDesc">짧은 시간 안에 높은 학점을 많이 잡고, 함정 학점은 피하세요!</p>
      <div class="overlay-actions">
        <button type="button" id="overlayActionBtn">게임 시작</button>
        <button
          type="button"
          id="kakaoShareResultBtn"
          class="kakao-share-result-btn hidden"
          onclick="shareToKakao()"
        >결과 공유하기</button>
      </div>
    </div>
  </div>

  <!-- 카카오 공유 SDK -->
  <script
    src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
    integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
    crossorigin="anonymous"
  ></script>
  <script>
    /* ========== 학점 사냥 게임 로직 ========== */

    const STORAGE_SCHOOL = "animalLeagueSchool";
    const API_BASE =
      window.ANIMAL_LEAGUE_API ||
      (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:3000"
        : "https://backend-m5wz.onrender.com");

    /** URL ?school= 우선, 없으면 로컬스토리지 (로비와 출처가 다를 때 대비) */
    function getLeagueSchool() {
      try {
        const q = (new URLSearchParams(window.location.search).get("school") || "").trim();
        if (q) {
          try {
            localStorage.setItem(STORAGE_SCHOOL, q);
          } catch {
            /* ignore */
          }
          return q;
        }
      } catch {
        /* ignore */
      }
      return (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
    }

    /** 로비 링크에 학교 쿼리 유지 */
    function setLobbyBackLink() {
      const a = document.getElementById("lobbyBackLink");
      if (!a) return;
      const school = getLeagueSchool();
      a.setAttribute(
        "href",
        school
          ? `../index.html?lobby=1&school=${encodeURIComponent(school)}`
          : "../index.html?lobby=1"
      );
    }

    /** 리그 서버에 점수 제출 (학교 미설정 시 생략) */
    function submitScoreToLeague(game, value) {
      const school = getLeagueSchool();
      if (!school) {
        if (!window.__leagueSchoolMissingWarned) {
          window.__leagueSchoolMissingWarned = true;
          alert("학교 정보가 없어 점수를 저장할 수 없습니다. 로비에서 학교를 먼저 입력해 주세요.");
        }
        return;
      }

      const score = Math.round(Number(value));
      if (!Number.isFinite(score)) return;

      fetch(`${API_BASE}/api/scores`, {
        method: "POST",
        keepalive: true,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ school, game, score })
      }).catch(() => {});
    }

    setLobbyBackLink();

    /* --- 카카오 공유 --- */
    const KAKAO_JS_APP_KEY = "fa75c82718597e9124f913d174cd92a2";

    /** 공유 링크·썸네일에 쓰는 사이트 기준 URL (로컬 테스트 시에는 origin 사용) */
    const SHARE_SITE_ORIGIN = "https://campus-animal-battle.vercel.app";
    const SHARE_FEED_IMAGE_URL = `${SHARE_SITE_ORIGIN}/assets/game-preview.png`;

    /** 인트로 생략 → 로비(또는 학교 입력)로 바로 진입. index.html `wantsLobbyFromQuery`와 동일 쿼리 규약 */
    function buildShareLobbyUrl() {
      const school = getLeagueSchool();
      const base = `${SHARE_SITE_ORIGIN}/?lobby=true`;
      return school ? `${base}&school=${encodeURIComponent(school)}` : base;
    }

    /* 카카오 JS SDK 1회 초기화 */
    (function initKakaoSdk() {
      if (!window.Kakao || !KAKAO_JS_APP_KEY) return;
      if (!Kakao.isInitialized()) {
        Kakao.init(KAKAO_JS_APP_KEY);
      }
    })();

    /** 플레이 중에는 공유 버튼 숨김 */
    function hideKakaoShareButton() {
      const btn = document.getElementById("kakaoShareResultBtn");
      if (btn) btn.classList.add("hidden");
    }

    /** 게임 종료 후 공유 버튼 표시 */
    function showKakaoShareButton() {
      const btn = document.getElementById("kakaoShareResultBtn");
      if (btn) btn.classList.remove("hidden");
    }

    /** 카카오톡 피드로 로비 링크 공유 */
    function shareToKakao() {
      if (!window.Kakao || !Kakao.isInitialized()) {
        alert("카카오 SDK를 불러오지 못했거나 초기화되지 않았습니다.");
        return;
      }
      const u = buildShareLobbyUrl();
      Kakao.Share.sendDefault({
        objectType: "feed",
        content: {
          title: "캠퍼스 애니멀 배틀 🐾",
          description: "우리 학교를 대표해 호랑이로 진화해보자!",
          imageUrl: SHARE_FEED_IMAGE_URL,
          link: {
            mobileWebUrl: u,
            webUrl: u
          }
        },
        buttons: [
          {
            title: "게임 참여하기",
            link: {
              mobileWebUrl: u,
              webUrl: u
            }
          }
        ]
      });
    }

    /* 등급별 점수·CSS 타입·동물 이모지 */
    const grades = [
      { g: "A+", score: 10, type: "good", animal: "🐯" },
      { g: "A", score: 8, type: "good", animal: "🦁" },
      { g: "B+", score: 6, type: "mid", animal: "🐴" },
      { g: "B", score: 5, type: "mid", animal: "🐱" },
      { g: "C+", score: 3, type: "low", animal: "🦜" },
      { g: "C", score: 2, type: "low", animal: "🐿️" },
      { g: "D", score: -2, type: "bad", animal: "🐢" },
      { g: "F", score: -10, type: "worst", animal: "🦝" }
    ];

    /* --- 런타임 상태 --- */
    let score = 0;
    let combo = 0;
    let time = 15;
    let gameInterval = null;
    let spawnInterval = null;
    let hardModeInterval = null;
    let isPlaying = false;

    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const timeEl = document.getElementById("time");
    const resultEl = document.getElementById("result");
    const gameArea = document.getElementById("gameArea");

    /* 오버레이 요소 */
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayDesc = document.getElementById("overlayDesc");
    const overlayActionBtn = document.getElementById("overlayActionBtn");
    overlayActionBtn.addEventListener("click", startGame);

    /** 점수·콤보·시간 표시만 DOM에 반영 */
    function resetUI() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      timeEl.textContent = time;
    }

    /** 게임 시작 시 배경 HTML(태양·나무·언덕·땅) 다시 채움 */
    function restoreBackgroundObjects() {
      gameArea.innerHTML = `
        <div class="sun"></div>
        <div class="tree tree1">
          <div class="top"></div>
          <div class="trunk"></div>
        </div>
        <div class="tree tree2">
          <div class="top"></div>
          <div class="trunk"></div>
        </div>
        <div class="hill hill1"></div>
        <div class="hill hill2"></div>
        <div class="hill hill3"></div>
        <div class="ground"></div>
      `;
    }

    /** 종료 시 플레이 영역 비우기 */
    function clearGameArea() {
      gameArea.innerHTML = "";
    }

    /**
     * 기존 학점 버블과 겹치지 않는 (x,y) 무작위 위치
     * @returns {{x:number,y:number}|null} 실패 시 null
     */
    function getNonOverlappingPosition(size, areaWidth, areaHeight) {
      const existingGrades = Array.from(gameArea.querySelectorAll(".grade"));
      const maxTries = 50;
      const minDistance = 82;

      for (let i = 0; i < maxTries; i++) {
        const x = Math.random() * (areaWidth - size);
        const y = Math.random() * (areaHeight - size - 70);

        let overlapped = false;

        for (const grade of existingGrades) {
          const gx = parseFloat(grade.style.left);
          const gy = parseFloat(grade.style.top);

          const dx = x - gx;
          const dy = y - gy;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < minDistance) {
            overlapped = true;
            break;
          }
        }

        if (!overlapped) {
          return { x, y };
        }
      }

      return null;
    }

    /** 타이머·스폰 시작, 7초 후 스폰 간격 단축 */
    function startGame() {
      /* 오버레이 닫기 */
      overlay.classList.remove("show");

      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      clearTimeout(hardModeInterval);

      score = 0;
      combo = 0;
      time = 15;
      isPlaying = true;

      restoreBackgroundObjects();
      resetUI();
      resultEl.textContent = "게임 시작! 좋은 학점을 빠르게 잡아보세요!";
      hideKakaoShareButton();

      spawnInterval = setInterval(spawnGrade, 700);

      hardModeInterval = setTimeout(() => {
        clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnGrade, 500);
      }, 7000);

      /* 1초마다 남은 시간 감소 */
      gameInterval = setInterval(() => {
        time--;
        timeEl.textContent = time;

        if (time <= 0) {
          endGame();
        }
      }, 1000);
    }

    /** 무작위 등급 버블 하나 생성·클릭 처리·일정 시간 후 제거 */
    function spawnGrade() {
      if (!isPlaying) return;

      const item = grades[Math.floor(Math.random() * grades.length)];
      const bubble = document.createElement("div");
      bubble.className = `grade ${item.type}`;
      bubble.innerHTML = `
        <div class="animal">${item.animal}</div>
        <div class="grade-text">${item.g}</div>
      `;

      const areaWidth = gameArea.clientWidth;
      const areaHeight = gameArea.clientHeight;
      const size = 82;

      const pos = getNonOverlappingPosition(size, areaWidth, areaHeight);
      if (!pos) return;

      const x = pos.x;
      const y = pos.y;

      bubble.style.left = `${x}px`;
      bubble.style.top = `${y}px`;

      bubble.onclick = () => {
        if (!isPlaying) return;

        score += item.score;

        /* 플러스 학점: 콤보 증가, 3콤보마다 보너스 */
        if (item.score > 0) {
          combo++;
          if (combo >= 3) {
            score += 5;
            showEffect(x + 15, y, "콤보 +5!", "#418554");
          } else {
            showEffect(x + 24, y, `+${item.score}`, "#418554");
          }
        } else {
          /* 감점 학점: 콤보 리셋 */
          combo = 0;
          showEffect(x + 24, y, `${item.score}`, "#b35a60");
        }

        scoreEl.textContent = score;
        comboEl.textContent = combo;
        bubble.remove();
      };

      gameArea.appendChild(bubble);

      /* 탭하지 않으면 자연 소멸 */
      setTimeout(() => {
        bubble.remove();
      }, 2200);
    }

    /** 클릭 지점 위 떠오르는 텍스트 */
    function showEffect(x, y, text, color) {
      const fx = document.createElement("div");
      fx.className = "hit-effect";
      fx.textContent = text;
      fx.style.left = `${x}px`;
      fx.style.top = `${y}px`;
      fx.style.color = color;
      gameArea.appendChild(fx);

      setTimeout(() => fx.remove(), 700);
    }

    /** 시간 종료: 인터벌 정리·결과 오버레이·서버 제출 */
    function endGame() {
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      clearTimeout(hardModeInterval);

      isPlaying = false;
      clearGameArea();

      let message = "";

      /* 최종 점수 구간별 칭찬 문구 */
      if (score >= 90) {
        message = "완벽한 학점 사냥! 엄청난 실력이에요.";
      } else if (score >= 70) {
        message = "훌륭한 성과예요! 상위권 점수입니다.";
      } else if (score >= 50) {
        message = "좋은 기록이에요! 조금만 더 빨라지면 돼요.";
      } else if (score >= 30) {
        message = "나쁘지 않아요. 다음 판엔 더 집중해봐요.";
      } else {
        message = "이번에는 아쉬웠어요. 다시 도전해보세요!";
      }

      /* 결과 오버레이 표시 */
      overlayTitle.textContent = "🎯 게임 종료!";
      overlayDesc.innerHTML = `최종 점수 <strong style="color:#4f7b55;font-size:22px">${score}</strong>점<br />${message}`;
      overlayActionBtn.textContent = "다시 하기";
      showKakaoShareButton();
      overlay.classList.add("show");

      resultEl.textContent = `최종 점수 ${score}점 · ${message}`;
      submitScoreToLeague("grade-hunt", score);
    }
  </script>
</body>
</html>
