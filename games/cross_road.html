<!DOCTYPE html>
<!-- 사자의 길 건너기: Canvas 기반 횡단보도·강·통나무 미니게임 (단일 HTML) -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>사자의 길 건너기</title>
  <style>
    @font-face {
      font-family: "neodgm";
      src: url("../assets/fonts/neodgm.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    /* 전역 박스 모델 */
    * { box-sizing: border-box; }

    /* iOS 글자 자동 확대 방지 */
    html {
      -webkit-text-size-adjust: 100%;
    }

    /* 페이지 배경·상단 정렬·세이프 에리어 패딩 */
    body {
      margin: 0;
      font-family: "neodgm", "맑은 고딕", sans-serif;
      background: url('../assets/images/game_background.png') center center / cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      color: #263746;
      padding: 16px calc(12px + env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom))
        calc(12px + env(safe-area-inset-left));
    }

    /* 버튼·링크: 탭 하이라이트 제거 */
    button,
    .lobby-link {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* 본문 최대 너비 */
    .wrap {
      width: min(560px, 96vw);
    }

    /* 흰 카드 메인 패널 */
    .shell {
      background: rgba(255,255,255,0.97);
      border: 3px solid #eef8e7;
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(92, 132, 97, 0.18);
    }

    .lobby-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      background: #e8f5e9;
      border: 2px solid #c8e6c9;
      color: #4f7b55;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .lobby-link:hover {
  background: #dcf2de;
}

    /* 제목 + 점수·목숨·난이도 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    /* 게임 제목 */
    .title h1 {
      margin: 0;
      font-size: 26px;
      color: #304e6f;
    }

    /* 한 줄 설명 */
    .title p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #698198;
    }

    /* 점수·목숨·난이도 박스 묶음 */
    .status {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    /* 상태 한 칸 */
    .status-box {
      min-width: 78px;
      padding: 8px 12px;
      text-align: center;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff, #f7fff3);
      border: 2px solid #e6f4df;
    }

    /* 상태 라벨(작은 글씨) */
    .status-label {
      font-size: 11px;
      color: #7a90a4;
      margin-bottom: 3px;
    }

    /* 상태 숫자·텍스트 */
    .status-value {
      font-size: 22px;
      font-weight: 800;
      color: #2e4b69;
    }

    /* 다시하기 + 메시지 */
    .controls {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    /* 일반 버튼 */
    button {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }

    /* 현재 판 다시 */
    /* 안내 문구 영역 */
    #message {
      flex: 1;
      min-height: 42px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-radius: 16px;
      background: #f7fbff;
      border: 2px solid #e1ebf5;
      color: #60788d;
      font-weight: 700;
      font-size: 14px;
    }

    .game-wrap {
  position: relative;
}

    /* Canvas + 오버레이 + D패드의 부모(터치 스크롤 방지) */
    #game {
      position: relative;
      border-radius: 18px;
      border: 4px solid #8ec18f;
      overflow: hidden;
      line-height: 0;
      touch-action: none;
    }

    /* 논리 해상도는 width/height 속성, 화면에는 100% 너비로 스케일 */
    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    /* 조작법 안내 */
    .legend {
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 14px;
      background: #f7fbff;
      border: 2px solid #e1ebf5;
      font-size: 12px;
      color: #60788d;
      font-weight: 700;
      line-height: 1.5;
    }

    /* 아주 좁은 화면 */
    @media (max-width: 480px) {
      body {
        padding: 12px 10px calc(20px + env(safe-area-inset-bottom));
      }

      .shell {
        padding: 14px 12px;
      }

      .title h1 {
        font-size: 21px;
      }

      #message {
        font-size: 13px;
        min-height: auto;
        padding: 10px 12px;
      }

      .overlay-card {
        width: min(340px, 92vw);
        max-height: min(85dvh, 85vh);
        overflow-y: auto;
        padding: 20px 14px;
      }

      .overlay-actions button {
        min-height: 46px;
      }

      .legend {
        font-size: 11px;
      }
    }

    /* 모바일 방향 패드: 좌하단·세이프 에리어 (900px 이하에서 표시) */
    .dpad {
      display: none;
      position: absolute;
      left: calc(0px + env(safe-area-inset-left, 0px));
      bottom: calc(0px + env(safe-area-inset-bottom, 0px));
      transform: none;
      z-index: 18;
      justify-content: flex-start;
      align-items: flex-end;
      pointer-events: none;
    }

    /* 3×3 그리드 */
    .dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 6px;
      pointer-events: auto;
      padding: 8px;
      border-radius: 10px;
      /* 밝은 유리 느낌 — 뒤 게임이 비치도록 (모바일 게임 UI 참고) */
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    /* 태블릿 이하에서 패드 표시 */
    @media (max-width: 900px) {
      .dpad {
        display: flex;
      }
    }

    /* 가로 모드에서 패드 셀 간격 축소 */
    @media (max-width: 900px) and (orientation: landscape) {
      .dpad-grid {
        padding: 0;
        gap: 2px;
        border-radius: 8px;
      }
    }

    /* 방향 버튼 한 칸 */
    .dpad-btn {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: rgba(235, 240, 246, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.55);
      color: rgba(48, 52, 62, 0.88);
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 1px 3px rgba(0, 0, 0, 0.06);
      transition: background 0.1s, transform 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* 패드 버튼 눌렀을 때 */
    .dpad-btn:active {
      background: rgba(220, 228, 238, 0.58);
      border-color: rgba(255, 255, 255, 0.75);
      transform: scale(0.94);
    }

    /* 그리드 빈 칸(자리만 차지) */
    .dpad-empty {
      visibility: hidden;
      pointer-events: none;
    }

    /* 시작·게임오버 전체 덮개 */
    .overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(20, 40, 15, 0.38);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 50;
  border-radius: 28px;
}

    /* 오버레이 안 흰 카드 */
    .overlay-card {
      width: min(340px, 88%);
      padding: 26px 22px;
      border-radius: 24px;
      background: white;
      border: 3px solid #e8f0f6;
      box-shadow: 0 20px 36px rgba(0,0,0,0.2);
      text-align: center;
    }

    /* 오버레이 제목 */
    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #304b68;
    }

    /* 오버레이 설명 */
    .overlay-card p {
      margin: 0 0 18px;
      font-size: 15px;
      color: #6a8095;
      line-height: 1.7;
    }

    /* 오버레이 버튼 줄 */
    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 시작 */
    #overlayStartBtn {
      background: linear-gradient(135deg, #71c3ff, #4a9fe3);
      color: white;
      box-shadow: 0 10px 22px rgba(60, 148, 225, 0.24);
    }

    /* 다시 시작(준비) */
    #overlayRestartBtn {
      background: linear-gradient(135deg, #ffe08a, #ffcd67);
      color: #64490f;
    }

    /* 카카오 공유 */
    #kakaoShareResultBtn {
      background: #fee500;
      color: #191919;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    /* 공유 버튼 숨김 */
    #kakaoShareResultBtn.hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="lobby-link" id="lobbyBackLink" href="../index.html?lobby=1">← 로비로 돌아가기</a>

    <div class="shell">

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <h2 id="overlayTitle">게임 준비</h2>
      <p id="overlayDesc">차를 피하고, 통나무 위에서 강을 건너 맨 위 줄에 도달하면 점수를 얻습니다.</p>
      <div class="overlay-actions">

          결과 공유하기

  <!-- 제목 + 점수·목숨·난이도 -->
  <div class="topbar">
    <div class="title">
      <h1>🦁 사자의 길 건너기</h1>
      <p>차를 피하고 통나무를 타고 강을 건너 목적지에 도달하세요!</p>
    </div>
    <div class="status">
      <div class="status-box">
        <div class="status-label">점수</div>
        <div class="status-value" id="score">0</div>
      </div>
      <div class="status-box">
        <div class="status-label">목숨</div>
        <div class="status-value" id="lives">3</div>
      </div>
      <div class="status-box">
        <div class="status-label">난이도</div>

      <!-- 다시하기 + 메시지 -->
      <div class="controls">
        <div id="message">오버레이의 시작 버튼으로 진행하세요.</div>
      </div>

      <!-- Canvas 게임 영역 + 오버레이 + 모바일 D패드 -->
      <div class="game-wrap">
  <div id="game">
    <canvas id="gameCanvas" width="480" height="560"></canvas>

    <!-- 터치용 방향키 -->
    <div class="dpad" id="crossDpad" aria-label="이동 조작">
      <div class="dpad-grid">
        <div class="dpad-empty"></div>
        <button type="button" class="dpad-btn" id="btnUp">▲</button>
        <div class="dpad-empty"></div>
        <button type="button" class="dpad-btn" id="btnLeft">◀</button>
        <div class="dpad-empty"></div>
        <button type="button" class="dpad-btn" id="btnRight">▶</button>
        <div class="dpad-empty"></div>
        <button type="button" class="dpad-btn" id="btnDown">▼</button>
        <div class="dpad-empty"></div>
      </div>
    </div>
  </div>

  <!-- 시작 / 게임오버 오버레이 -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <h2 id="overlayTitle">게임 준비</h2>
      <p id="overlayDesc">차를 피하고, 통나무 위에서 강을 건너 맨 위 줄에 도달하면 점수를 얻습니다.</p>
      <div class="overlay-actions">
        <button id="overlayStartBtn">시작</button>
        <button id="overlayRestartBtn">다시 시작</button>
        <button type="button" id="kakaoShareResultBtn" class="hidden" onclick="shareToKakao()">
          결과 공유하기
        </button>
      </div>
    </div>
  </div>
</div>

      <div class="legend">이동: ← ↑ ↓ → 또는 W A S D &nbsp;|&nbsp; 통나무 위에서는 함께 흘러갑니다</div>
    </div>
  </div>

  <!-- 카카오 SDK (공유) -->
  <script
    src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
    integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
    crossorigin="anonymous"
  ></script>
<script>
/* ========== 사자의 길 건너기 게임 로직 ========== */

/* --- 리그(학교) 식별·백엔드 URL --- */
const STORAGE_SCHOOL = 'animalLeagueSchool';
const API_BASE =
  window.ANIMAL_LEAGUE_API ||
  (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3000'
    : 'https://backend-m5wz.onrender.com');

/** URL ?school= 또는 로컬스토리지에서 학교 문자열 */
function getLeagueSchool() {
  try {
    const q = (new URLSearchParams(window.location.search).get('school') || '').trim();
    if (q) {
      try {
        localStorage.setItem(STORAGE_SCHOOL, q);
      } catch (_) {}
      return q;
    }
  } catch (_) {}
  return (localStorage.getItem(STORAGE_SCHOOL) || '').trim();
}

/** 로비로 돌아가기 링크에 학교 쿼리 반영 */
function setLobbyBackLink() {
  const a = document.getElementById('lobbyBackLink');
  if (!a) return;
  const school = getLeagueSchool();
  a.setAttribute(
    'href',
    school ? `../index.html?lobby=1&school=${encodeURIComponent(school)}` : '../index.html?lobby=1'
  );
}

/** 미니게임 점수를 리그 서버에 POST (학교 없으면 생략) */
function submitScoreToLeague(game, value) {
  const school = getLeagueSchool();
  if (!school) {
    if (!window.__leagueSchoolMissingWarned) {
      window.__leagueSchoolMissingWarned = true;
      alert('학교 정보가 없어 점수를 저장할 수 없습니다. 로비에서 학교를 먼저 입력해 주세요.');
    }
    return;
  }
  const s = Math.round(Number(value));
  if (!Number.isFinite(s)) return;
  fetch(`${API_BASE}/api/scores`, {
    method: 'POST',
    keepalive: true,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ school, game, score: s }),
  }).catch(() => {});
}

setLobbyBackLink();

/* --- 카카오 공유 --- */
const KAKAO_JS_APP_KEY = 'fa75c82718597e9124f913d174cd92a2';
const SHARE_SITE_ORIGIN = 'https://campus-animal-battle.vercel.app';
const SHARE_FEED_IMAGE_URL = `${SHARE_SITE_ORIGIN}/assets/game-preview.png`;

/** 공유용 로비 URL (?lobby=true, 학교 있으면 &school=) */
function buildShareLobbyUrl() {
  const school = getLeagueSchool();
  const base = `${SHARE_SITE_ORIGIN}/?lobby=true`;
  return school ? `${base}&school=${encodeURIComponent(school)}` : base;
}

(function initKakaoSdk() {
  if (!window.Kakao || !KAKAO_JS_APP_KEY) return;
  if (!Kakao.isInitialized()) Kakao.init(KAKAO_JS_APP_KEY);
})();

/** 게임오버 전까지 공유 버튼 숨김 */
function hideKakaoShareButton() {
  const btn = document.getElementById('kakaoShareResultBtn');
  if (btn) btn.classList.add('hidden');
}

/** 게임오버 시 공유 버튼 표시 */
function showKakaoShareButton() {
  const btn = document.getElementById('kakaoShareResultBtn');
  if (btn) btn.classList.remove('hidden');
}

/** 카카오톡 피드 공유 */
function shareToKakao() {
  if (!window.Kakao || !Kakao.isInitialized()) {
    alert('카카오 SDK를 불러오지 못했거나 초기화되지 않았습니다.');
    return;
  }
  const u = buildShareLobbyUrl();
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: '캠퍼스 애니멀 배틀 🐾',
      description: '우리 학교를 대표해 호랑이로 진화해보자!',
      imageUrl: SHARE_FEED_IMAGE_URL,
      link: { mobileWebUrl: u, webUrl: u },
    },
    buttons: [{ title: '게임 참여하기', link: { mobileWebUrl: u, webUrl: u } }],
  });
}

/* --- Canvas·UI 참조 --- */
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const msgEl   = document.getElementById('message');

const overlay        = document.getElementById('overlay');
const overlayTitle   = document.getElementById('overlayTitle');
const overlayDesc    = document.getElementById('overlayDesc');
const overlayStartBtn   = document.getElementById('overlayStartBtn');
const overlayRestartBtn = document.getElementById('overlayRestartBtn');


/* --- 격자·타일·맵 행 구성 (행 번호는 위에서 0) --- */
const COLS = 10;
const ROWS = 14;
const TILE = 40;
const OX   = 40; // 캔버스 왼쪽 여백(도로·물 그릴 때 보정)

const ROAD_ROWS  = [2, 3, 4, 6, 7, 8];
const WATER_ROWS = [10, 11, 12];
const GOAL_ROW   = 0;
const START_ROW  = 13;

const LANE_COLOR = { road: '#555', grass: '#4a7c3f', water: '#1e6bb8', goal: '#8bc34a' };

/* --- 효과음 (assets/sounds) --- */
const S = {};
const SDIR = '../assets/sounds/';
[
  ['step_grass', 'footstep_grass_000.mp3'],
  ['step_wood',  'footstep_wood_000.mp3'],
  ['step_road',  'footstep_concrete_002.mp3'],
  ['hit',        'impactPunch_heavy_000.mp3'],
  ['splash',     'impactSoft_heavy_000.mp3'],
  ['goal',       'jingles_PIZZI13.mp3'],
  ['score_up',   'powerUp2.mp3'],
  ['gameover',   'lowDown.mp3'],
].forEach(([k, f]) => {
  const a = new Audio(SDIR + f);
  a.preload = 'auto';
  S[k] = a;
});

/* --- 이미지 프리로드 --- */
const IMGS = {};
const IDIR = '../assets/images/cross_road/';
[
  'long_log', 'short_log', 'road', 'river', 'glass', 'street-lion',
  ...Array.from({ length: 9 }, (_, i) => [`car${i+1}_left`, `car${i+1}_right`]).flat(),
].forEach(name => {
  const img = new Image();
  img.onload = () => { IMGS[name] = img; };
  img.src = IDIR + name + '.png';
});

/* 게임 배경 이미지 */
const bgImg = new Image();
bgImg.src = '../assets/images/background.png';

/** 효과음 재생(겹침 재생을 위해 cloneNode) */
function play(key, vol = 0.5) {
  const src = S[key];
  if (!src) return;
  try { const c = src.cloneNode(); c.volume = vol; c.play().catch(() => {}); } catch (_) {}
}

/** 밟은 줄 종류에 따라 발소리 종류 */
function stepSound(row) {
  if (WATER_ROWS.includes(row)) return 'step_wood';
  if (ROAD_ROWS.includes(row))  return 'step_road';
  return 'step_grass';
}

/* --- 파티클·화면 흔들림·플래시 --- */
let particles = [];
let shake = { x: 0, y: 0, dur: 0 };
let flash = { a: 0, color: '#fff' };

/** 충돌·골 등에서 파티클 추가 */
function addParticles(wx, wy, n, color) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 4;
    particles.push({
      x: wx, y: wy,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1,
      r: 3 + Math.random() * 5, life: 1,
      decay: 0.025 + Math.random() * 0.03, color,
    });
  }
}

/* --- 런타임 상태 --- */
let player, cars, logs, score, lives, gameStarted, gameOver, dying, animFrameId;
let scoreSubmitted = false;

function submitScoreOnce() {
  if (scoreSubmitted) return;
  submitScoreToLeague('cross-road', score);
  scoreSubmitted = true;
}

/** 한 판 준비: 위치 초기화·차·통나무 생성·오버레이 */
function prepareGame() {
  if (gameStarted && !gameOver && score > 0) {
    submitScoreOnce();
  }
  cancelAnimationFrame(animFrameId);
  player = { px: 5 * TILE, row: START_ROW, sx: 1, sy: 1, sqTimer: 0, sqTX: 1, sqTY: 1 };
  cars = []; logs = []; particles = [];
  shake = { x: 0, y: 0, dur: 0 };
  flash = { a: 0, color: '#fff' };
  score = 0; lives = 3;
  gameStarted = false; gameOver = false; dying = false;
  scoreSubmitted = false;
  updateUI();
  spawnObjects();
  showOverlay('🦁 사자의 길 건너기', '차를 피하고 통나무를 타서 강을 건너<br />목적지에 도달하면 점수를 얻습니다!', 'init');
  drawStatic();
}

/** 오버레이 닫고 메인 루프 시작 */
function startGame() {
  hideOverlay();
  gameStarted = true;
  msgEl.textContent = '방향키 또는 WASD로 이동하세요!';
  cancelAnimationFrame(animFrameId);
  loop();
}

/**
 * @param {'init'|'start'|'over'} mode
 *   init  = 첫 진입 (시작 버튼만)
 *   start = 준비/재시작 (시작 + 다시 시작)
 *   over  = 게임 오버 (다시 시작 + 카카오 공유)
 */
function showOverlay(title, desc, mode) {
  overlayTitle.textContent = title;
  overlayDesc.innerHTML    = desc;
  overlay.style.display    = 'flex';

  if (mode === 'over') {
    overlayStartBtn.style.display   = 'none';
    overlayRestartBtn.style.display = 'inline-block';
  } else if (mode === 'init') {
    overlayStartBtn.style.display   = 'inline-block';
    overlayRestartBtn.style.display = 'none';
  } else {
    overlayStartBtn.style.display   = 'inline-block';
    overlayRestartBtn.style.display = 'inline-block';
  }

  const kBtn = document.getElementById('kakaoShareResultBtn');
  if (kBtn) kBtn.classList.toggle('hidden', mode !== 'over');
}

/** 오버레이 닫기 */
function hideOverlay() {
  overlay.style.display = 'none';
}

/** 배경 타일 한 번 그림(준비 화면) */
function drawStatic() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (bgImg.complete && bgImg.naturalWidth) {
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
  }
  ctx.globalAlpha = 0.55;
  for (let r = 0; r < ROWS; r++) {
    drawBgRow(r);
  }
  ctx.globalAlpha = 1;
}

/** 누적 점수에 따라 0~3 단계 난이도 인덱스 */
function getDifficulty() {
  if (score >= 7) return 3;
  if (score >= 5) return 2;
  if (score >= 3) return 1;
  return 0;
}

/* 난이도별 차·통나무 개수·속도·통나무 길이 */
const DIFF = [
  { carCount: [2, 0], carSpd: [0.025, 0.020], logCount: 2, logSpd: [0.015, 0.010], logW: 3.0 },
  { carCount: [2, 1], carSpd: [0.035, 0.025], logCount: 2, logSpd: [0.020, 0.015], logW: 2.5 },
  { carCount: [3, 1], carSpd: [0.050, 0.030], logCount: 2, logSpd: [0.028, 0.018], logW: 2.2 },
  { carCount: [3, 2], carSpd: [0.070, 0.035], logCount: 3, logSpd: [0.038, 0.020], logW: 1.9 },
];

/** 도로 행에 차, 물 행에 통나무 배치 */
function spawnObjects() {
  const d = DIFF[getDifficulty()];
  ROAD_ROWS.forEach((row, i) => {
    const dir   = i % 2 === 0 ? 1 : -1;
    const spd   = (d.carSpd[0] + Math.random() * d.carSpd[1]) * TILE;
    const count = d.carCount[0] + Math.floor(Math.random() * (d.carCount[1] + 1));
    const side  = dir > 0 ? 'left' : 'right';
    for (let c = 0; c < count; c++) {
      const n = Math.floor(Math.random() * 9) + 1;
      cars.push({
        row, dir, speed: spd,
        x: (c * COLS / count) * TILE,
        w: TILE * 1.5,
        imgKey: `car${n}_${side}`,
      });
    }
  });

  WATER_ROWS.forEach((row, i) => {
    const dir = i % 2 === 0 ? 1 : -1;
    const spd = (d.logSpd[0] + Math.random() * d.logSpd[1]) * TILE;
    for (let c = 0; c < d.logCount; c++) {
      logs.push({ row, dir, speed: spd, x: (c * COLS / d.logCount) * TILE, w: TILE * d.logW });
    }
  });
}

/* --- 메인 루프 (requestAnimationFrame) --- */
let lastTime = 0;
function loop(ts = 0) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  update(dt);
  draw();
  if (!gameOver) animFrameId = requestAnimationFrame(loop);
}

/** 차·통나무 이동, 통나무 위 플레이어 끌려감, 이펙트·충돌 검사 */
function update(dt) {
  const maxX = COLS * TILE;

  /* 차: 끝에서 끝으로 래핑 */
  cars.forEach(car => {
    car.x += car.dir * car.speed * dt * 60;
    if (car.x > maxX)      car.x = -car.w;
    if (car.x + car.w < 0) car.x = maxX;
  });

  /* 통나무 이동 + 같은 줄에 서 있으면 X 같이 이동 */
  logs.forEach(log => {
    const prevX = log.x;
    log.x += log.dir * log.speed * dt * 60;
    if (log.x > maxX)      log.x = -log.w;
    if (log.x + log.w < 0) log.x = maxX;

    if (!dying && WATER_ROWS.includes(player.row) && log.row === player.row) {
      const pcx = player.px + TILE / 2;
      if (pcx >= prevX && pcx <= prevX + log.w) {
        const delta = log.x - prevX;
        if (Math.abs(delta) < TILE * 3) player.px += delta;
      }
    }
  });

  /* 이동 직후 스쿼시(늘어짐) 애니메이션 타이머 */
  if (player.sqTimer > 0) {
    player.sqTimer -= dt;
    const t = Math.max(0, player.sqTimer / 0.15);
    player.sx = 1 + (player.sqTX - 1) * t;
    player.sy = 1 + (player.sqTY - 1) * t;
  } else { player.sx = 1; player.sy = 1; }

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life -= p.decay; p.r *= 0.96;
  });

  if (shake.dur > 0) {
    shake.dur -= dt;
    const m = shake.dur * 14;
    shake.x = (Math.random() - 0.5) * m;
    shake.y = (Math.random() - 0.5) * m;
  } else { shake.x = 0; shake.y = 0; }

  if (flash.a > 0) flash.a -= dt * 3.5;

  if (!dying) checkCollision();
}

/** 물에 빠짐·차 침 검사 */
function checkCollision() {
  const pcx = player.px + TILE / 2;
  const pr  = player.row;

  if (player.px < -TILE * 0.6 || player.px > COLS * TILE + TILE * 0.1) {
    die('splash'); return;
  }
  if (WATER_ROWS.includes(pr)) {
    const onLog = logs.some(l => l.row === pr && pcx >= l.x && pcx <= l.x + l.w);
    if (!onLog) die('splash');
  }
  if (ROAD_ROWS.includes(pr)) {
    if (cars.some(c => c.row === pr && pcx >= c.x && pcx <= c.x + c.w)) die('hit');
  }
}

/**
 * 목숨 감소·이펙트·목숨 0이면 게임오버
 * @param {'hit'|'splash'} type 차 충돌 vs 물
 */
function die(type) {
  if (dying) return;
  dying = true;
  lives--;
  updateUI();

  const wx = OX + player.px + TILE / 2;
  const wy = player.row * TILE + TILE / 2;

  if (type === 'hit') {
    play('hit', 0.7);
    addParticles(wx, wy, 22, '#ff6040');
    shake.dur = 0.4; flash.color = '#ff2020'; flash.a = 0.5;
    msgEl.textContent = '앗, 차에 치였어요!';
  } else {
    play('splash', 0.7);
    addParticles(wx, wy, 18, '#80cfff');
    addParticles(wx, wy, 8, '#ffffff');
    shake.dur = 0.3; flash.color = '#4499ff'; flash.a = 0.35;
    msgEl.textContent = '풍덩! 물에 빠졌어요!';
  }

  if (lives <= 0) {
    setTimeout(() => {
      play('gameover', 0.8);
      gameOver = true;
      showOverlay('🎯 게임 오버', `최종 점수 <strong style="font-size:22px;color:#2e4b69">${score}</strong>점<br />다시 도전해 보세요!`, 'over');
      msgEl.textContent = '게임 오버!';
      submitScoreOnce();
    }, 700);
  } else {
    /* 목숨 남음: 잠시 후 시작 줄로 리스폰 */
    setTimeout(() => {
      if (!gameOver) {
        player.px = 5 * TILE; player.row = START_ROW;
        dying = false;
        msgEl.textContent = '방향키 또는 WASD로 이동하세요!';
      }
    }, 900);
  }
}

/** 이동 방향에 따라 잠깐 스쿼시 스케일 */
function squash(dr) {
  if (dr !== 0) { player.sqTX = 0.65; player.sqTY = 1.4; }
  else          { player.sqTX = 1.4;  player.sqTY = 0.65; }
  player.sx = player.sqTX; player.sy = player.sqTY;
  player.sqTimer = 0.15;
}

/** 매 프레임 전체 씬 렌더 */
function draw() {
  ctx.save();
  ctx.translate(shake.x, shake.y);
  ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);

  if (bgImg.complete && bgImg.naturalWidth) {
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
  }

  /* 줄마다 배경 + 도로 중앙선 + 물결선 */
  ctx.globalAlpha = 0.55;
  for (let r = 0; r < ROWS; r++) {
    drawBgRow(r);
    if (ROAD_ROWS.includes(r)) {
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(0, r * TILE + TILE / 2);
      ctx.lineTo(canvas.width, r * TILE + TILE / 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    if (WATER_ROWS.includes(r)) {
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1.5;
      for (let wx = 4; wx < canvas.width; wx += 30) {
        ctx.beginPath();
        ctx.arc(wx + (Date.now() / 600 % 30), r * TILE + TILE * 0.35, 7, Math.PI, 0);
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 1;

  logs.forEach(log => {
    const img = IMGS[log.w >= TILE * 2.0 ? 'long_log' : 'short_log'];
    if (img) {
      ctx.drawImage(img, OX + log.x, log.row * TILE, log.w, TILE);
    } else {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(OX + log.x, log.row * TILE + 4, log.w, TILE - 8);
    }
  });

  cars.forEach(car => {
    const img = IMGS[car.imgKey];
    const fallbackImg = IMGS[car.dir > 0 ? 'car1_left' : 'car1_right'];
    ctx.drawImage(img || fallbackImg, OX + car.x, car.row * TILE, car.w, TILE);
  });

  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  drawPlayer(OX + player.px, player.row * TILE, TILE, player.sx, player.sy);

  /* 전체 화면 플래시 */
  if (flash.a > 0) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, flash.a);
    ctx.fillStyle = flash.color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  ctx.restore();
}

/** 행 인덱스별 바닥 색 */
function getTileColor(r) {
  if (r === GOAL_ROW)         return LANE_COLOR.goal;
  if (ROAD_ROWS.includes(r))  return LANE_COLOR.road;
  if (WATER_ROWS.includes(r)) return LANE_COLOR.water;
  return LANE_COLOR.grass;
}

/** 행 하나의 배경을 색상으로 그림 */
function drawBgRow(r) {
  ctx.fillStyle = getTileColor(r);
  ctx.fillRect(0, r * TILE, canvas.width, TILE);
}

/** 사자 스프라이트(스쿼시 스케일 적용) */
function drawPlayer(x, y, size, sx = 1, sy = 1) {
  const cx = x + size / 2, cy = y + size / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sx, sy);
  if (IMGS['street-lion']) {
    ctx.drawImage(IMGS['street-lion'], -size / 2, -size / 2, size, size);
  } else {
    ctx.font = '32px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🦁', 0, 0);
  }
  ctx.restore();
}

/**
 * 타일 단위 이동. 맨 위(goal) 도달 시 점수·재배치
 * @param {number} dc 열 변화 (-1,0,1)
 * @param {number} dr 행 변화 (-1,0,1)
 */
function movePlayer(dc, dr) {
  if (!gameStarted || gameOver || dying) return;
  const npx = player.px + dc * TILE;
  const nr  = player.row + dr;
  if (npx < 0 || npx >= COLS * TILE) return;
  if (nr < GOAL_ROW || nr > START_ROW) return;

  player.px = npx; player.row = nr;
  squash(dr);
  play(stepSound(nr), 0.4);

  if (nr === GOAL_ROW) {
    score++;
    updateUI();
    play('goal', 0.8);
    play('score_up', 0.5);
    addParticles(OX + player.px + TILE / 2, TILE / 2, 35, '#ffe060');
    addParticles(OX + player.px + TILE / 2, TILE / 2, 15, '#ffffff');
    flash.color = '#ffffaa'; flash.a = 0.45;
    msgEl.textContent = '건넜다! 계속 도전해봐요!';
    /* 골인 후 잠시 뒤 시작 줄로, 난이도는 점수에 따라 spawnObjects에서 반영 */
    setTimeout(() => {
      if (!gameOver) {
        player.px = 5 * TILE; player.row = START_ROW;
        cars = []; logs = [];
        spawnObjects();
        if (!gameOver && gameStarted) msgEl.textContent = '방향키 또는 WASD로 이동하세요!';
      }
    }, 800);
  }
}

/* --- 키보드: 방향키 + WASD (한 프레임 중복 방지) --- */
const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.key]) return;
  keys[e.key] = true;

  let dc = 0, dr = 0;
  if (e.key === 'ArrowLeft'  || e.key === 'a') dc = -1;
  if (e.key === 'ArrowRight' || e.key === 'd') dc =  1;
  if (e.key === 'ArrowUp'    || e.key === 'w') dr = -1;
  if (e.key === 'ArrowDown'  || e.key === 's') dr =  1;
  if (!dc && !dr) return;
  e.preventDefault();
  movePlayer(dc, dr);
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

/** 모바일 D패드 한 방향 */
function bindDpadBtn(id, dc, dr) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); if (navigator.vibrate) navigator.vibrate(12); movePlayer(dc, dr); }, { passive: false });
  btn.addEventListener('mousedown',  e => { e.preventDefault(); movePlayer(dc, dr); });
}
bindDpadBtn('btnUp',    0, -1);
bindDpadBtn('btnDown',  0,  1);
bindDpadBtn('btnLeft', -1,  0);
bindDpadBtn('btnRight', 1,  0);

/* --- 캔버스 스와이프로 이동 --- */
let swipeStart = null;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  swipeStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!swipeStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStart.x;
  const dy = t.clientY - swipeStart.y;
  swipeStart = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    movePlayer(dx > 0 ? 1 : -1, 0);
  } else {
    movePlayer(0, dy > 0 ? 1 : -1);
  }
}, { passive: true });

overlayStartBtn.addEventListener('click', () => startCountdown(startGame));
overlayRestartBtn.addEventListener('click', () => { prepareGame(); });

const DIFF_LABELS = ['쉬움', '보통', '어려움', '매우 어려움'];
const DIFF_COLORS = ['#2e7d32', '#1565c0', '#e65100', '#b71c1c'];
const diffEl = document.getElementById('diffText');

/** 점수·목숨·난이도 라벨 갱신 */
function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  const d = getDifficulty();
  diffEl.textContent  = DIFF_LABELS[d];
  diffEl.style.color  = DIFF_COLORS[d];
}

/* 첫 로드: 준비 상태로 맵만 그리기 */
prepareGame();

function startCountdown(callback) {
  hideOverlay();
  const cdOverlay = document.getElementById('countdownOverlay');
  const cdImg = document.getElementById('countdownImg');
  cdOverlay.classList.add('active');
  const nums = [3, 2, 1];
  let idx = 0;
  function showNext() {
    if (idx >= nums.length) {
      cdOverlay.classList.remove('active');
      callback();
      return;
    }
    cdImg.src = '../assets/images/countdown_' + nums[idx] + '.png';
    cdImg.style.animation = 'none';
    cdImg.offsetHeight;
    cdImg.style.animation = 'countPop 0.9s ease forwards';
    idx++;
    setTimeout(showNext, 1000);
  }
  showNext();
}
</script>

<style>
  @keyframes countPop {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    30%  { transform: translate(-50%, -50%) scale(1.0);  opacity: 1; }
    80%  { transform: translate(-50%, -50%) scale(1.0);  opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8);  opacity: 0; }
  }
  #countdownOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 9999;
    background: rgba(0,0,0,0.55);
  }
  #countdownOverlay.active { display: block; }
  #countdownImg {
    position: absolute;
    top: 50%; left: 50%;
    height: 380px; width: auto;
    animation: countPop 0.9s ease forwards;
  }
</style>
<div id="countdownOverlay"><img id="countdownImg" src="" alt="" /></div>
