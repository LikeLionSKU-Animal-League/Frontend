<!DOCTYPE html>
<!-- 교수님 몰래 강의실 탈출: 단일 HTML 파일(스타일·스크립트 포함) -->
<html lang="ko">
<head>
  <!-- 문자 인코딩·모바일 뷰포트·노치(safe-area) 대응 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>교수님 몰래 강의실 탈출</title>
  <style>
    /* ---------- 전역 박스 모델·텍스트 크기 ---------- */
    * { box-sizing: border-box; }

    /* iOS 등에서 글자가 임의로 커지지 않도록 */
    html {
      -webkit-text-size-adjust: 100%;
    }

    /* 페이지 전체: 배경 그라데이션·중앙 정렬·최소 높이·안전 영역 패딩 */
    body {
      margin: 0;
      font-family: "Arial", "맑은 고딕", sans-serif;
      background: linear-gradient(180deg, #d8ebff 0%, #f7fbff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: #263746;
      padding: 12px calc(10px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom))
        calc(10px + env(safe-area-inset-left));
    }

    /* 게임을 감싸는 최대 너비 컨테이너 */
    .wrap {
      width: 1180px;
      max-width: 100%;
      padding: 18px;
    }

    /* 버튼·로비 링크: 탭 하이라이트 제거·터치 반응 개선 */
    button,
    .lobby-link {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* 흰 카드 형태의 메인 패널 */
    .shell {
      background: rgba(255,255,255,0.97);
      border: 3px solid #dde9f5;
      border-radius: 28px;
      padding: 14px 16px;
      box-shadow: 0 18px 42px rgba(62, 95, 130, 0.16);
    }

    /* 상단: 제목 영역 + 상태(단계·시간) 한 줄 묶음 */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* 게임 제목 */
    .title h1 {
      margin: 0;
      font-size: clamp(20px, 4.2vw, 30px);
      color: #304e6f;
      line-height: 1.2;
    }

    /* 부제·설명 문구 */
    .title p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #698198;
      line-height: 1.45;
    }

    /* 단계·남은 시간·상태를 나란히 표시 */
    .status {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 6px;
      width: 100%;
    }

    /* 상태 한 칸(박스) */
    .status-box {
      flex: 1 1 0;
      min-width: 0;
      padding: 6px 8px;
      text-align: center;
      border-radius: 12px;
      background: #f7fbff;
      border: 2px solid #e0ebf6;
    }

    /* 상태 라벨(작은 글씨) */
    .status-label {
      font-size: 10px;
      color: #7a90a4;
      margin-bottom: 2px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* 상태 숫자·텍스트 값 */
    .status-value {
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 800;
      color: #2e4b69;
      line-height: 1.15;
      word-break: keep-all;
    }

    /* 다시하기 버튼 + 안내 메시지 줄 */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    /* 일반 버튼 기본 스타일 */
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    /* 버튼 호버 시 살짝 떠오름 */
    button:hover {
      transform: translateY(-1px);
    }

    /* 로비로 돌아가기 링크(버튼처럼 보이게) */
    .lobby-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      color: #304e6f;
      background: #e8f2fc;
      border: 2px solid #cfe3f5;
      text-decoration: none;
      margin-bottom: 10px;
    }

    /* 로비 링크 호버 배경 */
    .lobby-link:hover {
      background: #dceaf9;
    }

    /* 현재 단계 다시 버튼(노란 강조) */
    #restartBtn {
      background: linear-gradient(135deg, #ffe18a, #ffcd67);
      color: #664a10;
      box-shadow: 0 10px 22px rgba(216, 170, 58, 0.22);
    }

    /* 컨트롤 옆 짧은 안내 문구 영역 */
    #message {
      flex: 1;
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 14px;
      background: #f7fbff;
      border: 2px solid #e1ebf5;
      color: #60788d;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.4;
    }

    /* 모바일 방향 패드: 좌하단·안전 영역만큼 띄움·기본은 숨김(미디어쿼리에서 표시) */
    .classroom-dpad {
      display: none;
      position: absolute;
      left: calc(0px + env(safe-area-inset-left, 0px));
      bottom: calc(0px + env(safe-area-inset-bottom, 0px));
      transform: none;
      z-index: 25;
      justify-content: flex-start;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: none;
    }

    /* 방향키 3×3 그리드(가운데 빈 칸 포함) */
    .classroom-dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 26px);
      grid-template-rows: repeat(3, 26px);
      gap: 3px;
      pointer-events: auto;
      padding: 1px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    /* 패드에서 자리만 차지하는 빈 셀 */
    .classroom-dpad-empty {
      visibility: hidden;
      pointer-events: none;
    }

    /* 방향 버튼 한 칸 */
    .classroom-dpad-btn {
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: rgba(235, 240, 246, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.55);
      font-size: 12px;
      font-weight: 800;
      color: rgba(48, 52, 62, 0.88);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 1px 3px rgba(0, 0, 0, 0.06);
      transition: transform 0.08s ease, background 0.08s ease, border-color 0.08s ease;
      touch-action: manipulation;
    }

    /* 방향 버튼 눌렀을 때 */
    .classroom-dpad-btn:active {
      transform: scale(0.94);
      background: rgba(220, 228, 238, 0.58);
      border-color: rgba(255, 255, 255, 0.75);
    }

    /* 게임이 그려지는 바깥 프레임(스케일된 크기·테두리) */
    .game-viewport {
      /* 너비·높이는 updateGameViewportScale에서 지정 — 논리 무대가 1140보다 넓어질 수 있음 */
      width: 100%;
      max-width: none;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 24px;
      border: 4px solid #8faec8;
      position: relative;
      background: #d8b587;
      line-height: 0;
      /* 전역 border-box여도 여기서는 콘텐츠 너비 = 스케일된 게임 픽셀과 일치시키기 위해 */
      box-sizing: content-box;
    }

    /* 실제 게임 논리 좌표(1140×720 기준, transform으로 축소) */
    #game {
      position: relative;
      min-width: 1140px;
      width: 1140px;
      height: 720px;
      overflow: hidden;
      border-radius: 0;
      border: none;
      background: #d8b587;
      transform-origin: top left;
    }

    /* 강의실 위쪽 벽 */
    .wall {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 220px;
      background: linear-gradient(180deg, #eef6ff 0%, #f9fcff 100%);
      z-index: 0;
    }

    /* 바닥(줄무늬) */
    .floor {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 500px;
      background:
        repeating-linear-gradient(
          90deg,
          #ddb98b 0 48px,
          #d4af82 48px 50px
        );
      z-index: 0;
    }

    /* 칠판 */
    .board {
      position: absolute;
      left: calc(50% - 235px);
      top: 34px;
      width: 470px;
      height: 120px;
      background: linear-gradient(180deg, #2d8054 0%, #246846 100%);
      border: 10px solid #9b6a3f;
      border-radius: 12px;
      z-index: 1;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    /* 칠판 위 문구(가상 요소) */
    .board::after {
      content: "오늘의 수업 : 끝까지 집중하세요";
      position: absolute;
      left: 24px;
      top: 38px;
      color: rgba(255,255,255,0.9);
      font-size: 25px;
      font-weight: 700;
    }

    /* 창문 공통 */
    .window {
      position: absolute;
      top: 36px;
      width: 160px;
      height: 110px;
      background: linear-gradient(180deg, #c7ebff 0%, #ebf9ff 100%);
      border: 8px solid #d5dfe8;
      border-radius: 12px;
      z-index: 1;
    }

    /* 좌·우 창 위치 */
    .window.left { left: 60px; }
    .window.right { right: 60px; }

    /* 창문 십자 창살 */
    .window::before,
    .window::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.72);
    }

    /* 세로 창살 */
    .window::before {
      width: 4px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    /* 가로 창살 */
    .window::after {
      width: 100%;
      height: 4px;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    /* 교탁 */
    .teacher-desk {
      position: absolute;
      left: calc(50% - 140px);
      top: 178px;
      width: 280px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(180deg, #a9784a 0%, #8d5f37 100%);
      z-index: 1;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    }

    /* 출구 문 */
    .door {
      position: absolute;
      right: 18px;
      bottom: 190px;
      width: 92px;
      height: 170px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(180deg, #85552f 0%, #6d3f20 100%);
      border: 5px solid #5e361c;
      z-index: 1;
    }

    /* 문 손잡이(원) */
    .door::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 80px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f4d36a;
    }

    /* 자물쇠 아이콘(학생증 전) */
    .door-lock {
      position: absolute;
      right: 120px;
      bottom: 238px;
      z-index: 2;
      font-size: 28px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    /* 학생증 아이템(원형) */
    #passItem {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff0a8 20%, #ffd45f 70%);
      border: 3px solid white;
      z-index: 7;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      box-shadow: 0 10px 16px rgba(226, 180, 60, 0.28);
      animation: ce-float-bob 1.8s ease-in-out infinite;
    }

    /* 학생증 이모지 */
    #passItem::after { content: "🪪"; }

    /* 학생 책상 */
    .desk {
      position: absolute;
      width: 64px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(180deg, #c98c58 0%, #b07343 100%);
      border: 3px solid #8d5c34;
      z-index: 2;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    }

    /* 책상 다리 두 개 */
    .desk::before,
    .desk::after {
      content: "";
      position: absolute;
      bottom: -9px;
      width: 6px;
      height: 12px;
      background: #6e4a2a;
      border-radius: 3px;
    }

    .desk::before { left: 12px; }
    .desk::after { right: 12px; }

    /* 플레이어(학생) 원형 마커 */
    #player {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(180deg, #76c8ff 0%, #4599df 100%);
      border: 3px solid white;
      z-index: 10;
      box-shadow: 0 8px 14px rgba(33, 87, 147, 0.24);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
    }

    #player::after { content: "🎓"; }

    /* 교수 캐릭터 이미지 */
    .professor {
      position: absolute;
      width: 80px;
      height: 80px;
      object-fit: contain;
      z-index: 9;
      pointer-events: none;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.16));
    }

    /* 교수 발밑 그림자 */
    .prof-shadow {
      position: absolute;
      width: 62px;
      height: 14px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      z-index: 4;
      pointer-events: none;
      filter: blur(2px);
    }

    /* 교수 시야(부채꼴 느낌의 그라데이션) */
    .vision {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      filter: blur(1px);
      transform-origin: center center;
      background: linear-gradient(90deg, rgba(255, 72, 72, 0.30), rgba(255, 72, 72, 0.04));
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
    }

    /* 조작법 안내 박스 */
    .legend {
      position: absolute;
      left: 18px;
      bottom: 16px;
      z-index: 12;
      padding: 11px 13px;
      border-radius: 14px;
      background: rgba(255,255,255,0.8);
      border: 2px solid rgba(142, 169, 197, 0.36);
      font-size: 13px;
      color: #506478;
      line-height: 1.6;
    }

    /* 시작·클리어·게임오버 시 전체 덮는 반투명 레이어 */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(17, 24, 33, 0.44);
      backdrop-filter: blur(3px);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* 오버레이 안 흰 카드 */
    .overlay-card {
      width: min(560px, 92%);
      padding: 28px 24px;
      border-radius: 26px;
      background: white;
      border: 3px solid #e8f0f6;
      box-shadow: 0 22px 36px rgba(0,0,0,0.18);
      text-align: center;
      transform: scale(0.94);
      transition: transform 0.22s ease;
    }

    .overlay.is-visible .overlay-card {
      transform: scale(1);
    }

    /* 오버레이 제목 */
    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #304b68;
    }

    /* 오버레이 설명 문단 */
    .overlay-card p {
      margin: 0 0 18px;
      font-size: 17px;
      color: #6a8095;
      line-height: 1.7;
    }

    /* 오버레이 버튼 묶음 */
    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 다음 단계 버튼(클리어 후에만 표시) */
    #nextStageBtn {
      display: none;
      background: linear-gradient(135deg, #8fe28f, #5cbf69);
      color: white;
      box-shadow: 0 10px 22px rgba(84, 176, 98, 0.24);
    }

    /* 오버레이 시작 버튼 */
    #overlayStartBtn {
      background: linear-gradient(135deg, #71c3ff, #4a9fe3);
      color: white;
      box-shadow: 0 10px 22px rgba(60, 148, 225, 0.24);
    }

    /* 오버레이 다시 준비 버튼 */
    #overlayRestartBtn {
      background: linear-gradient(135deg, #ffe08a, #ffcd67);
      color: #64490f;
    }

    /* 카카오톡 공유 버튼 */
    #kakaoShareResultBtn {
      background: #fee500;
      color: #191919;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    /* 공유 버튼 숨김 유틸 */
    #kakaoShareResultBtn.hidden {
      display: none !important;
    }

    /* ---------- 태블릿 이하: 세로 스크롤·패드 표시 등 ---------- */
    @media (max-width: 900px) {
      /* 세로로 길게 스크롤 가능하게 */
      body {
        align-items: flex-start;
      }

      .wrap {
        padding: 10px 8px;
      }

      .shell {
        padding: 12px 10px;
      }

      /* 버튼과 메시지를 세로로 쌓음 */
      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      #restartBtn {
        min-height: 48px;
      }

      #message {
        min-height: auto;
        font-size: 12px;
      }

      /* 모바일에서만 방향 패드 표시 */
      .classroom-dpad {
        display: flex;
      }

      .overlay-card {
        width: min(360px, 92vw);
        max-height: min(85dvh, 85vh);
        overflow-y: auto;
        padding: 22px 16px;
      }

      .overlay-card h2 {
        font-size: 24px;
      }

      .overlay-actions button {
        min-height: 46px;
      }
    }

    /* 세로 모드일 때 가로 플레이 유도하는 전면 안내 */
    .portrait-gate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      background: rgba(16, 26, 40, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      touch-action: none;
    }

    /* 세로 게이트가 켜졌을 때만 보임 */
    .portrait-gate.is-open {
      display: flex;
    }

    /* 세로 게이트 안 카드 */
    .portrait-gate-card {
      width: min(360px, 100%);
      padding: 28px 22px 24px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    /* 기울이는 애니메이션 영역 */
    .portrait-gate-anim {
      margin-bottom: 18px;
    }

    /* 휴대폰 기울이기 일러스트 */
    .portrait-gate-device {
      display: block;
      width: 52px;
      height: 92px;
      margin: 0 auto;
      border-radius: 14px;
      border: 3px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.08);
      animation: ce-portrait-tilt 2.4s ease-in-out infinite;
    }

    /* 기기를 옆으로 돌리라는 반복 애니메이션 */
    @keyframes ce-portrait-tilt {
      0%,
      100% {
        transform: rotate(0deg);
      }
      35%,
      65% {
        transform: rotate(90deg);
      }
    }

    /* 세로 게이트 제목 */
    .portrait-gate-title {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 800;
      color: #f2f7ff;
      line-height: 1.35;
    }

    /* 세로 게이트 설명 */
    .portrait-gate-desc {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.55;
      color: rgba(220, 232, 248, 0.88);
    }

    /* 전체 화면 유도 버튼 */
    .portrait-gate-btn {
      width: 100%;
      max-width: 280px;
      padding: 14px 18px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: #1a2a3d;
      background: linear-gradient(180deg, #f0f6ff 0%, #d4e6fb 100%);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }

    /* 전체 화면 버튼 눌렀을 때 */
    .portrait-gate-btn:active {
      transform: scale(0.98);
    }

    /* 세로 게이트 열릴 때 body 스크롤 잠금 */
    body.ce-portrait-blocked {
      overflow: hidden;
    }

    /* 모바일 가로: 그리드로 게임 영역 + 옆 도구줄 배치 */
    @media (orientation: landscape) and (max-width: 932px) {
      /* 한 화면에 맞추고 바깥 스크롤 제거 */
      html,
      body {
        height: 100%;
        max-height: 100dvh;
        overflow: hidden;
      }

      /* 세이프 에리어 패딩 + 세로 플렉스(상단바 + 아래 영역) */
      body {
        padding: max(2px, env(safe-area-inset-top)) max(3px, env(safe-area-inset-right))
          max(2px, env(safe-area-inset-bottom)) max(3px, env(safe-area-inset-left));
        align-items: stretch;
        display: flex;
        flex-direction: column;
      }

      /* 남는 높이를 셸에 넘김 */
      .wrap {
        width: 100%;
        max-width: 100%;
        max-height: 100dvh;
        padding: 2px 4px;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      /* 상단 한 줄 + 아래는 [게임 | 컨트롤] 2열 */
      .shell {
        flex: 1 1 auto;
        min-height: 0;
        padding: 4px 6px;
        border-radius: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: auto minmax(0, 1fr);
        grid-template-areas:
          "top top"
          "game tools";
        gap: 4px 6px;
        align-items: stretch;
      }

      /* 가로에서는 공간 절약을 위해 로비 링크 숨김 */
      .lobby-link {
        display: none !important;
      }

      /* 그리드 상단 영역: 제목 + 상태 */
      .topbar {
        grid-area: top;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 0;
      }

      /* width: 100% 금지 — 스크립트가 맞춘 스케일 너비보다 뷰만 넓어져 갈색 빈칸이 생김 */
      #gameViewport {
        grid-area: game;
        min-width: 0;
        justify-self: center;
        align-self: start;
      }

      /* 오른쪽 세로 도구줄: 다시하기 등 */
      .controls {
        grid-area: tools;
        flex-direction: column;
        flex-wrap: nowrap;
        margin-bottom: 0;
        align-self: center;
        justify-content: flex-start;
        gap: 4px;
        width: auto;
      }

      /* 작은 화면에서 테두리 얇게 */
      .game-viewport {
        border-width: 2px;
        border-radius: 12px;
      }

      .classroom-dpad-grid {
        padding: 0;
        gap: 2px;
        border-radius: 8px;
      }

      /* 제목이 길어도 상태와 한 줄에 들어가도록 */
      .title {
        flex: 1 1 auto;
        min-width: 0;
      }

      .title h1 {
        font-size: clamp(14px, 3.2vw, 19px);
        margin: 0;
      }

      /* 부제는 숨겨 공간 확보 */
      .title p {
        display: none;
      }

      .status {
        flex: 0 0 auto;
        max-width: 56%;
      }

      /* 상태 칸 패딩 축소 */
      .status-box {
        padding: 4px 6px;
      }

      .status-label {
        font-size: 9px;
      }

      .status-value {
        font-size: clamp(12px, 2.8vw, 15px);
      }

      /* 가로 모드에서 다시 버튼만 작게 */
      #restartBtn {
        padding: 6px 10px;
        font-size: 11px;
        min-height: 36px;
        flex-shrink: 0;
      }

      /* 가로에서 세로 공간 확보 — 안내 문구는 숨김(패드·게임 영역 우선) */
      #message {
        display: none !important;
      }
    }

    /* ===== Game Juice Animations ===== */

    /* 학생증 둥실거리는 bob */
    @keyframes ce-float-bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* 픽업 파티클 버스트 */
    @keyframes ce-pickup-burst {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* 획득 텍스트 라이즈 페이드 */
    @keyframes ce-rise-fade {
      0%   { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    /* 문 잠금 해제 팝인 바운스 */
    @keyframes ce-pop-in {
      0%   { transform: scale(0.5); }
      60%  { transform: scale(1.35); }
      80%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .ce-pop-in { animation: ce-pop-in 0.45s ease-out !important; }

    /* 화면 플래시 페이드아웃 */
    @keyframes ce-flash-fade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 타임 압박 펄스 */
    @keyframes ce-time-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    /* 시간 12초 이하: 주황 */
    .time-urgent { color: #e07b20 !important; }

    /* 시간 5초 이하: 붉은 + 펄스 */
    .time-critical {
      color: #d02020 !important;
      animation: ce-time-pulse 0.5s ease-in-out infinite !important;
    }

    /* 최종 클리어 컨펫티 낙하 */
    @keyframes ce-confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(var(--fall-y)) rotate(var(--rotate)); opacity: 0; }
    }

    /* 분필 투척체 */
    .chalk-proj {
      position: absolute;
      width: 24px; height: 10px;
      background: linear-gradient(90deg, #f0f0e8, #d4d4c8);
      border-radius: 3px;
      z-index: 8;
      pointer-events: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }
    /* 교수 경보 표시 */
    .prof-alert {
      position: absolute;
      z-index: 22;
      font-size: 24px;
      pointer-events: none;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }
    @keyframes ce-alert-pop {
      0%   { transform: scale(0) translateY(8px); opacity:0; }
      60%  { transform: scale(1.3) translateY(-4px); }
      100% { transform: scale(1) translateY(0); opacity:1; }
    }
    .prof-alert.is-new { animation: ce-alert-pop 0.3s ease-out; }
  </style>
</head>
<body>

  <!-- 카카오 JavaScript SDK(공유 기능) -->
  <script
    src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
    integrity="sha384-l+xbElFSnPZ2rOaPrU//2FF5B4LB8FiX5q4fXYTlfcG4PGpMkE1vcL7kNXI6Cci0"
    crossorigin="anonymous"
  ></script>
  <script>
    /* ========== 강의실 탈출 게임 스크립트 ========== */
    /* ===== 논리 해상도·월드 폭 ===== */
    /** 스테이지·책상·교수 경로 등이 설계된 기준 폭 (이보다 좁은 논리 폭은 쓰지 않음) */
    const BASE_STAGE_WIDTH = 1140;
    /** 게임 무대 세로 픽셀(고정) */
    const GAME_HEIGHT = 720;
    /** 뷰포트가 더 넓으면 바닥·벽이 이어지도록 논리 폭만 확장 (비율 유지 단일 scale) */
    let gameWorldWidth = BASE_STAGE_WIDTH;

    /**
     * 요소의 안쪽 가로 너비(패딩·테두리 제외)를 구합니다.
     * @param {HTMLElement|null} el 대상 요소
     * @returns {number} 픽셀 단위 너비
     */
    function contentBoxInnerWidth(el) {
      if (!el) return 0;
      const r = el.getBoundingClientRect();
      const cs = getComputedStyle(el);
      const pl = parseFloat(cs.paddingLeft) || 0;
      const pr = parseFloat(cs.paddingRight) || 0;
      const bl = parseFloat(cs.borderLeftWidth) || 0;
      const br = parseFloat(cs.borderRightWidth) || 0;
      return Math.max(0, r.width - pl - pr - bl - br);
    }

    /**
     * 브라우저 창 크기에 맞춰 #gameViewport 크기와 #game의 scale을 맞춥니다.
     * 가로가 길면 gameWorldWidth를 늘려 좌우로 무대를 넓힙니다.
     */
    function updateGameViewportScale() {
      const vp = document.getElementById("gameViewport");
      const gameEl = document.getElementById("game");
      if (!vp || !gameEl) return;

      /* .shell 레이아웃과 모바일 가로 그리드(게임 | 컨트롤)를 함께 고려 */
      const layout = vp.parentElement;
      const narrow = window.matchMedia("(max-width: 932px)").matches;
      const landscape = window.matchMedia("(orientation: landscape)").matches;
      const toolsEl = layout && layout.querySelector ? layout.querySelector(".controls") : null;

      const rect = vp.getBoundingClientRect();
      const fullShellW = layout ? contentBoxInnerWidth(layout) : vp.clientWidth;
      let w = fullShellW;
      /* 모바일 가로: 컨트롤이 옆에 붙어 있으면 게임에 쓸 수 있는 가로 폭만큼만 사용 */
      if (landscape && narrow && layout && toolsEl) {
        const tr = toolsEl.getBoundingClientRect();
        const lr = layout.getBoundingClientRect();
        const sideBySide = Math.abs(tr.top - rect.top) < 48;
        if (sideBySide && tr.width > 20 && tr.width < lr.width * 0.55) {
          const lcs = getComputedStyle(layout);
          const innerLeft =
            lr.left +
            (parseFloat(lcs.borderLeftWidth) || 0) +
            (parseFloat(lcs.paddingLeft) || 0);
          w = Math.max(120, tr.left - innerLeft - 4);
        }
      }
      if (w <= 0) return;

      /* 남은 세로: 주소창·키보드(visualViewport)와 셸 패딩을 반영 */
      const pad = landscape && narrow ? 1 : 12;
      let availHVisual;
      if (window.visualViewport) {
        const vv = window.visualViewport;
        availHVisual = vv.offsetTop + vv.height - rect.top - pad;
      } else {
        availHVisual = window.innerHeight - rect.top - pad;
      }
      let availHShell = availHVisual;
      if (layout) {
        const shellCS = getComputedStyle(layout);
        const shellPadB = parseFloat(shellCS.paddingBottom) || 0;
        availHShell = layout.clientHeight - vp.offsetTop - shellPadB - pad;
      }
      const availH = Math.max(200, Math.min(availHVisual, availHShell));

      /* 뷰포트 테두리를 빼고 실제로 스케일에 쓸 내부 박스 크기 계산 */
      const csVp = getComputedStyle(vp);
      const vpBorderX =
        (parseFloat(csVp.borderLeftWidth) || 0) + (parseFloat(csVp.borderRightWidth) || 0);
      const vpBorderY =
        (parseFloat(csVp.borderTopWidth) || 0) + (parseFloat(csVp.borderBottomWidth) || 0);
      const innerW = Math.max(0, w - vpBorderX);
      const innerH = Math.max(1, availH - vpBorderY);
      const slotAspect = innerW / innerH;
      const baseAspect = BASE_STAGE_WIDTH / GAME_HEIGHT;
      /* 슬롯이 기본보다 넓으면(울트라와이드) 논리 폭만 키워 레터박스 대신 바닥 연장 */
      if (slotAspect > baseAspect + 0.0005) {
        gameWorldWidth = Math.max(
          BASE_STAGE_WIDTH,
          Math.min(2400, Math.ceil(innerW * (GAME_HEIGHT / innerH)))
        );
      } else {
        gameWorldWidth = BASE_STAGE_WIDTH;
      }

      /* 가로·세로 중 작은 쪽에 맞춰 한 번에 축소(scale) */
      const scaleByW = innerW / gameWorldWidth;
      const scaleByH = innerH / GAME_HEIGHT;
      const scale = Math.min(scaleByW, scaleByH);
      currentGameScale = scale; /* 흔들림 복원용 동기화 */
      const scaledW = gameWorldWidth * scale;
      const scaledH = GAME_HEIGHT * scale;
      const transform = `scale(${scale})`;

      gameEl.style.width = `${gameWorldWidth}px`;
      gameEl.style.height = `${GAME_HEIGHT}px`;
      gameEl.style.transformOrigin = "top left";
      gameEl.style.transform = transform;

      vp.style.width = `${scaledW}px`;
      vp.style.height = `${scaledH}px`;
      vp.style.maxWidth = "100%";
      vp.style.marginLeft = "auto";
      vp.style.marginRight = "auto";

      /* 무대가 넓어지면 플레이어 X가 화면 밖으로 나가지 않도록 클램프 */
      playerX = Math.max(0, Math.min(playerX, gameWorldWidth - PLAYER_SIZE));
      if (player) {
        player.style.left = `${playerX}px`;
      }
    }

    /* 창 크기가 바뀔 때마다 스케일 재계산(리사이즈는 rAF로 묶음) */
    window.addEventListener(
      "resize",
      () => window.requestAnimationFrame(updateGameViewportScale),
      { passive: true }
    );
    /* 모바일 주소창 숨김 등으로 visualViewport 높이가 변할 때 */
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateGameViewportScale);
    }

    /**
     * 터치 기기 + 세로 + 좁은 화면이면 "가로로 돌려라" 게이트를 띄웁니다.
     * 전체 화면·화면 회전 잠금 버튼도 여기서 연결합니다.
     */
    (function initPortraitLandscapeGate() {
      const gate = document.getElementById("portraitGate");
      const fsBtn = document.getElementById("portraitGateFullscreenBtn");
      if (!gate) return;

      /** 터치 가능한 기기인지 대략 판별 */
      function isTouchDevice() {
        return (
          (typeof navigator !== "undefined" && navigator.maxTouchPoints > 0) ||
          "ontouchstart" in window
        );
      }

      /** 세로 게이트를 켜야 하는 조건 */
      function shouldShowPortraitGate() {
        if (!isTouchDevice()) return false;
        if (window.matchMedia("(orientation: landscape)").matches) return false;
        return window.matchMedia("(max-width: 900px)").matches;
      }

      /** 게이트 표시/숨김과 body 스크롤 잠금 */
      function refreshPortraitGate() {
        const open = shouldShowPortraitGate();
        gate.classList.toggle("is-open", open);
        document.body.classList.toggle("ce-portrait-blocked", open);
        document.documentElement.style.overflow = open ? "hidden" : "";
        if (!open) {
          requestAnimationFrame(updateGameViewportScale);
        }
      }

      window.addEventListener(
        "resize",
        () => requestAnimationFrame(refreshPortraitGate),
        { passive: true }
      );
      window.addEventListener("orientationchange", () => {
        setTimeout(refreshPortraitGate, 80);
      });
      window.matchMedia("(orientation: portrait)").addEventListener("change", refreshPortraitGate);
      window.matchMedia("(orientation: landscape)").addEventListener("change", refreshPortraitGate);

      if (fsBtn) {
        fsBtn.addEventListener("click", async () => {
          const root = document.documentElement;
          try {
            if (root.requestFullscreen) await root.requestFullscreen();
            else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
          } catch (_) {}
          try {
            const { screen } = window;
            if (screen.orientation && screen.orientation.lock) {
              await screen.orientation.lock("landscape").catch(() => {});
            }
          } catch (_) {}
        });
      }

      refreshPortraitGate();
    })();

      const gameEl = document.getElementById('game');
      if (shake.dur <= 0) return;
      const elapsed = performance.now() - shake.startTime;
      const t = Math.max(0, 1 - elapsed / shake.dur);
      if (t > 0) {
        const x = (Math.random() - 0.5) * shake.intensity * t;
        const y = (Math.random() - 0.5) * shake.intensity * t;
        gameEl.style.transform = `translate(${x}px,${y}px) scale(${currentGameScale})`;
        requestAnimationFrame(_runShake);
      } else {
        shake.dur = 0;
        gameEl.style.transform = `scale(${currentGameScale})`;

    /* ===== 교수 근접 위험 피드백 ===== */
    let dangerSoundLastTime = 0;
    function updateProximityFeedback() {
      if (!gameStarted || gameEnded || professors.length === 0) {
        player.style.boxShadow = '0 8px 14px rgba(33, 87, 147, 0.24)';
        return;
      }
      const playerCenterX = playerX + PLAYER_SIZE / 2;
      const playerCenterY = playerY + PLAYER_SIZE / 2;
      let maxProx = 0;
      for (const p of professors) {
        const profCenterX = p.x + 40;
        const profCenterY = p.y + 40;
        const dx = playerCenterX - profCenterX;
        const dy = playerCenterY - profCenterY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const ratio = Math.max(0, 1 - dist / (p.vision * 1.6));
        if (ratio > maxProx) maxProx = ratio;
        // 시야 콘 색상: 가까울수록 더 붉고 진하게
        const alpha = (0.30 + ratio * 0.45).toFixed(2);
        const g = Math.round(72 - ratio * 72);
        p.cone.style.background = `linear-gradient(90deg, rgba(255,${g},${g},${alpha}), rgba(255,72,72,0.04))`;
      }
      // 플레이어 박스 섀도: 위험 근접 시 붉은 글로
      if (maxProx > 0.15) {
        const glow = Math.round(maxProx * 20);
        const alpha = (maxProx * 0.75).toFixed(2);
        player.style.boxShadow = `0 8px 14px rgba(33,87,147,0.24), 0 0 ${glow}px rgba(220,30,30,${alpha})`;
      } else {
        player.style.boxShadow = '0 8px 14px rgba(33, 87, 147, 0.24)';
      }
      // 위험 사운드
      if (maxProx > 0.45) {
        const now = performance.now();
        if (now - dangerSoundLastTime > 900) {
          dangerSoundLastTime = now;
          play('danger', maxProx * 0.4);
        }
      }
    }

    /* ===== 발소리 프레임 카운터 + 스쿼시&스트레치 타이머 ===== */
    let stepFrame = 0;
    let playerStretchTimer = 0;

    /* ===== 게임 상태 변수 ===== */
    let currentStage = 0;
    let remainingTime = stageConfigs[0].time;
    let gameStarted = false;
    let gameEnded = false;
    let lives = 3;
    const MAX_LIVES = 3;
    let hasPass = false;
    /** 전체 런 누적 점수 (5스테이지 클리어 시 서버 제출) */
    let runEscapeScore = 0;
    let runScoreSubmitted = false;

    /* 플레이어 위치(논리 픽셀) */
    let playerX = 42;
    let playerY = 655;

    let desks = [];
    let professors = [];
    let chalks = [];

    /* 1초 타이머·게임 루프 requestAnimationFrame id */
    let timerInterval = null;
    let loopId = null;
    let lastTimestamp = 0;

    /* 키보드(및 가상 패드가 같은 이름으로 세팅) 눌림 상태 */
    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false
    };

    /** 모바일 방향 패드 버튼을 keys 객체와 동기화 */
    function bindClassroomTouchDpad() {
      const pairs = [
        ["ceDpadUp", "ArrowUp"],
        ["ceDpadDown", "ArrowDown"],
        ["ceDpadLeft", "ArrowLeft"],
        ["ceDpadRight", "ArrowRight"]
      ];
      for (const [id, key] of pairs) {
        const el = document.getElementById(id);
        if (!el) continue;
        /* 터치·마우스 모두에서 방향키와 동일하게 처리 */
        const down = (e) => {
          e.preventDefault();
          keys[key] = true;
        };
        const up = (e) => {
          e.preventDefault();
          keys[key] = false;
        };
        el.addEventListener("touchstart", down, { passive: false });
        el.addEventListener("touchend", up);
        el.addEventListener("touchcancel", up);
        el.addEventListener("mousedown", down);
        el.addEventListener("mouseup", up);
        el.addEventListener("mouseleave", up);
      }
    }
    bindClassroomTouchDpad();

    /** 상단 안내 #message 텍스트만 갱신 */
    function setMessage(text) {
      message.textContent = text;
    }

    /**
     * 전체 화면 오버레이 표시
     * @param {"init"|"start"|"clear"|"end"} mode
     *   init  = 첫 진입 (시작 버튼만)
     *   start = 실패 후 재도전 (시작 + 다시 준비)
     *   clear = 스테이지 클리어 (다시 준비 + 다음 단계)
     *   end   = 전체 종료·게임 오버 (다시 준비 + 카카오 공유)
     */
    function showOverlay(title, desc, mode = "start") {
      overlayTitle.textContent = title;
      overlayDesc.innerHTML = desc;

      hideKakaoShareButton();

      if (mode === "clear") {
        overlayStartBtn.style.display = "none";
        overlayRestartBtn.style.display = "inline-block";
        nextStageBtn.style.display = "inline-block";
      } else if (mode === "end") {
        overlayStartBtn.style.display = "none";
        overlayRestartBtn.style.display = "inline-block";
        nextStageBtn.style.display = "none";
        showKakaoShareButton();
      } else if (mode === "init") {
        /* 첫 진입: 시작 버튼만 표시 */
        overlayStartBtn.style.display = "inline-block";
        overlayRestartBtn.style.display = "none";
        nextStageBtn.style.display = "none";
      } else {
        /* 실패 후 재도전: 시작 + 다시 준비 */
        overlayStartBtn.style.display = "inline-block";
        overlayRestartBtn.style.display = "inline-block";
        nextStageBtn.style.display = "none";
      }

      overlay.classList.add('is-visible');
    }

    /** 오버레이 숨김 */
    function hideOverlay() {
      overlay.classList.remove('is-visible');
    }

    /** 충돌 검사용 사각형 {left,top,right,bottom} */
    function getRect(x, y, w, h) {
      return { left: x, top: y, right: x + w, bottom: y + h };
    }

    /** 두 사각형이 겹치는지 */
    function rectsIntersect(a, b) {
      return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
    }

    /** 플레이어 논리 좌표와 CSS 위치를 동시에 갱신 */
    function setPlayerPosition(x, y) {
      playerX = x;
      playerY = y;
      player.style.left = `${playerX}px`;
      player.style.top = `${playerY}px`;
    }

    /** 책상 레이어·교수 레이어 비우고 배열/객체 초기화 */
    function clearStageObjects() {
      deskLayer.innerHTML = "";
      profLayer.innerHTML = "";
      // 분필 정리
      chalks.forEach(c => { try { c.el.remove(); } catch(_){} });
      chalks = [];
      // 경보 표시 정리
      professors.forEach(p => { if (p.alertEl) { p.alertEl.remove(); p.alertEl = null; } });
      desks = [];
      professors = [];
    }

    /**
     * 단계 인덱스에 맞춰 책상·교수·학생증 위치를 세팅합니다(게임 시작 전 준비).
     * @param {number} stageIndex 0~4
     */
    function buildStage(stageIndex) {
      clearStageObjects();

      const config = stageConfigs[stageIndex];
      stageText.textContent = `${stageIndex + 1} / 5`;
      remainingTime = config.time;
      timeText.textContent = remainingTime;
      stateText.textContent = "대기";

      /* 책상 DOM 생성 + 충돌용 사각형 목록 — 비율 기반 calc() 배치
       * left: calc(colFrac*100% - 32px) → gameWorldWidth에 비례한 정중앙 분산
       * 충돌 x는 gameWorldWidth * colFrac - 32 로 CSS와 동일한 픽셀값 */
      [DESK_COL6, DESK_COL5, DESK_COL6].forEach((cols, rowIdx) => {
        const y = Math.round(GAME_HEIGHT * DESK_ROW_Y[rowIdx]);
        cols.forEach(colFrac => {
          const el = document.createElement("div");
          el.className = "desk";
          el.style.left = `calc(${(colFrac * 100).toFixed(4)}% - 32px)`;
          el.style.top = `${y}px`;
          deskLayer.appendChild(el);

          desks.push({
            x: Math.round(gameWorldWidth * colFrac - 32),
            y,
            w: 64,
            h: 44
          });
        });
      });

      /* 교수 DOM + 런타임 객체 생성 헬퍼 */
      function createProfessor(cfg) {
        const cone = document.createElement("div");
        cone.className = "vision";

        const shadow = document.createElement("div");
        shadow.className = "prof-shadow";

        const img = document.createElement("img");
        img.className = "professor";
        img.src = "../assets/professor.svg";
        img.alt = "교수님";

        profLayer.appendChild(cone);
        profLayer.appendChild(shadow);
        profLayer.appendChild(img);

        return {
          ...JSON.parse(JSON.stringify(cfg)),
          el: img,
          cone,
          shadow,
          currentWaypoint: 1,
          directionX: 1,
          directionY: 0,
          angleDeg: 0,
          // 분필
          chalkCooldown: 180 + Math.floor(Math.random() * 120),
          chalkCooldownMax: cfg.chalkCooldownMax || 420,
          // 감지·추격
          alertRange: cfg.alertRange || 150,
          chaseDuration: cfg.chaseDuration || 165,
          isAlerted: false, alertTimer: 0,
          isChasing: false, chaseTimer: 0,
          alertCooldown: 0,
          alertEl: null,
        };
      }

      /* 교수 cfg x 좌표를 gameWorldWidth 비율로 스케일링 (y는 고정 높이라 불필요) */
      function scaleProfCfg(cfg) {
        const sx = gameWorldWidth / BASE_STAGE_WIDTH;
        const c = JSON.parse(JSON.stringify(cfg));
        c.x = Math.round(c.x * sx);
        c.waypoints = c.waypoints.map(wp => ({ x: Math.round(wp.x * sx), y: wp.y }));
        return c;
      }

      /* 주 교수 + 추가 교수 생성 */
      professors = [createProfessor(scaleProfCfg(config.professor))];
      if (config.extraProfessors) {
        for (const cfg of config.extraProfessors) {
          professors.push(createProfessor(scaleProfCfg(cfg)));
        }
      }

      hasPass = false;

      /* 학생증은 책상·문·교수와 겹치지 않는 무작위 위치 */
      const safePass = findSafePassPosition();
      passItem.style.left = `${safePass.x}px`;
      passItem.style.top = `${safePass.y}px`;
      passItem.style.display = "flex";
      doorLock.textContent = "🔒";
      doorLock.classList.remove('ce-pop-in');

      setPlayerPosition(42, 655);
      updateProfessorVisual();
    }

    /** 교수 이미지·그림자·시야 콘 위치/회전/크기를 현재 논리 좌표에 맞춤 */
    function updateProfessorVisual() {
      for (const p of professors) {
        p.el.style.left = `${p.x}px`;
        p.el.style.top = `${p.y}px`;

        p.shadow.style.left = `${p.x + 9}px`;
        p.shadow.style.top = `${p.y + 64}px`;

        p.el.style.transform = `rotate(${p.angleDeg}deg)`;

        p.cone.style.width = `${p.vision}px`;
        p.cone.style.height = `${p.visionWidth}px`;

        const centerX = p.x + 40;
        const centerY = p.y + 40;

        p.cone.style.left = `${centerX - 9}px`;
        p.cone.style.top = `${centerY - p.visionWidth / 2}px`;
        p.cone.style.transform = `rotate(${p.angleDeg}deg)`;
      }
    }

    /** 타이머·루프 정지 후 같은 단계 준비 화면(오버레이) */
    function prepareStage() {
      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);
      gameStarted = false;
      gameEnded = false;

      // 주스 상태 초기화
      timeText.classList.remove('time-urgent', 'time-critical');
      player.style.transform = '';
      player.style.boxShadow = '0 8px 14px rgba(33, 87, 147, 0.24)';
      playerStretchTimer = 0;

      buildStage(currentStage);
      requestAnimationFrame(updateGameViewportScale);
      showOverlay(
        `스테이지 ${currentStage + 1}`,
        `준비가 되면 시작 버튼을 눌러 진행하세요. 학생증을 챙기고 탈출해야 합니다.`,
        "start"
      );
      setMessage("책상 간격을 넓혀서 사이로 지나가기 쉽게 조정했어요.");
    }

    /** 오버레이에서 시작 눌렀을 때: 타이머·게임 루프 시작 */
    function startStage() {
      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);

      /* 전체 런 점수는 1단계 시작 시에만 초기화 */
      if (currentStage === 0) {
        runEscapeScore = 0;
        runScoreSubmitted = false;
        lives = MAX_LIVES;
        updateLivesDisplay();
      }

      const config = stageConfigs[currentStage];
      remainingTime = config.time;
      timeText.textContent = remainingTime;
      stateText.textContent = "진행 중";
      gameStarted = true;
      gameEnded = false;
      hasPass = false;
      passItem.style.display = "flex";
      doorLock.textContent = "🔒";
      setPlayerPosition(42, 655);

      // 분필 잔재물 정리
      chalks.forEach(c => { try { c.el.remove(); } catch(_){} });
      chalks = [];

      const sx = gameWorldWidth / BASE_STAGE_WIDTH;
      const allProfCfgs = [config.professor, ...(config.extraProfessors || [])];
      professors.forEach((p, i) => {
        const cfg = allProfCfgs[i];
        p.x = Math.round(cfg.x * sx);
        p.y = cfg.y;
        p.currentWaypoint = 1;
        p.directionX = 1;
        p.directionY = 0;
        p.angleDeg = 0;
        // chalk/alert 상태 초기화
        p.chalkCooldown = 180 + Math.floor(Math.random() * 120);
        p.isAlerted = false; p.alertTimer = 0;
        p.isChasing = false; p.chaseTimer = 0;
        p.alertCooldown = 0;
        if (p.alertEl) { p.alertEl.remove(); p.alertEl = null; }
      });
      updateProfessorVisual();

      // 주스 상태 초기화
      dangerSoundLastTime = 0;
      stepFrame = 0;
      playerStretchTimer = 0;
      player.style.transform = '';
      player.style.boxShadow = '0 8px 14px rgba(33, 87, 147, 0.24)';
      timeText.classList.remove('time-urgent', 'time-critical');

      hideOverlay();
      setMessage(`스테이지 ${currentStage + 1} 시작! 학생증부터 챙기세요.`);

      /* 1초마다 남은 시간 감소, 0이 되면 실패 처리 */
      timerInterval = setInterval(() => {
        if (gameEnded) return;
        remainingTime--;
        timeText.textContent = remainingTime;

        /* 타임 압박 시각화 */
        if (remainingTime <= 5) {
          timeText.classList.remove('time-urgent');
          timeText.classList.add('time-critical');
          play('danger', 0.3);
          triggerFlash('rgba(200,20,20,0.08)', 400);
        } else if (remainingTime <= 12) {
          timeText.classList.remove('time-critical');
          timeText.classList.add('time-urgent');
        } else {
          timeText.classList.remove('time-urgent', 'time-critical');
        }

        if (remainingTime <= 0) {
          gameEnded = true;
          loseLife("⏰ 시간 초과!");
        }
      }, 1000);

      lastTimestamp = 0;
      loopId = requestAnimationFrame(loop);
    }

    /** 중간 클리어 후 다음 단계 준비로 */
    function goToNextStage() {
      if (currentStage < 4) {
        currentStage++;
        prepareStage();
      }
    }

    /** 문으로 탈출 성공 시: 점수 누적·전체 클리어 여부에 따라 오버레이 */
    function completeStage() {
      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);

      // 시각 상태 초기화
      player.style.boxShadow = '0 8px 14px rgba(33, 87, 147, 0.24)';
      player.style.transform = '';
      playerStretchTimer = 0;
      timeText.classList.remove('time-urgent', 'time-critical');
      for (const p of professors) {
        p.cone.style.background = 'linear-gradient(90deg, rgba(255, 72, 72, 0.30), rgba(255, 72, 72, 0.04))';
      }

      // 클리어 사운드
      play(currentStage === 4 ? 'win' : 'clear', 0.7);

      gameEnded = true;
      gameStarted = false;
      stateText.textContent = "성공";

      /* 남은 시간이 많을수록 가산 */
      runEscapeScore += Math.round(40 + Math.max(0, remainingTime) * 5);

      if (currentStage === 4) {
        lastClassroomEscapeTotalScore = runEscapeScore;
        submitScoreToLeague("classroom-escape", runEscapeScore);
        runScoreSubmitted = true;
        runEscapeScore = 0;

        showOverlay(
          "🏆 전체 클리어!",
          `1단계부터 5단계까지 모두 탈출 성공!<br />누적 점수 <strong style="color:#304b68;font-size:22px">${lastClassroomEscapeTotalScore}</strong>점`,
          "end"
        );
        spawnConfetti();
        setMessage("전체 스테이지 클리어!");
      } else {
        /* 아직 남은 단계: 다음 단계 버튼 노출은 showOverlay(clear)에서 처리 */
        overlayStartBtn.style.display = "none";
        overlayRestartBtn.style.display = "inline-block";
        nextStageBtn.style.display = "inline-block";

        showOverlay(
          `✅ 스테이지 ${currentStage + 1} 클리어!`,
          `다음 단계를 누르면 ${currentStage + 2}단계 준비 화면으로 이동합니다.`,
          "clear"
        );

        setMessage(`스테이지 ${currentStage + 1} 클리어!`);
      }
    }

    function updateLivesDisplay() {
      const el = document.getElementById('lives-display');
      if (!el) return;
      el.textContent = '❤️'.repeat(lives) + '🖤'.repeat(MAX_LIVES - lives);
    }

    function loseLife(reason) {
      lives--;
      updateLivesDisplay();
      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);

      if (lives <= 0) {
        failStage(reason, "목숨을 모두 잃었어요.");
      } else {
        triggerFlash('rgba(220,20,20,0.45)', 350);
        triggerShake(400, 14);
        play('caught', 0.8);
        setTimeout(() => startStage(currentStage), 1000);
      }
    }

    /** 시간 초과·들킴 등 실패 공통 처리 */
    function failStage(title, desc) {
      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);
      // 시각 상태 초기화
      player.style.boxShadow = '0 8px 14px rgba(33, 87, 147, 0.24)';
      player.style.transform = '';
      playerStretchTimer = 0;
      timeText.classList.remove('time-urgent', 'time-critical');
      for (const p of professors) {
        p.cone.style.background = 'linear-gradient(90deg, rgba(255, 72, 72, 0.30), rgba(255, 72, 72, 0.04))';
      }
      const failedScore = runEscapeScore;
      if (!runScoreSubmitted && failedScore > 0) {
        submitScoreToLeague("classroom-escape", failedScore);
        runScoreSubmitted = true;
      }
      runEscapeScore = 0;
      gameEnded = true;
      gameStarted = false;
      stateText.textContent = "실패";
      const scoreNote = failedScore > 0
        ? `<br />누적 점수 <strong style="color:#304b68;font-size:20px">${failedScore}</strong>점`
        : "";
      showOverlay(title, desc + scoreNote, "end");
      setMessage("게임 오버");
    }

    /** 방향키 입력에 따라 이동, 책상과 겹치면 해당 축만 막음 */
    function movePlayer(dt) {
      let dx = 0;
      let dy = 0;

      if (keys.ArrowUp) dy -= PLAYER_SPEED;
      if (keys.ArrowDown) dy += PLAYER_SPEED;
      if (keys.ArrowLeft) dx -= PLAYER_SPEED;
      if (keys.ArrowRight) dx += PLAYER_SPEED;

      if (dx === 0 && dy === 0) return;

      dx *= dt;
      dy *= dt;

      /* 발소리: 14프레임마다 한 번 */
      stepFrame++;
      if (stepFrame >= 14) { stepFrame = 0; play('step', 0.15); }

      /* 스쿼시&스트레치: 이동 방향 기준으로 눌리고 늘어남 */
      if (Math.abs(dx) >= Math.abs(dy)) {
        player.style.transform = 'scaleX(1.18) scaleY(0.85)';
      } else {
        player.style.transform = 'scaleX(0.85) scaleY(1.18)';
      }
      playerStretchTimer = 6;

      /* 월드 폭·높이 안에서만 이동 */
      let nextX = Math.max(0, Math.min(gameWorldWidth - PLAYER_SIZE, playerX + dx));
      let nextY = Math.max(0, Math.min(GAME_HEIGHT - PLAYER_SIZE, playerY + dy));

      /* X축 이동 후 책상 충돌이 없을 때만 반영 */
      const xRect = getRect(nextX, playerY, PLAYER_SIZE, PLAYER_SIZE);
      if (!collidesWithDesks(xRect)) {
        playerX = nextX;
      }

      const yRect = getRect(playerX, nextY, PLAYER_SIZE, PLAYER_SIZE);
      if (!collidesWithDesks(yRect)) {
        playerY = nextY;
      }

      setPlayerPosition(playerX, playerY);
    }

    /** 플레이어 사각형이 책상 하나라도와 겹치는지 */
    function collidesWithDesks(rect) {
      return desks.some((d) => rectsIntersect(rect, getRect(d.x, d.y, d.w, d.h)));
    }

    /** 학생증 배치용: 사각형이 책상과 겹치는지 */
    function rectOverlapsDesk(rect) {
      return desks.some((d) => rectsIntersect(rect, getRect(d.x, d.y, d.w, d.h)));
    }

    /**
     * 학생증을 놓을 무작위 좌표를 여러 번 시도해 찾습니다.
     * @returns {{x:number,y:number}} 안전한 위치(실패 시 기본값)
     */
    function findSafePassPosition() {
      const maxTries = 200;

      for (let i = 0; i < maxTries; i++) {
        const x = 80 + Math.random() * (gameWorldWidth - 220);
        const y = 260 + Math.random() * (GAME_HEIGHT - 360);

        const passRect = getRect(x, y, PASS_SIZE, PASS_SIZE);

        const doorRect = getRect(
          exitDoor.offsetLeft - 40,
          exitDoor.offsetTop - 40,
          exitDoor.offsetWidth + 80,
          exitDoor.offsetHeight + 80
        );

        if (rectOverlapsDesk(passRect)) continue;
        if (rectsIntersect(passRect, doorRect)) continue;
        if (professors.some(p => rectsIntersect(passRect, getRect(p.x - 50, p.y - 50, 170, 170)))) continue;

        return { x, y };
      }

      return { x: 180, y: 260 };
    }

    /** 웨이포인트를 따라 교수 이동, 방향·각도 갱신 (추격 모드 지원) */
    function moveProfessor(dt) {
      const pcx = playerX + PLAYER_SIZE / 2;
      const pcy = playerY + PLAYER_SIZE / 2;
      for (const p of professors) {
        let tx, ty, speedMult = 1;
        if (p.isChasing) {
          tx = pcx - 88; ty = pcy - 88; speedMult = 1.55;
        } else {
          const wp = p.waypoints[p.currentWaypoint];
          tx = wp.x; ty = wp.y;
        }
        const dx = tx - p.x, dy = ty - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (!p.isChasing && dist < p.speed * dt + 1) {
          p.x = tx; p.y = ty;
          p.currentWaypoint = (p.currentWaypoint + 1) % p.waypoints.length;
        } else if (dist > 0.5) {
          const nx = dx / dist, ny = dy / dist;
          p.x += nx * p.speed * speedMult * dt;
          p.y += ny * p.speed * speedMult * dt;
          p.directionX = nx; p.directionY = ny;
          p.angleDeg = Math.atan2(ny, nx) * (180 / Math.PI);
        }
      }

      updateProfessorVisual();
    }

    /** 교수 위에 ❗ DOM 요소 표시 */
    function showAlertEl(p) {
      if (p.alertEl) return;
      const gameEl = document.getElementById('game');
      const el = document.createElement('div');
      el.className = 'prof-alert is-new';
      el.textContent = '❗';
      el.style.left = `${p.x + 70}px`;
      el.style.top = `${p.y - 30}px`;
      gameEl.appendChild(el);
      p.alertEl = el;
      setTimeout(() => { if (p.alertEl === el) el.classList.remove('is-new'); }, 350);
    }

    /** 교수 ❗ DOM 요소 제거 */
    function hideAlertEl(p) {
      if (!p.alertEl) return;
      p.alertEl.remove();
      p.alertEl = null;
    }

    /** 교수 center에서 랜덤 방향으로 분필 발사 */
    function throwChalk(p) {
      const gameEl = document.getElementById('game');
      const sx = p.x + 40, sy = p.y + 40;

      for (let i = 0; i < 8; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const nx = Math.cos(angle), ny = Math.sin(angle);
        const angleDeg = angle * (180 / Math.PI);

        const el = document.createElement('div');
        el.className = 'chalk-proj';
        el.style.left = `${sx}px`;
        el.style.top = `${sy - 3}px`;
        el.style.transform = `rotate(${angleDeg}deg)`;
        el.style.transformOrigin = 'left center';
        gameEl.appendChild(el);

        chalks.push({ el, x: sx, y: sy, vx: nx * 4, vy: ny * 4, lifetime: 120 });
      }
    }

    /** 매 프레임 분필 위치 갱신 및 충돌 검사 */
    function updateChalks() {
      const pcx = playerX + PLAYER_SIZE / 2;
      const pcy = playerY + PLAYER_SIZE / 2;
      for (let i = chalks.length - 1; i >= 0; i--) {
        if (gameEnded) break;
        const c = chalks[i];
        c.x += c.vx;
        c.y += c.vy;
        c.lifetime--;
        c.el.style.left = `${c.x}px`;
        c.el.style.top = `${c.y - 3}px`;

        // 범위 이탈 또는 수명 종료 시 제거
        if (c.lifetime <= 0 || c.x < -20 || c.x > gameWorldWidth + 20 || c.y < -20 || c.y > GAME_HEIGHT + 20) {
          c.el.remove();
          chalks.splice(i, 1);
          continue;
        }

        // 플레이어 충돌 (7px 반경 근사)
        const chalkCenterX = c.x + 12;
        const chalkCenterY = c.y;
        if (
          chalkCenterX > playerX && chalkCenterX < playerX + PLAYER_SIZE &&
          chalkCenterY > playerY && chalkCenterY < playerY + PLAYER_SIZE
        ) {
          c.el.remove();
          chalks.splice(i, 1);
          gameEnded = true;
          loseLife("🖍️ 분필에 맞았어요!");
          break;
        }
      }
    }

    /** 매 프레임 교수 AI 상태머신 (분필 투척 + 감지·추격) */
    function updateProfessorAI() {
      const pcx = playerX + PLAYER_SIZE / 2;
      const pcy = playerY + PLAYER_SIZE / 2;
      for (const p of professors) {
        const profCx = p.x + 40;
        const profCy = p.y + 40;
        const dx = pcx - profCx, dy = pcy - profCy;
        const distToPlayer = Math.sqrt(dx * dx + dy * dy);

        // 1. 분필 쿨다운 처리
        if (p.chalkCooldown > 0) {
          p.chalkCooldown--;
        } else if (distToPlayer <= 540) {
          throwChalk(p);
          play('chalk', 0.25);
          p.chalkCooldown = p.chalkCooldownMax;
        }

        // 2. 추격 상태 머신
        if (p.isChasing) {
          p.chaseTimer--;
          if (p.chaseTimer <= 0) {
            p.isChasing = false;
            p.alertCooldown = 180;
            hideAlertEl(p);
          }
        } else if (p.isAlerted) {
          p.alertTimer--;
          if (p.alertTimer <= 0) {
            p.isAlerted = false;
            p.isChasing = true;
            p.chaseTimer = p.chaseDuration;
            play('danger', 0.55);
          }
        } else {
          if (p.alertCooldown > 0) { p.alertCooldown--; }
          else if (distToPlayer <= p.alertRange) {
            p.isAlerted = true;
            p.alertTimer = 35;
            showAlertEl(p);
            play('danger', 0.35);
          }
        }

        // 3. alertEl 위치 동기화
        if (p.alertEl) {
          p.alertEl.style.left = `${p.x + 70}px`;
          p.alertEl.style.top = `${p.y - 30}px`;
        }
      }
    }

    /** 교수가 바라보는 부채꼴 시야 안에 플레이어 중심이 있는지 (한 명이라도 감지하면 true) */
    function isPlayerInVision() {
      const playerCenterX = playerX + PLAYER_SIZE / 2;
      const playerCenterY = playerY + PLAYER_SIZE / 2;

      return professors.some(p => {
        const profCenterX = p.x + 40;
        const profCenterY = p.y + 40;

        const dx = playerCenterX - profCenterX;
        const dy = playerCenterY - profCenterY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > p.vision) return false;

        const facingAngle = Math.atan2(p.directionY, p.directionX);
        const targetAngle = Math.atan2(dy, dx);

        let diff = Math.abs(facingAngle - targetAngle);
        if (diff > Math.PI) diff = (Math.PI * 2) - diff;

        const halfFov = Math.atan2(p.visionWidth / 2, p.vision);
        return diff <= halfFov;
      });
    }

    /** 시야 안이면 게임 오버 */
    function checkCaught() {
      if (gameEnded) return false; // chalk가 먼저 끝냈을 때
      if (isPlayerInVision()) {
        gameEnded = true;
        loseLife("🚨 교수님에게 들켰어요!");
        return true;
      }
      return false;
    }

    /** 플레이어와 학생증 겹치면 획득 처리 */
    function checkPassPickup() {
      if (hasPass) return;

      const playerRect = getRect(playerX, playerY, PLAYER_SIZE, PLAYER_SIZE);
      const passRect = getRect(
        parseFloat(passItem.style.left),
        parseFloat(passItem.style.top),
        PASS_SIZE,
        PASS_SIZE
      );

      if (rectsIntersect(playerRect, passRect)) {
        hasPass = true;
        const passX = parseFloat(passItem.style.left);
        const passY = parseFloat(passItem.style.top);
        passItem.style.display = "none";
        doorLock.textContent = "🔓";
        // 문 잠금 해제 팝 애니메이션
        doorLock.classList.remove('ce-pop-in');
        void doorLock.offsetWidth;
        doorLock.classList.add('ce-pop-in');
        setTimeout(() => doorLock.classList.remove('ce-pop-in'), 500);
        // 사운드 + 파티클
        play('pickup', 0.6);
        spawnPickupParticles(passX, passY);
        setMessage("학생증 획득! 이제 문으로 탈출할 수 있어요.");
      }
    }

    /** 학생증 보유 시 문 사각형과 플레이어 겹침 여부 */
    function checkExit() {
      if (!hasPass) return false;

      const playerRect = getRect(playerX, playerY, PLAYER_SIZE, PLAYER_SIZE);
      const doorRect = getRect(
        exitDoor.offsetLeft,
        exitDoor.offsetTop,
        exitDoor.offsetWidth,
        exitDoor.offsetHeight
      );

      return rectsIntersect(playerRect, doorRect);
    }

    /** 매 프레임: 이동·교수·학생증·들킴·탈출 검사 */
    function loop(ts) {
      if (gameEnded) return;

      const dt = lastTimestamp ? Math.min((ts - lastTimestamp) / (1000 / 60), 3) : 1;
      lastTimestamp = ts;

      movePlayer(dt);

      /* 스쿼시&스트레치 타이머 복원 */
      if (playerStretchTimer > 0) {
        playerStretchTimer--;
        if (playerStretchTimer === 0) player.style.transform = '';
      }

      moveProfessor(dt);
      updateProfessorAI();
      updateChalks();
      if (gameEnded) return; // chalk 충돌 가드

      updateProximityFeedback();
      checkPassPickup();

      if (checkCaught()) return;

      if (checkExit()) {
        completeStage();
        return;
      }

      loopId = requestAnimationFrame(loop);
    }

    /* 키보드 방향키 눌림 */
    document.addEventListener("keydown", (e) => {
      if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault();
      }
    });

    /* 키보드 방향키 뗌 */
    document.addEventListener("keyup", (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
        e.preventDefault();
      }
    });

    /* UI 버튼·초기 빌드 */
    restartBtn.addEventListener("click", () => {
      if (lives <= 0) return;
      prepareStage();
    });
    overlayRestartBtn.addEventListener("click", () => {
      if (lives <= 0) {
        currentStage = 0;
        lives = MAX_LIVES;
        updateLivesDisplay();
      }
      prepareStage();
    });
    overlayStartBtn.addEventListener("click", startStage);
    nextStageBtn.addEventListener("click", goToNextStage);

    /* 첫 진입: 1단계 맵만 만들고 스케일 두 번(레이아웃 안정화) */
    buildStage(currentStage);
    requestAnimationFrame(() => {
      updateGameViewportScale();
      requestAnimationFrame(updateGameViewportScale);
    });
    showOverlay(
      "🏫 교수님 몰래 강의실 탈출",
      "학생증을 먼저 챙기고 문으로 탈출하세요.<br />단계가 올라갈수록 교수님의 동선이 더 복잡해집니다.",
      "init"
    );
  </script>
