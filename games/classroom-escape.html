<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>교수님 몰래 강의실 탈출</title>
  <style>
    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Arial", "맑은 고딕", sans-serif;
      background: linear-gradient(180deg, #d8ebff 0%, #f7fbff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: #263746;
      padding: 12px calc(10px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom))
        calc(10px + env(safe-area-inset-left));
    }

    .wrap {
      width: 1180px;
      max-width: 100%;
      padding: 18px;
    }

    button,
    .lobby-link {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .shell {
      background: rgba(255,255,255,0.97);
      border: 3px solid #dde9f5;
      border-radius: 28px;
      padding: 14px 16px;
      box-shadow: 0 18px 42px rgba(62, 95, 130, 0.16);
    }

    .topbar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 10px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(20px, 4.2vw, 30px);
      color: #304e6f;
      line-height: 1.2;
    }

    .title p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #698198;
      line-height: 1.45;
    }

    .status {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 6px;
      width: 100%;
    }

    .status-box {
      flex: 1 1 0;
      min-width: 0;
      padding: 6px 8px;
      text-align: center;
      border-radius: 12px;
      background: #f7fbff;
      border: 2px solid #e0ebf6;
    }

    .status-label {
      font-size: 10px;
      color: #7a90a4;
      margin-bottom: 2px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .status-value {
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 800;
      color: #2e4b69;
      line-height: 1.15;
      word-break: keep-all;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .lobby-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      color: #304e6f;
      background: #e8f2fc;
      border: 2px solid #cfe3f5;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .lobby-link:hover {
      background: #dceaf9;
    }

    #restartBtn {
      background: linear-gradient(135deg, #ffe18a, #ffcd67);
      color: #664a10;
      box-shadow: 0 10px 22px rgba(216, 170, 58, 0.22);
    }

    #message {
      flex: 1;
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 14px;
      background: #f7fbff;
      border: 2px solid #e1ebf5;
      color: #60788d;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.4;
    }

    /* 모바일 방향 패드 — 좌하단 코너에 안전 영역만큼만 띄움 */
    .classroom-dpad {
      display: none;
      position: absolute;
      left: calc(0px + env(safe-area-inset-left, 0px));
      bottom: calc(0px + env(safe-area-inset-bottom, 0px));
      transform: none;
      z-index: 25;
      justify-content: flex-start;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: none;
    }

    .classroom-dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 26px);
      grid-template-rows: repeat(3, 26px);
      gap: 3px;
      pointer-events: auto;
      padding: 1px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .classroom-dpad-empty {
      visibility: hidden;
      pointer-events: none;
    }

    .classroom-dpad-btn {
      border: none;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: rgba(235, 240, 246, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.55);
      font-size: 12px;
      font-weight: 800;
      color: rgba(48, 52, 62, 0.88);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 1px 3px rgba(0, 0, 0, 0.06);
      transition: transform 0.08s ease, background 0.08s ease, border-color 0.08s ease;
      touch-action: manipulation;
    }

    .classroom-dpad-btn:active {
      transform: scale(0.94);
      background: rgba(220, 228, 238, 0.58);
      border-color: rgba(255, 255, 255, 0.75);
    }

    .game-viewport {
      /* 너비·높이는 updateGameViewportScale에서 지정 — 논리 무대가 1140보다 넓어질 수 있음 */
      width: 100%;
      max-width: none;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 24px;
      border: 4px solid #8faec8;
      position: relative;
      background: #d8b587;
      line-height: 0;
      /* 전역 border-box여도 여기서는 콘텐츠 너비 = 스케일된 게임 픽셀과 일치시키기 위해 */
      box-sizing: content-box;
    }

    #game {
      position: relative;
      min-width: 1140px;
      width: 1140px;
      height: 720px;
      overflow: hidden;
      border-radius: 0;
      border: none;
      background: #d8b587;
      transform-origin: top left;
    }

    .wall {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 220px;
      background: linear-gradient(180deg, #eef6ff 0%, #f9fcff 100%);
      z-index: 0;
    }

    .floor {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 500px;
      background:
        repeating-linear-gradient(
          90deg,
          #ddb98b 0 48px,
          #d4af82 48px 50px
        );
      z-index: 0;
    }

    .board {
      position: absolute;
      left: 350px;
      top: 34px;
      width: 470px;
      height: 120px;
      background: linear-gradient(180deg, #2d8054 0%, #246846 100%);
      border: 10px solid #9b6a3f;
      border-radius: 12px;
      z-index: 1;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .board::after {
      content: "오늘의 수업 : 끝까지 집중하세요";
      position: absolute;
      left: 24px;
      top: 38px;
      color: rgba(255,255,255,0.9);
      font-size: 25px;
      font-weight: 700;
    }

    .window {
      position: absolute;
      top: 36px;
      width: 160px;
      height: 110px;
      background: linear-gradient(180deg, #c7ebff 0%, #ebf9ff 100%);
      border: 8px solid #d5dfe8;
      border-radius: 12px;
      z-index: 1;
    }

    .window.left { left: 60px; }
    .window.right { right: 60px; }

    .window::before,
    .window::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.72);
    }

    .window::before {
      width: 4px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .window::after {
      width: 100%;
      height: 4px;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .teacher-desk {
      position: absolute;
      left: 445px;
      top: 178px;
      width: 280px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(180deg, #a9784a 0%, #8d5f37 100%);
      z-index: 1;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    }

    .door {
      position: absolute;
      right: 18px;
      bottom: 190px;
      width: 92px;
      height: 170px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(180deg, #85552f 0%, #6d3f20 100%);
      border: 5px solid #5e361c;
      z-index: 1;
    }

    .door::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 80px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f4d36a;
    }

    .door-lock {
      position: absolute;
      right: 120px;
      bottom: 238px;
      z-index: 2;
      font-size: 28px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    #passItem {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff0a8 20%, #ffd45f 70%);
      border: 3px solid white;
      z-index: 7;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      box-shadow: 0 10px 16px rgba(226, 180, 60, 0.28);
    }

    #passItem::after { content: "🪪"; }

    .desk {
      position: absolute;
      width: 64px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(180deg, #c98c58 0%, #b07343 100%);
      border: 3px solid #8d5c34;
      z-index: 2;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    }

    .desk::before,
    .desk::after {
      content: "";
      position: absolute;
      bottom: -9px;
      width: 6px;
      height: 12px;
      background: #6e4a2a;
      border-radius: 3px;
    }

    .desk::before { left: 12px; }
    .desk::after { right: 12px; }

    #player {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(180deg, #76c8ff 0%, #4599df 100%);
      border: 3px solid white;
      z-index: 10;
      box-shadow: 0 8px 14px rgba(33, 87, 147, 0.24);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 17px;
    }

    #player::after { content: "🎓"; }

    .professor {
      position: absolute;
      width: 70px;
      height: 70px;
      object-fit: contain;
      z-index: 9;
      pointer-events: none;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.16));
    }

    .prof-shadow {
      position: absolute;
      width: 54px;
      height: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      z-index: 4;
      pointer-events: none;
      filter: blur(2px);
    }

    .vision {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      filter: blur(1px);
      transform-origin: center center;
      background: linear-gradient(90deg, rgba(255, 72, 72, 0.30), rgba(255, 72, 72, 0.04));
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
    }

    .legend {
      position: absolute;
      left: 18px;
      bottom: 16px;
      z-index: 12;
      padding: 11px 13px;
      border-radius: 14px;
      background: rgba(255,255,255,0.8);
      border: 2px solid rgba(142, 169, 197, 0.36);
      font-size: 13px;
      color: #506478;
      line-height: 1.6;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(17, 24, 33, 0.44);
      backdrop-filter: blur(3px);
      z-index: 30;
    }

    .overlay-card {
      width: min(560px, 92%);
      padding: 28px 24px;
      border-radius: 26px;
      background: white;
      border: 3px solid #e8f0f6;
      box-shadow: 0 22px 36px rgba(0,0,0,0.18);
      text-align: center;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #304b68;
    }

    .overlay-card p {
      margin: 0 0 18px;
      font-size: 17px;
      color: #6a8095;
      line-height: 1.7;
    }

    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #nextStageBtn {
      display: none;
      background: linear-gradient(135deg, #8fe28f, #5cbf69);
      color: white;
      box-shadow: 0 10px 22px rgba(84, 176, 98, 0.24);
    }

    #overlayStartBtn {
      background: linear-gradient(135deg, #71c3ff, #4a9fe3);
      color: white;
      box-shadow: 0 10px 22px rgba(60, 148, 225, 0.24);
    }

    #overlayRestartBtn {
      background: linear-gradient(135deg, #ffe08a, #ffcd67);
      color: #64490f;
    }

    #kakaoShareResultBtn {
      background: #fee500;
      color: #191919;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    #kakaoShareResultBtn.hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      body {
        align-items: flex-start;
      }

      .wrap {
        padding: 10px 8px;
      }

      .shell {
        padding: 12px 10px;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      #restartBtn {
        min-height: 48px;
      }

      #message {
        min-height: auto;
        font-size: 12px;
      }

      .classroom-dpad {
        display: flex;
      }

      .overlay-card {
        width: min(360px, 92vw);
        max-height: min(85dvh, 85vh);
        overflow-y: auto;
        padding: 22px 16px;
      }

      .overlay-card h2 {
        font-size: 24px;
      }

      .overlay-actions button {
        min-height: 46px;
      }
    }

    /* 세로(모바일) — 가로 플레이 유도 */
    .portrait-gate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      background: rgba(16, 26, 40, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      touch-action: none;
    }

    .portrait-gate.is-open {
      display: flex;
    }

    .portrait-gate-card {
      width: min(360px, 100%);
      padding: 28px 22px 24px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .portrait-gate-anim {
      margin-bottom: 18px;
    }

    .portrait-gate-device {
      display: block;
      width: 52px;
      height: 92px;
      margin: 0 auto;
      border-radius: 14px;
      border: 3px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.08);
      animation: ce-portrait-tilt 2.4s ease-in-out infinite;
    }

    @keyframes ce-portrait-tilt {
      0%,
      100% {
        transform: rotate(0deg);
      }
      35%,
      65% {
        transform: rotate(90deg);
      }
    }

    .portrait-gate-title {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 800;
      color: #f2f7ff;
      line-height: 1.35;
    }

    .portrait-gate-desc {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.55;
      color: rgba(220, 232, 248, 0.88);
    }

    .portrait-gate-btn {
      width: 100%;
      max-width: 280px;
      padding: 14px 18px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: #1a2a3d;
      background: linear-gradient(180deg, #f0f6ff 0%, #d4e6fb 100%);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }

    .portrait-gate-btn:active {
      transform: scale(0.98);
    }

    body.ce-portrait-blocked {
      overflow: hidden;
    }

    /* 모바일 가로 — 게임과 같은 줄에 다시 버튼만 두어 세로를 게임에 할당 */
    @media (orientation: landscape) and (max-width: 932px) {
      html,
      body {
        height: 100%;
        max-height: 100dvh;
        overflow: hidden;
      }

      body {
        padding: max(2px, env(safe-area-inset-top)) max(3px, env(safe-area-inset-right))
          max(2px, env(safe-area-inset-bottom)) max(3px, env(safe-area-inset-left));
        align-items: stretch;
        display: flex;
        flex-direction: column;
      }

      .wrap {
        width: 100%;
        max-width: 100%;
        max-height: 100dvh;
        padding: 2px 4px;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .shell {
        flex: 1 1 auto;
        min-height: 0;
        padding: 4px 6px;
        border-radius: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: auto minmax(0, 1fr);
        grid-template-areas:
          "top top"
          "game tools";
        gap: 4px 6px;
        align-items: stretch;
      }

      .lobby-link {
        display: none !important;
      }

      .topbar {
        grid-area: top;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 0;
      }

      /* width: 100% 금지 — 스크립트가 맞춘 스케일 너비보다 뷰만 넓어져 갈색 빈칸이 생김 */
      #gameViewport {
        grid-area: game;
        min-width: 0;
        justify-self: center;
        align-self: start;
      }

      .controls {
        grid-area: tools;
        flex-direction: column;
        flex-wrap: nowrap;
        margin-bottom: 0;
        align-self: center;
        justify-content: flex-start;
        gap: 4px;
        width: auto;
      }

      .game-viewport {
        border-width: 2px;
        border-radius: 12px;
      }

      .classroom-dpad-grid {
        padding: 0;
        gap: 2px;
        border-radius: 8px;
      }

      .title {
        flex: 1 1 auto;
        min-width: 0;
      }

      .title h1 {
        font-size: clamp(14px, 3.2vw, 19px);
        margin: 0;
      }

      .title p {
        display: none;
      }

      .status {
        flex: 0 0 auto;
        max-width: 56%;
      }

      .status-box {
        padding: 4px 6px;
      }

      .status-label {
        font-size: 9px;
      }

      .status-value {
        font-size: clamp(12px, 2.8vw, 15px);
      }

      #restartBtn {
        padding: 6px 10px;
        font-size: 11px;
        min-height: 36px;
        flex-shrink: 0;
      }

      /* 가로에서 세로 공간 확보 — 안내 문구는 숨김(패드·게임 영역 우선) */
      #message {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div
    id="portraitGate"
    class="portrait-gate"
    role="dialog"
    aria-modal="true"
    aria-labelledby="portraitGateTitle"
  >
    <div class="portrait-gate-card">
      <div class="portrait-gate-anim" aria-hidden="true">
        <span class="portrait-gate-device"></span>
      </div>
      <h2 id="portraitGateTitle" class="portrait-gate-title">가로 모드로 플레이해 주세요</h2>
      <p class="portrait-gate-desc">기기를 옆으로 돌리면 게임 화면이 넓어져 플레이하기 좋습니다.</p>
      <button type="button" id="portraitGateFullscreenBtn" class="portrait-gate-btn">
        전체 화면으로 넓히기
      </button>
    </div>
  </div>

  <div class="wrap">
    <a class="lobby-link" id="lobbyBackLink" href="../index.html?lobby=1">← 로비로 돌아가기</a>
    <div class="shell">
      <div class="topbar">
        <div class="title">
          <h1>🏫 교수님 몰래 강의실 탈출</h1>
          <p>학생증을 먼저 챙기고 문으로 탈출하세요. 단계가 올라갈수록 교수님 동선이 더 복잡해집니다.</p>
        </div>

        <div class="status">
          <div class="status-box">
            <div class="status-label">단계</div>
            <div class="status-value" id="stageText">1 / 5</div>
          </div>
          <div class="status-box">
            <div class="status-label">남은 시간</div>
            <div class="status-value" id="timeText">35</div>
          </div>
          <div class="status-box">
            <div class="status-label">상태</div>
            <div class="status-value" id="stateText">대기</div>
          </div>
        </div>
      </div>

      <div class="controls">

    /** 스테이지·책상·교수 경로 등이 설계된 기준 폭 (이보다 좁은 논리 폭은 쓰지 않음) */
    const BASE_STAGE_WIDTH = 1140;
    const GAME_HEIGHT = 720;
    /** 뷰포트가 더 넓으면 바닥·벽이 이어지도록 논리 폭만 확장 (비율 유지 단일 scale) */
    let gameWorldWidth = BASE_STAGE_WIDTH;

    function contentBoxInnerWidth(el) {
      if (!el) return 0;
      const r = el.getBoundingClientRect();
      const cs = getComputedStyle(el);
      const pl = parseFloat(cs.paddingLeft) || 0;
      const pr = parseFloat(cs.paddingRight) || 0;
      const bl = parseFloat(cs.borderLeftWidth) || 0;
      const br = parseFloat(cs.borderRightWidth) || 0;
      return Math.max(0, r.width - pl - pr - bl - br);
    }

    function updateGameViewportScale() {
      const vp = document.getElementById("gameViewport");
      const gameEl = document.getElementById("game");
      if (!vp || !gameEl) return;

      const layout = vp.parentElement;
      const narrow = window.matchMedia("(max-width: 932px)").matches;
      const landscape = window.matchMedia("(orientation: landscape)").matches;
      const toolsEl = layout && layout.querySelector ? layout.querySelector(".controls") : null;

      const rect = vp.getBoundingClientRect();
      const fullShellW = layout ? contentBoxInnerWidth(layout) : vp.clientWidth;
      let w = fullShellW;
      if (landscape && narrow && layout && toolsEl) {
        const tr = toolsEl.getBoundingClientRect();
        const lr = layout.getBoundingClientRect();
        const sideBySide = Math.abs(tr.top - rect.top) < 48;
        if (sideBySide && tr.width > 20 && tr.width < lr.width * 0.55) {
          const lcs = getComputedStyle(layout);
          const innerLeft =
            lr.left +
            (parseFloat(lcs.borderLeftWidth) || 0) +
            (parseFloat(lcs.paddingLeft) || 0);
          w = Math.max(120, tr.left - innerLeft - 4);
        }
      }
      if (w <= 0) return;

      const pad = landscape && narrow ? 1 : 12;
      let availHVisual;
      if (window.visualViewport) {
        const vv = window.visualViewport;
        availHVisual = vv.offsetTop + vv.height - rect.top - pad;
      } else {
        availHVisual = window.innerHeight - rect.top - pad;
      }
      let availHShell = availHVisual;
      if (layout) {
        const shellCS = getComputedStyle(layout);
        const shellPadB = parseFloat(shellCS.paddingBottom) || 0;
        availHShell = layout.clientHeight - vp.offsetTop - shellPadB - pad;
      }
      const availH = Math.max(200, Math.min(availHVisual, availHShell));

      const csVp = getComputedStyle(vp);
      const vpBorderX =
        (parseFloat(csVp.borderLeftWidth) || 0) + (parseFloat(csVp.borderRightWidth) || 0);
      const vpBorderY =
        (parseFloat(csVp.borderTopWidth) || 0) + (parseFloat(csVp.borderBottomWidth) || 0);
      const innerW = Math.max(0, w - vpBorderX);
      const innerH = Math.max(1, availH - vpBorderY);
      const slotAspect = innerW / innerH;
      const baseAspect = BASE_STAGE_WIDTH / GAME_HEIGHT;
      if (slotAspect > baseAspect + 0.0005) {
        gameWorldWidth = Math.max(
          BASE_STAGE_WIDTH,
          Math.min(2400, Math.ceil(innerW * (GAME_HEIGHT / innerH)))
        );
      } else {
        gameWorldWidth = BASE_STAGE_WIDTH;
      }

      const scaleByW = innerW / gameWorldWidth;
      const scaleByH = innerH / GAME_HEIGHT;
      const scale = Math.min(scaleByW, scaleByH);
      const scaledW = gameWorldWidth * scale;
      const scaledH = GAME_HEIGHT * scale;
      const transform = `scale(${scale})`;

      gameEl.style.width = `${gameWorldWidth}px`;
      gameEl.style.height = `${GAME_HEIGHT}px`;
      gameEl.style.transformOrigin = "top left";
      gameEl.style.transform = transform;

      vp.style.width = `${scaledW}px`;
      vp.style.height = `${scaledH}px`;
      vp.style.maxWidth = "100%";
      vp.style.marginLeft = "auto";
      vp.style.marginRight = "auto";

      playerX = Math.max(0, Math.min(playerX, gameWorldWidth - PLAYER_SIZE));
      if (player) {
        player.style.left = `${playerX}px`;
      }
    }

    (function initPortraitLandscapeGate() {
      const gate = document.getElementById("portraitGate");
      const fsBtn = document.getElementById("portraitGateFullscreenBtn");
      if (!gate) return;

      function isTouchDevice() {
        return (
          (typeof navigator !== "undefined" && navigator.maxTouchPoints > 0) ||
          "ontouchstart" in window
        );
      }

      function shouldShowPortraitGate() {
        if (!isTouchDevice()) return false;
        if (window.matchMedia("(orientation: landscape)").matches) return false;
        return window.matchMedia("(max-width: 900px)").matches;
      }

      function refreshPortraitGate() {
        const open = shouldShowPortraitGate();
        gate.classList.toggle("is-open", open);
        document.body.classList.toggle("ce-portrait-blocked", open);
        document.documentElement.style.overflow = open ? "hidden" : "";
        if (!open) {
          requestAnimationFrame(updateGameViewportScale);
        }
      }

      window.addEventListener(
        "resize",
        () => requestAnimationFrame(refreshPortraitGate),
        { passive: true }
      );
      window.addEventListener("orientationchange", () => {
        setTimeout(refreshPortraitGate, 80);
      });
      window.matchMedia("(orientation: portrait)").addEventListener("change", refreshPortraitGate);
      window.matchMedia("(orientation: landscape)").addEventListener("change", refreshPortraitGate);

      if (fsBtn) {
        fsBtn.addEventListener("click", async () => {
          const root = document.documentElement;

            if (root.requestFullscreen) await root.requestFullscreen();
            else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
          } catch (_) {}
          try {
            const { screen } = window;
            if (screen.orientation && screen.orientation.lock) {
              await screen.orientation.lock("landscape").catch(() => {});
            }
          } catch (_) {}
        });
      }

      refreshPortraitGate();
    })();

        ["ceDpadUp", "ArrowUp"],
        ["ceDpadDown", "ArrowDown"],

        ["ceDpadRight", "ArrowRight"]
      ];
      for (const [id, key] of pairs) {

        const down = (e) => {
          e.preventDefault();
          keys[key] = true;
        };

          keys[key] = false;

        el.addEventListener("touchstart", down, { passive: false });
        el.addEventListener("touchend", up);

      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);

      gameEnded = true;
      gameStarted = false;
      stateText.textContent = "성공";

      runEscapeScore += Math.round(40 + Math.max(0, remainingTime) * 5);

      if (currentStage === 4) {
        lastClassroomEscapeTotalScore = runEscapeScore;
        submitScoreToLeague("classroom-escape", runEscapeScore);
        runEscapeScore = 0;

        showOverlay(
          "🏆 전체 클리어!",
          `1단계부터 5단계까지 모두 탈출 성공! 누적 점수 ${lastClassroomEscapeTotalScore}점 · 게임이 끝났습니다.`,
          "end"
        );

        setMessage("전체 스테이지 클리어!");
      } else {
        overlayStartBtn.style.display = "none";
        overlayRestartBtn.style.display = "inline-block";
        nextStageBtn.style.display = "inline-block";

        showOverlay(
          `✅ 스테이지 ${currentStage + 1} 클리어!`,
          `다음 단계를 누르면 ${currentStage + 2}단계 준비 화면으로 이동합니다.`,
          "clear"
        );

        setMessage(`스테이지 ${currentStage + 1} 클리어!`);
      }
    }

    function failStage(title, desc) {
      clearInterval(timerInterval);
      cancelAnimationFrame(loopId);
      runEscapeScore = 0;
      gameEnded = true;
      gameStarted = false;
      stateText.textContent = "실패";
      showOverlay(title, desc, "start");
      setMessage("게임 오버");
    }

    function movePlayer() {
      let dx = 0;
      let dy = 0;

      if (keys.ArrowUp) dy -= PLAYER_SPEED;
      if (keys.ArrowDown) dy += PLAYER_SPEED;
      if (keys.ArrowLeft) dx -= PLAYER_SPEED;
      if (keys.ArrowRight) dx += PLAYER_SPEED;

      if (dx === 0 && dy === 0) return;

      let nextX = Math.max(0, Math.min(gameWorldWidth - PLAYER_SIZE, playerX + dx));
      let nextY = Math.max(0, Math.min(GAME_HEIGHT - PLAYER_SIZE, playerY + dy));

      const xRect = getRect(nextX, playerY, PLAYER_SIZE, PLAYER_SIZE);
      if (!collidesWithDesks(xRect)) {
        playerX = nextX;
      }

      const yRect = getRect(playerX, nextY, PLAYER_SIZE, PLAYER_SIZE);
      if (!collidesWithDesks(yRect)) {
        playerY = nextY;
      }

      setPlayerPosition(playerX, playerY);
    }

    function collidesWithDesks(rect) {
      return desks.some((d) => rectsIntersect(rect, getRect(d.x, d.y, d.w, d.h)));
    }

    function rectOverlapsDesk(rect) {
  return desks.some((d) => rectsIntersect(rect, getRect(d.x, d.y, d.w, d.h)));
}

function findSafePassPosition() {

  const maxTries = 200;

  for (let i = 0; i < maxTries; i++) {

    const x = 80 + Math.random() * (gameWorldWidth - 220);
    const y = 260 + Math.random() * (GAME_HEIGHT - 360);

    const passRect = getRect(x, y, PASS_SIZE, PASS_SIZE);

    const doorRect = getRect(
      exitDoor.offsetLeft - 40,
      exitDoor.offsetTop - 40,
      exitDoor.offsetWidth + 80,
      exitDoor.offsetHeight + 80
    );

    const profRect = getRect(
      professor.x - 50,
      professor.y - 50,
      170,
      170
    );

    if (rectOverlapsDesk(passRect)) continue;
    if (rectsIntersect(passRect, doorRect)) continue;
    if (rectsIntersect(passRect, profRect)) continue;

    return { x, y };
  }

  return { x: 180, y: 260 };
}

    function moveProfessor() {
      const target = professor.waypoints[professor.currentWaypoint];
      const dx = target.x - professor.x;
      const dy = target.y - professor.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < professor.speed + 1) {
        professor.x = target.x;
        professor.y = target.y;
        professor.currentWaypoint = (professor.currentWaypoint + 1) % professor.waypoints.length;
      } else {
        const nx = dx / distance;
        const ny = dy / distance;

        professor.x += nx * professor.speed;
        professor.y += ny * professor.speed;
        professor.directionX = nx;
        professor.directionY = ny;
        professor.angleDeg = Math.atan2(ny, nx) * (180 / Math.PI);
      }

      updateProfessorVisual();
    }

    function isPlayerInVision() {
      const playerCenterX = playerX + PLAYER_SIZE / 2;
      const playerCenterY = playerY + PLAYER_SIZE / 2;
      const profCenterX = professor.x + 35;
      const profCenterY = professor.y + 35;

      const dx = playerCenterX - profCenterX;
      const dy = playerCenterY - profCenterY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance > professor.vision) return false;

      const facingAngle = Math.atan2(professor.directionY, professor.directionX);
      const targetAngle = Math.atan2(dy, dx);

      let diff = Math.abs(facingAngle - targetAngle);
      if (diff > Math.PI) diff = (Math.PI * 2) - diff;

      const halfFov = Math.atan2(professor.visionWidth / 2, professor.vision);
      return diff <= halfFov;
    }

    function checkCaught() {
      if (isPlayerInVision()) {
        failStage("🚨 교수님에게 들켰어요!", "교수님은 이제 모든 방향으로 움직입니다. 동선을 잘 보고 다시 도전해보세요.");
        return true;
      }
      return false;
    }

    function checkPassPickup() {
      if (hasPass) return;

      const playerRect = getRect(playerX, playerY, PLAYER_SIZE, PLAYER_SIZE);
      const passRect = getRect(
        parseFloat(passItem.style.left),
        parseFloat(passItem.style.top),
        PASS_SIZE,
        PASS_SIZE
      );

      if (rectsIntersect(playerRect, passRect)) {
        hasPass = true;
        passItem.style.display = "none";
        doorLock.textContent = "🔓";
        setMessage("학생증 획득! 이제 문으로 탈출할 수 있어요.");
      }
    }

    function checkExit() {
      if (!hasPass) return false;

      const playerRect = getRect(playerX, playerY, PLAYER_SIZE, PLAYER_SIZE);
      const doorRect = getRect(
        exitDoor.offsetLeft,
        exitDoor.offsetTop,
        exitDoor.offsetWidth,
        exitDoor.offsetHeight
      );

      return rectsIntersect(playerRect, doorRect);
    }

    function loop() {
      if (gameEnded) return;

      movePlayer();
      moveProfessor();
      checkPassPickup();

      if (checkCaught()) return;

      if (checkExit()) {
        completeStage();
        return;
      }

      loopId = requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault();
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
        e.preventDefault();
      }
    });

    restartBtn.addEventListener("click", prepareStage);
    overlayRestartBtn.addEventListener("click", prepareStage);
    overlayStartBtn.addEventListener("click", startStage);
    nextStageBtn.addEventListener("click", goToNextStage);

    buildStage(currentStage);
    requestAnimationFrame(() => {
      updateGameViewportScale();
      requestAnimationFrame(updateGameViewportScale);
    });
    showOverlay(
      "게임 준비",
      "오버레이의 시작 버튼을 눌러 1단계를 시작하세요. 학생증을 챙기고 교수님을 피해 탈출하면 됩니다.",
      "start"
    );
  </script>
