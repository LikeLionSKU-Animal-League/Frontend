<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#dff6ff" />
  <title>Animal League</title>
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="캠퍼스 애니멀 배틀" />
  <meta property="og:title" content="캠퍼스 애니멀 배틀" />
  <meta property="og:description" content="대학 대표 동물들이 미니게임에 도전하고, 점수에 따라 더 강한 동물로 진화합니다." />
  <meta property="og:url" content="https://campus-animal-battle.vercel.app/" />
  <meta property="og:image" content="https://campus-animal-battle.vercel.app/assets/game-preview.png" />
  <meta property="og:image:alt" content="캠퍼스 애니멀 배틀 대표 이미지" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    @font-face {
      font-family: 'NeoDunggeunmo';
      src: url('./assets/fonts/neodgm.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      font-family: 'NeoDunggeunmo', sans-serif;
      background: #87ceeb;
      color: #33423a;
      overflow-x: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .hidden { display: none !important; }
    .animal-img { object-fit: contain; display: inline-block; }
    .animal-cell .animal-img { width: 32px; height: 32px; }

    /* ═══════════════════════════════════════════
       인트로 공통 배경 화면
    ═══════════════════════════════════════════ */
    #introScreen {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      position: relative;
      background-image: url('./assets/images/home/background.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    /* ───────────────────────────────────────────
       Phase 0: 랜딩 (로고 + 입장하기)
    ─────────────────────────────────────────── */
    #phaseLanding {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .intro-logo {
      width: min(520px, 88vw);
      display: block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.18));
    }

    #startBtn {
      padding: 18px 52px;
      border-radius: 999px;
      font-size: 22px;
      font-weight: 900;
      color: #7a5f2a;
      background: rgba(255, 236, 153, 0.92);
      box-shadow: 0 6px 0 #c8982a, 0 10px 24px rgba(200,150,40,0.30);
      backdrop-filter: blur(4px);
      letter-spacing: 0.04em;
    }
    #startBtn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #c8982a, 0 14px 28px rgba(200,150,40,0.32); }
    #startBtn:active { transform: translateY(2px);  box-shadow: 0 3px 0 #c8982a; }

    /* ───────────────────────────────────────────
       Phase 1: 스토리 (수동 넘기기)
    ─────────────────────────────────────────── */
    #phaseStory {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: min(600px, 96vw);
      animation: fadeIn 0.4s ease;
    }

    .story-logo-small {
      width: min(520px, 88vw);
      display: block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.18));
    }

    .story-box {
      position: relative;
      width: 100%;
    }

    .story-box-bg {
      width: 100%;
      display: block;
    }

    .story-box-character {
      position: absolute;
      top: -30px;
      left: 6px;
      height: 58px;
      z-index: 2;
    }

    .story-box-inner {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 52px 20px 48px;
    }

    #storyText {
      font-size: 19px;
      line-height: 1.85;
      color: #3a4e40;
      font-weight: 700;
      word-break: keep-all;
      text-align: center;
      transition: opacity 0.25s ease;
    }

    .story-pager {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .story-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 900;
      color: #7a5f2a;
      background: rgba(255, 236, 153, 0.88);
      box-shadow: 0 5px 0 #c8982a, 0 8px 16px rgba(200,150,40,0.25);
    }
    .nav-btn:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #c8982a, 0 10px 20px rgba(200,150,40,0.28); }
    .nav-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #c8982a; }
    .nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
      transform: none;
      box-shadow: 0 3px 0 #c8982a;
    }

    #goSchoolBtn {
      padding: 16px 44px;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      color: #7a5f2a;
      background: rgba(255, 236, 153, 0.92);
      box-shadow: 0 6px 0 #c8982a, 0 10px 24px rgba(200,150,40,0.30);
      animation: fadeIn 0.35s ease;
    }
    #goSchoolBtn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #c8982a; }
    #goSchoolBtn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #c8982a; }

    /* ───────────────────────────────────────────
       Phase 2: 학교 입력
    ─────────────────────────────────────────── */
    #phaseSchool {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: min(480px, 96vw);
      animation: fadeIn 0.4s ease;
    }

    .school-logo-small {
      width: min(220px, 55vw);
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.15));
    }

    .school-box {
      width: 100%;
      background: rgba(245, 238, 220, 0.93);
      border: 3px solid #d4b86a;
      border-radius: 24px;
      padding: 28px 26px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .school-box h2 {
      margin: 0;
      font-size: 17px;
      color: #4a3728;
      text-align: center;
      line-height: 1.6;
      word-break: keep-all;
    }

    .school-field { display: flex; flex-direction: column; gap: 8px; }
    .school-field label { font-size: 14px; font-weight: 900; color: #4d7c55; }

    #schoolNameInput {
      width: 100%;
      padding: 14px 18px;
      border-radius: 18px;
      border: 3px solid #e8f4df;
      font-size: 17px;
      font-family: inherit;
      font-weight: 700;
      color: #33423a;
      background: linear-gradient(180deg, #ffffff, #f9fff2);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #schoolNameInput::placeholder { color: #9aaa9c; font-weight: 600; }
    #schoolNameInput:focus {
      outline: none;
      border-color: #9dd9a0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7), 0 0 0 3px rgba(125,204,127,0.25);
    }

    #confirmSchoolBtn {
      padding: 15px 0;
      width: 100%;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      color: #7a5f2a;
      background: rgba(255, 236, 153, 0.92);
      box-shadow: 0 5px 0 #c8982a, 0 8px 20px rgba(200,150,40,0.28);
    }
    #confirmSchoolBtn:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #c8982a; }
    #confirmSchoolBtn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #c8982a; }

    #backToStoryBtn2 {
      background: transparent;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.82);
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      text-decoration: underline;
      text-underline-offset: 4px;
      padding: 6px 12px;
    }
    #backToStoryBtn2:hover { opacity: 0.75; transform: none; }

    /* ═══════════════════════════════════════════
       LOBBY
    ═══════════════════════════════════════════ */
    #lobbyScreen { margin: 0; padding: 0; position: relative; width: 100%; }

    .lobby-map-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .lobby-map-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      background: #87ceeb;
      display: block;
    }

    /* 맵 오브젝트 */
    .map-item {
      position: absolute;
      z-index: 5;
      user-select: none;
      -webkit-user-drag: none;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      transform-origin: center center;
    }
    .map-item:hover  { transform: scale(1.08); filter: drop-shadow(0 8px 14px rgba(0,0,0,0.18)); }
    .map-item:active { transform: scale(1.03); }

    .logo-item { top: 2%; left: 2%; width: 18%; cursor: default; }
    .logo-item:hover { transform: none; filter: none; }

    .item-rank    { top: 26%; left: 13%;   width: 20%; }
    .item-house   { top: 14%; left: 41%;   width: 18%; }
    .item-student { top: 14%; left: 67.5%; width: 20%; }
    .item-hunt    { top: 52%; left: 19%;   width: 18%; }
    .item-lion    { top: 50%; left: 49%;   width: 12%; }
    .item-game    { top: 58%; left: 72.5%; width: 16.5%; }

    /* 내 대학 정보 버튼 */
    #mySchoolBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      color: #4a3728;
      background: rgba(245, 238, 220, 0.92);
      border: 3px solid #c9a96e;
      box-shadow: 0 4px 0 #b08a4a, 0 6px 16px rgba(0,0,0,0.18);
      backdrop-filter: blur(6px);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    #mySchoolBtn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 #b08a4a, 0 8px 20px rgba(0,0,0,0.20); }
    #mySchoolBtn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #b08a4a; }
    .my-school-btn-animal { width: 28px; height: 28px; object-fit: contain; }

    /* ═══════════════════════════════════════════
       모달 공통
    ═══════════════════════════════════════════ */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 99;
      backdrop-filter: blur(3px);
    }

    .modal-content {
      width: min(980px, 96vw);
      max-height: 88vh;
      overflow: hidden;
      background: #f5eedc;
      border-radius: 28px;
      border: 3px solid #e0d3b0;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      padding: 20px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #e0d3b0;
    }
    .modal-head h2 { margin: 0; color: #4a3728; font-size: 24px; }

    .close-btn {
      padding: 9px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'NeoDunggeunmo', sans-serif;
      color: #fff;
      background: #d4765a;
      border: 2px solid #b85a40;
      box-shadow: 0 3px 0 #8a4030;
    }
    .close-btn:hover { transform: translateY(2px); box-shadow: 0 1px 0 #8a4030; }

    /* 랭킹 모달 */
    .ranking-scroll { overflow: auto; padding: 16px 24px 24px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: rgba(255,255,255,0.5); color: #5a4a38;
      font-size: 14px; padding: 12px; text-align: center; position: sticky; top: 0;
    }
    tbody td {
      padding: 11px 12px; text-align: center;
      border-bottom: 1px solid #e0d3b0; color: #4a3728; background: rgba(255,255,255,0.3);
    }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,0.55); }
    .rank-badge {
      display: inline-flex; justify-content: center; align-items: center;
      min-width: 30px; height: 30px; border-radius: 50%;
      background: #e8d8b0; color: #5a4020;
    }
    .animal-cell { font-size: 26px; }
    .uni-cell { font-weight: 700; }
    .ranking-table-loading td {
      text-align: center; padding: 36px 16px !important;
      color: #7a6a55; font-size: 14px; border: none !important;
    }

    /* 내 대학 정보 모달 */
    #mySchoolModal .modal-content { width: min(420px, 96vw); }

    .my-school-modal-body {
      padding: 20px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .my-school-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 240, 180, 0.5);
      border: 2px solid #d4b86a;
      border-radius: 18px;
    }

    .my-school-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,240,180,0.9); border: 3px solid #d4b86a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .my-school-avatar img { width: 48px; height: 48px; object-fit: contain; }

    .my-school-hero-text h3 { margin: 0 0 4px; font-size: 18px; color: #4a3728; }
    .my-school-hero-text p  { margin: 0; font-size: 13px; color: #7a6a55; }

    .my-school-info-list { display: flex; flex-direction: column; gap: 8px; }

    .my-info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.55); border: 2px solid #e0d3b0; border-radius: 12px;
      font-size: 14px; color: #5a4a38;
    }
    .my-info-row strong { color: #4a3728; }
    .my-info-val { color: #3a6040; font-weight: 700; }

    /* ═══════════════════════════════════════════
       반응형
    ═══════════════════════════════════════════ */
    @media (max-width: 900px) {
      .logo-item    { width: 24%; }
      .item-rank    { width: 24%; left: 10%; }
      .item-house   { width: 21%; left: 39%; }
      .item-student { width: 24%; left: 65%; }
      .item-hunt    { width: 22%; left: 16%; }
      .item-lion    { width: 15%; left: 47%; }
      .item-game    { width: 20%; left: 69%; }
    }

    @media (max-width: 640px) {
      #introScreen { padding: 20px 14px calc(24px + env(safe-area-inset-bottom)); }
      .intro-logo  { width: min(320px, 90vw); }
      #startBtn    { font-size: 18px; padding: 15px 40px; }
      .story-logo-small { width: min(280px, 80vw); }
      #storyText   { font-size: 16px; }
      .story-box-inner { padding: 16px 44px 16px 40px; }
      .nav-btn     { font-size: 14px; padding: 10px 22px; }
      #goSchoolBtn { font-size: 16px; padding: 14px 36px; }
      .school-box  { padding: 22px 18px; }
      #mySchoolBtn { top: 10px; right: 10px; padding: 8px 12px; font-size: 13px; }
      .modal { padding: 0; align-items: flex-end; }
      .modal-content { width: 100%; max-height: min(92dvh,92vh); border-radius: 20px 20px 0 0; }
      #mySchoolModal .modal-content { width: 100%; }
      .modal-head { padding: 16px 16px 10px; }
      .modal-head h2 { font-size: 18px; }
      .ranking-scroll { padding: 12px 12px 20px; }
      thead th, tbody td { font-size: 13px; padding: 10px 6px; }
      .map-item:hover { transform: scale(1.04); }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     인트로 화면 (3단계 공유)
═══════════════════════════════════════════ -->
<section id="introScreen">

  <!-- ① 랜딩: 로고 + 입장하기 -->
  <div id="phaseLanding">
    <img class="intro-logo" src="./assets/images/logo.png" alt="모여봐요 애니멀 리그" />
    <button id="startBtn">입장하기</button>
  </div>

  <!-- ② 스토리: 텍스트 박스 + 이전/다음 -->
  <div id="phaseStory" class="hidden">
    <img class="story-logo-small" src="./assets/images/logo.png" alt="모여봐요 애니멀 리그" />

    <div class="story-box">
      <img class="story-box-character" src="./assets/images/text_box_2.png" alt="" />
      <img class="story-box-bg"        src="./assets/images/text_box.png"   alt="" />
      <div class="story-box-inner">
        <p id="storyText"></p>
      </div>
    </div>

    <div class="story-pager" id="storyPager">1 / 6</div>

    <div class="story-nav">
      <button class="nav-btn" id="prevBtn" disabled>◀ 이전</button>
      <button class="nav-btn" id="nextBtn">다음 ▶</button>
    </div>

    <!-- 마지막 페이지에만 표시 -->
    <button id="goSchoolBtn" class="hidden">학교 입력하기 →</button>
  </div>

  <!-- ③ 학교 입력 -->
  <div id="phaseSchool" class="hidden">
    <img class="school-logo-small" src="./assets/images/logo.png" alt="모여봐요 애니멀 리그" />

    <div class="school-box">
      <h2>대항전에 참가할 학교 이름을 입력해 주세요.<br />로비와 기록에 표시됩니다.</h2>
      <div class="school-field">
        <label for="schoolNameInput">학교 이름</label>
        <input id="schoolNameInput" type="text" maxlength="40"
               placeholder="예: 성균관대학교" autocomplete="organization" />
      </div>
      <button id="confirmSchoolBtn">로비 입장 🐾</button>
    </div>

    <button id="backToStoryBtn2">← 스토리 다시 보기</button>
  </div>

</section>

<!-- ═══════════════════════════════════════════
     로비 화면
═══════════════════════════════════════════ -->
<section id="lobbyScreen" class="hidden">
  <div class="lobby-map-wrap">
    <img src="./assets/images/home/background.jpg" alt="로비 배경" class="lobby-map-bg" />

    <img src="./assets/images/logo.png"            alt="모여봐요 애니멀 리그"    class="map-item logo-item" />
    <img src="./assets/images/home/rank.png"       alt="현재 랭킹"               class="map-item item-rank"    id="rankBtn" />
    <img src="./assets/images/home/house.png"      alt="스토리 다시보기"         class="map-item item-house"   id="storyBtn" />
    <img src="./assets/images/home/student.png"    alt="교수 학생 구별게임"      class="map-item item-student" id="studentBtn" />
    <img src="./assets/images/home/hunt.png"       alt="학점 사냥"               class="map-item item-hunt"    id="huntBtn" />
    <img src="./assets/images/home/lion.png"       alt="사자 건너기"             class="map-item item-lion"    id="lionBtn" />
    <img src="./assets/images/home/game.png"       alt="타자 연습"               class="map-item item-game"    id="gameBtn" />

    <button id="mySchoolBtn">
      <img class="my-school-btn-animal" id="mySchoolBtnAnimal"
           src="./assets/images/chick_10plus.png" alt="대표 동물" />
      <span id="mySchoolBtnLabel">내 대학 정보</span>
    </button>
  </div>
</section>

<!-- 랭킹 모달 -->
<div class="modal" id="rankingModal">
  <div class="modal-content">
    <div class="modal-head">
      <h2>🏅 현재 랭킹 TOP 30</h2>
      <button class="close-btn" id="closeRankingBtn">닫기</button>
    </div>
    <div class="ranking-scroll">
      <table>
        <thead><tr><th>순위</th><th>대학명</th><th>점수</th><th>동물</th></tr></thead>
        <tbody id="rankingTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 내 대학 정보 모달 -->
<div class="modal" id="mySchoolModal">
  <div class="modal-content">
    <div class="modal-head">
      <h2>🏫 내 대학 정보</h2>
      <button class="close-btn" id="closeMySchoolBtn">닫기</button>
    </div>
    <div class="my-school-modal-body">
      <div class="my-school-hero">
        <div class="my-school-avatar">
          <img id="modalMyAnimalImg" src="./assets/images/chick_10plus.png" alt="대표 동물" />
        </div>
        <div class="my-school-hero-text">
          <h3 id="modalMySchoolName">—</h3>
          <p  id="modalMySchoolSub">서버에 연결되면 실시간 순위가 표시됩니다.</p>
        </div>
      </div>
      <div class="my-school-info-list" id="modalMyInfoList">
        <div class="my-info-row"><strong>누적 점수</strong><span class="my-info-val">—</span></div>
        <div class="my-info-row"><strong>대표 동물</strong><span class="my-info-val">—</span></div>
        <div class="my-info-row"><strong>플레이 횟수</strong><span class="my-info-val">—</span></div>
        <div class="my-info-row"><strong>안내</strong>
          <span class="my-info-val" style="font-size:12px;color:#7a6a55;">백엔드 연결 후 반영</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const storyLines = [
  "어느 날, 동물의 왕국에 여러 대학을 대표하는 동물들이 모였다.",
  "각 대학의 동물들은 자신의 학교를 대표하여\n가장 강한 호랑이가 되기 위한 도전을 시작한다.",
  "동물들은 다양한 미니게임을 수행하며 점수를 얻고,",
  "게임이 끝난 뒤 점수 순위에 따라\n점점 강한 동물로 진화하게 된다.",
  "가장 높은 점수를 얻은 학교는 동물의 왕인\n'호랑이'가 되어 최고의 학교로 인정받는다.",
  "이렇게 동물들의 대학 대항전이 시작된다."
];

let storyIndex = 0;

const ANIMAL_NAMES = {
  lion:"사자", tiger:"호랑이", fox:"여우", dog:"강아지",
  raccoon:"너구리", cat:"고양이", squirrel:"다람쥐",
  parrot:"앵무새", hedgehog:"고슴도치", chick:"병아리"
};
const ANIMAL_FILES = {
  lion:"a_1.png", tiger:"rank_2_tiger.png", fox:"rank_3_fox.png",
  dog:"rank_4_dog.png", raccoon:"rank_5_raccoon.png", cat:"a_3.png",
  squirrel:"a_4.png", parrot:"a_5.png", hedgehog:"rank_9_hedgehog.png",
  chick:"chick_10plus.png"
};
function getKey(rank){
  if(!Number.isFinite(rank)||rank<=0) return "chick";
  const map=[,"lion","tiger","fox","dog","raccoon","cat","squirrel","parrot","hedgehog"];
  return map[rank]||"chick";
}
function animalSrc(rank){ return `./assets/images/${ANIMAL_FILES[getKey(rank)]}`; }
function animalName(rank){ return ANIMAL_NAMES[getKey(rank)]; }
function animalImg(src,alt,cls){
  return `<img class="animal-img${cls?' '+cls:''}" src="${src}" alt="${alt}"/>`;
}

const STORAGE_SCHOOL = "animalLeagueSchool";
const API_BASE =
  window.ANIMAL_LEAGUE_API ||
  (["localhost","127.0.0.1"].includes(location.hostname)
    ? "http://localhost:3000"
    : "https://backend-m5wz.onrender.com");

const introScreen      = document.getElementById("introScreen");
const lobbyScreen      = document.getElementById("lobbyScreen");
const phaseLanding     = document.getElementById("phaseLanding");
const phaseStory       = document.getElementById("phaseStory");
const phaseSchool      = document.getElementById("phaseSchool");
const startBtn         = document.getElementById("startBtn");
const storyTextEl      = document.getElementById("storyText");
const storyPager       = document.getElementById("storyPager");
const prevBtn          = document.getElementById("prevBtn");
const nextBtn          = document.getElementById("nextBtn");
const goSchoolBtn      = document.getElementById("goSchoolBtn");
const schoolNameInput  = document.getElementById("schoolNameInput");
const confirmSchoolBtn = document.getElementById("confirmSchoolBtn");
const backToStoryBtn2  = document.getElementById("backToStoryBtn2");
const rankingModal     = document.getElementById("rankingModal");
const closeRankingBtn  = document.getElementById("closeRankingBtn");
const rankingTableBody = document.getElementById("rankingTableBody");
const mySchoolModal    = document.getElementById("mySchoolModal");
const closeMySchoolBtn = document.getElementById("closeMySchoolBtn");
const mySchoolBtn      = document.getElementById("mySchoolBtn");
const mySchoolBtnAnimal= document.getElementById("mySchoolBtnAnimal");
const mySchoolBtnLabel = document.getElementById("mySchoolBtnLabel");
const modalMyAnimalImg = document.getElementById("modalMyAnimalImg");
const modalMySchoolName= document.getElementById("modalMySchoolName");
const modalMySchoolSub = document.getElementById("modalMySchoolSub");
const modalMyInfoList  = document.getElementById("modalMyInfoList");
const rankBtn          = document.getElementById("rankBtn");
const storyBtn         = document.getElementById("storyBtn");
const huntBtn          = document.getElementById("huntBtn");
const lionBtn          = document.getElementById("lionBtn");
const studentBtn       = document.getElementById("studentBtn");
const gameBtn          = document.getElementById("gameBtn");

let rankingData = [];

function showPhase(phase) {
  phaseLanding.classList.add("hidden");
  phaseStory.classList.add("hidden");
  phaseSchool.classList.add("hidden");
  phase.classList.remove("hidden");
}

function renderStory() {
  const total = storyLines.length;
  storyTextEl.style.opacity = "0";
  setTimeout(() => {
    storyTextEl.textContent = storyLines[storyIndex];
    storyTextEl.style.opacity = "1";
  }, 130);
  storyPager.textContent = `${storyIndex + 1} / ${total}`;
  const isLast = storyIndex === total - 1;
  prevBtn.disabled = storyIndex === 0;
  document.querySelector(".story-nav").classList.toggle("hidden", isLast);
  goSchoolBtn.classList.toggle("hidden", !isLast);
}

function goToStory() {
  storyIndex = 0;
  renderStory();
  showPhase(phaseStory);
}

function goToSchool() {
  schoolNameInput.value = localStorage.getItem(STORAGE_SCHOOL) || "";
  showPhase(phaseSchool);
  requestAnimationFrame(() => schoolNameInput.focus());
}

function confirmSchool() {
  const name = schoolNameInput.value.trim();
  if (!name) { alert("학교 이름을 입력해 주세요."); schoolNameInput.focus(); return; }
  localStorage.setItem(STORAGE_SCHOOL, name);
  enterLobby();
}

function enterLobby() {
  introScreen.classList.add("hidden");
  lobbyScreen.classList.remove("hidden");
  const school = (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
  if (school) mySchoolBtnLabel.textContent = school;
  refreshRankings();
}

function backToLanding() {
  introScreen.classList.remove("hidden");
  lobbyScreen.classList.add("hidden");
  showPhase(phaseLanding);
}

function renderRankingsLoading() {
  rankingTableBody.innerHTML =
    `<tr class="ranking-table-loading"><td colspan="4">데이터를 불러드리는중입니다.</td></tr>`;
}

function renderFullRanking() {
  if (!rankingData.length) {
    rankingTableBody.innerHTML =
      `<tr class="ranking-table-loading"><td colspan="4">등록된 랭킹이 없습니다.</td></tr>`;
    return;
  }
  rankingTableBody.innerHTML = rankingData.map((item, i) => {
    const rank = i + 1;
    return `<tr>
      <td><span class="rank-badge">${rank}</span></td>
      <td class="uni-cell">${item.university}</td>
      <td>${item.score}</td>
      <td class="animal-cell">${animalImg(animalSrc(rank), animalName(rank))}</td>
    </tr>`;
  }).join("");
}

function updateMySchoolPanel(data) {
  const school = (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
  modalMySchoolName.textContent = school || "—";
  if (data) {
    const rank = data.rank || 99;
    const src  = animalSrc(rank);
    const name = animalName(rank);
    mySchoolBtnAnimal.src = src;
    mySchoolBtnAnimal.alt = name;
    mySchoolBtnLabel.textContent = school || "내 대학 정보";
    modalMyAnimalImg.src = src;
    modalMySchoolSub.textContent = `현재 ${rank}위 · 누적 ${data.score}점`;
    modalMyInfoList.innerHTML = `
      <div class="my-info-row"><strong>누적 점수</strong><span class="my-info-val">${data.score}점</span></div>
      <div class="my-info-row"><strong>대표 동물</strong><span class="my-info-val">${name}</span></div>
      <div class="my-info-row"><strong>플레이 횟수</strong><span class="my-info-val">${data.playCount??0}회</span></div>
      <div class="my-info-row"><strong>순위</strong><span class="my-info-val">${rank}위</span></div>`;
  } else if (school) {
    mySchoolBtnLabel.textContent = school;
    modalMySchoolSub.textContent = "아직 기록이 없어요. 게임을 플레이해 보세요!";
    modalMyInfoList.innerHTML = `
      <div class="my-info-row"><strong>누적 점수</strong><span class="my-info-val">0점</span></div>
      <div class="my-info-row"><strong>대표 동물</strong><span class="my-info-val">병아리</span></div>
      <div class="my-info-row"><strong>플레이 횟수</strong><span class="my-info-val">0회</span></div>
      <div class="my-info-row"><strong>안내</strong>
        <span class="my-info-val" style="font-size:12px;color:#7a6a55;">첫 플레이 후 랭킹에 올라갑니다</span></div>`;
  }
}

async function refreshRankings() {
  renderRankingsLoading();
  const school = (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
  try {
    const url = school
      ? `${API_BASE}/api/rankings?limit=30&school=${encodeURIComponent(school)}`
      : `${API_BASE}/api/rankings?limit=30`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    rankingData = (data.rankings || []).map(r => ({ university:r.university, score:r.score, animal:r.animal }));
    renderFullRanking();
    updateMySchoolPanel(data.mySchool || null);
  } catch {
    rankingData = [];
    renderRankingsLoading();
  }
}

function wantsLobby() {
  const v = (new URLSearchParams(location.search).get("lobby") || "").toLowerCase();
  return v === "1" || v === "true" || v === "yes";
}
function schoolFromQuery() {
  try { return (new URLSearchParams(location.search).get("school") || "").trim(); } catch { return ""; }
}
function stripQuery() {
  try {
    const u = new URL(location.href);
    u.searchParams.delete("lobby"); u.searchParams.delete("school");
    history.replaceState({}, "", u.pathname + u.search + u.hash || u.pathname);
  } catch {}
}
const schoolQ = () => {
  const s = (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
  return s ? `?school=${encodeURIComponent(s)}` : "";
};

startBtn.addEventListener("click", goToStory);
prevBtn.addEventListener("click", () => { if (storyIndex > 0) { storyIndex--; renderStory(); } });
nextBtn.addEventListener("click", () => { if (storyIndex < storyLines.length - 1) { storyIndex++; renderStory(); } });
goSchoolBtn.addEventListener("click", goToSchool);
confirmSchoolBtn.addEventListener("click", confirmSchool);
schoolNameInput.addEventListener("keydown", e => { if (e.key === "Enter") confirmSchool(); });
backToStoryBtn2.addEventListener("click", goToStory);

storyBtn.addEventListener("click",   () => backToLanding());
rankBtn.addEventListener("click",    () => { refreshRankings(); rankingModal.style.display = "flex"; });
huntBtn.addEventListener("click",    () => { location.href = "games/grade-hunt.html"           + schoolQ(); });
lionBtn.addEventListener("click",    () => { location.href = "games/cross_road.html"            + schoolQ(); });
studentBtn.addEventListener("click", () => { location.href = "games/professor-cheek-sort.html" + schoolQ(); });
gameBtn.addEventListener("click",    () => { location.href = "games/typing-game.html"           + schoolQ(); });

closeRankingBtn.addEventListener("click",  () => { rankingModal.style.display = "none"; });
rankingModal.addEventListener("click",     e  => { if (e.target === rankingModal)  rankingModal.style.display = "none"; });
mySchoolBtn.addEventListener("click",      () => { mySchoolModal.style.display = "flex"; });
closeMySchoolBtn.addEventListener("click", () => { mySchoolModal.style.display = "none"; });
mySchoolModal.addEventListener("click",    e  => { if (e.target === mySchoolModal) mySchoolModal.style.display = "none"; });

(function bootstrap() {
  renderRankingsLoading();
  if (wantsLobby()) {
    const fromUrl = schoolFromQuery();
    if (fromUrl) { try { localStorage.setItem(STORAGE_SCHOOL, fromUrl); } catch {} }
    stripQuery();
    const school = (localStorage.getItem(STORAGE_SCHOOL) || "").trim();
    if (school) { enterLobby(); }
    else        { showPhase(phaseSchool); }
    return;
  }
  showPhase(phaseLanding);
})();
</script>
</body>
</html>
